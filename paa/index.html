<!doctype html>
<html lang="ta">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#ffb84d">
  <meta name="description" content="சரிபார்க்கப்பட்ட தமிழ்க் கவிதை, கவிஞர் தகவல் மற்றும் தெளிவான மூலம்.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="இன்றைய மகிழ்ச்சி கவிதை — பா">
  <meta property="og:description" content="மூலத்துடன் சரிபார்க்கப்பட்ட ஒரு தமிழ்க் கவிதை.">
  <meta property="og:url" content="https://sharecapsule.app/paa/">
  <meta name="twitter:card" content="summary_large_image">
  <title>இன்றைய மகிழ்ச்சி கவிதை — பா</title>
  <style>
    :root{--sky:#dff5ff;--sun:#ffbe55;--rose:#ff7c8e;--leaf:#54a878;--ink:#29231f;--muted:#756b63;--paper:#fffdf8;--line:#eee2d4;--shadow:0 24px 70px rgba(86,56,27,.14)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;background:radial-gradient(circle at 12% 3%,#fff 0,transparent 28%),radial-gradient(circle at 88% 10%,#ffe99b 0,transparent 26%),linear-gradient(155deg,#dff5ff,#fff0d8 55%,#ffe5ec);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans Tamil","Tamil Sangam MN","Latha",sans-serif;-webkit-font-smoothing:antialiased}button,a{font:inherit}.shell{width:min(100%,780px);margin:auto;padding:max(18px,env(safe-area-inset-top)) 16px calc(46px + env(safe-area-inset-bottom))}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:26px}.brand{font-weight:950;font-size:26px;letter-spacing:-.04em;color:var(--ink);text-decoration:none}.home{color:var(--muted);text-decoration:none;font-size:13px;font-weight:850;padding:10px 13px;border:1px solid rgba(255,255,255,.86);border-radius:999px;background:rgba(255,255,255,.75)}.kicker{margin:0 0 9px;font-size:12px;font-weight:950;letter-spacing:.12em;text-transform:uppercase;color:#a55412}.date{margin:0 0 18px;color:var(--muted);font-size:14px}.card{position:relative;overflow:hidden;background:rgba(255,253,248,.96);border:1px solid rgba(255,255,255,.95);border-radius:32px;padding:clamp(22px,6vw,46px);box-shadow:var(--shadow)}.bubble{position:absolute;border-radius:50%;opacity:.36}.b1{width:120px;height:120px;background:var(--sun);right:-28px;top:-28px}.b2{width:88px;height:88px;background:var(--rose);left:-30px;bottom:35px}.mood{position:relative;z-index:1;display:inline-flex;align-items:center;gap:7px;background:#fff2c9;color:#9b5b00;border-radius:999px;padding:7px 10px;font-size:11px;font-weight:950}.title{position:relative;z-index:1;margin:17px 0 0;font-size:clamp(38px,9vw,66px);line-height:.98;letter-spacing:-.055em}.label{position:relative;z-index:1;margin-top:11px;color:var(--muted);font-size:12px;font-weight:800}.poem{position:relative;z-index:1;margin:24px 0 0;padding:0;font:700 clamp(22px,5vw,31px)/1.75 Georgia,"Noto Serif Tamil","Tamil MN",serif;white-space:pre-line}.author{position:relative;z-index:1;margin-top:27px;padding-top:20px;border-top:1px solid var(--line)}.authorName{font-size:19px;font-weight:950}.bio{margin:9px 0 0;color:var(--muted);font-size:14px;line-height:1.65}.authorLink{display:inline-flex;margin-top:11px;color:#8b4715;font-weight:850;font-size:13px}.happy{margin-top:18px;background:rgba(255,255,255,.82);border-radius:22px;padding:18px;border:1px solid rgba(255,255,255,.9)}.happy strong{color:#a55412}.happy p{margin:7px 0 0;color:var(--muted);line-height:1.6;font-size:14px}.proof{margin-top:16px;display:grid;gap:13px}.proofBox{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.95);border-radius:24px;padding:20px}.proofHead{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:950;letter-spacing:.08em;text-transform:uppercase;color:var(--leaf)}.proof h2{margin:10px 0 0;font-size:21px;letter-spacing:-.035em}.proof p{margin:9px 0 0;color:var(--muted);font-size:13px;line-height:1.65}.proof a{display:inline-flex;margin-top:12px;color:#8b4715;font-weight:850;font-size:13px}.verified{margin-top:11px;color:var(--muted);font-size:11px}.share{margin-top:17px;background:rgba(255,255,255,.84);border-radius:26px;padding:20px;box-shadow:0 14px 45px rgba(86,56,27,.08)}.share h2{margin:0;font-size:22px;letter-spacing:-.035em}.share>p{margin:7px 0 0;color:var(--muted);font-size:13px;line-height:1.55}.primary{display:grid;grid-template-columns:1fr 72px;gap:10px;margin-top:16px}.primary button,.social button{border:0;border-radius:16px;min-height:52px;font-weight:900;cursor:pointer}.wa{background:#168b55;color:white}.copy{background:#f0e8dd;color:var(--ink)}.social{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}.social button{background:#fff;border:1px solid var(--line);text-align:left;padding:10px 13px;color:var(--ink)}.bottom{margin-top:22px;display:flex;justify-content:center}.archive{display:inline-flex;align-items:center;gap:9px;color:var(--ink);font-weight:950;text-decoration:none;background:#fff;border:1px solid rgba(255,255,255,.95);padding:14px 18px;border-radius:999px}.error{background:#fff;padding:28px;border-radius:24px;color:var(--muted);text-align:center}.toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,14px);opacity:0;background:#29231f;color:#fff;padding:11px 15px;border-radius:999px;font-size:13px;transition:.2s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translate(-50%,0)}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top"><a class="brand" href="/paa/">பா</a><a class="home" href="/">அனைத்து வெளியீடுகள்</a></header>
    <div id="app"><div class="error">கவிதை ஏற்றப்படுகிறது…</div></div>
  </main>
  <div class="toast" id="toast" role="status"></div>
  <script>
    const app=document.getElementById('app'),toast=document.getElementById('toast');
    const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fmt=d=>new Date(d+'T12:00:00').toLocaleDateString('ta-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    const localDate=()=>{const d=new Date(),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`};
    const pageUrl=p=>`${location.origin}/paa/?date=${encodeURIComponent(p.date)}`;
    const shareText=p=>`${p.title}\n\n${p.excerptLines.filter(Boolean).join('\n')}\n\n— ${p.authorDisplay}\n\nசரிபார்க்கப்பட்ட மூலம்: ${p.sourceTitle}\n${pageUrl(p)}`;
    function showToast(t){toast.textContent=t;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),1700)}
    async function load(){try{const r=await fetch(`data.json?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);const data=await r.json();const requested=new URLSearchParams(location.search).get('date');const poems=[...(data.poems||[])].sort((a,b)=>b.date.localeCompare(a.date));const today=localDate();const poem=(requested&&poems.find(x=>x.date===requested))||poems.find(x=>x.date<=today)||poems[0];if(!poem)throw new Error('சரிபார்க்கப்பட்ட கவிதை இல்லை');render(poem)}catch(e){app.innerHTML=`<div class="error"><h2>கவிதை கிடைக்கவில்லை</h2><p>${esc(e.message)}</p></div>`}}
    function render(p){document.title=`${p.title} — ${p.authorDisplay} | பா`;const poem=esc(p.excerptLines.join('\n'));app.innerHTML=`<p class="kicker">இன்றைய மகிழ்ச்சி கவிதை</p><p class="date">${esc(fmt(p.date))}</p><article class="card"><span class="bubble b1"></span><span class="bubble b2"></span><div class="mood">☀ ${esc(p.mood)}</div><h1 class="title">${esc(p.title)}</h1><div class="label">${esc(p.excerptLabel)}</div><blockquote class="poem">${poem}</blockquote><div class="author"><div class="authorName">— ${esc(p.authorDisplay)}</div><p class="bio">${esc(p.authorBio)}</p><a class="authorLink" href="${esc(p.authorEncyclopediaUrl)}" target="_blank" rel="noopener">கவிஞர் கலைக்களஞ்சியப் பக்கம் ↗</a></div></article><section class="happy"><strong>ஏன் இது மகிழ்ச்சி தருகிறது?</strong><p>${esc(p.happyNote)}</p></section><section class="proof"><div class="proofBox"><div class="proofHead">✓ மூலம் சரிபார்க்கப்பட்டது</div><h2>${esc(p.sourceTitle)}</h2><p><strong>${esc(p.sourceType)}</strong><br>${esc(p.verificationNote)}</p><a href="${esc(p.sourceUrl)}" target="_blank" rel="noopener">மூல உரையைத் திறக்க ↗</a><div class="verified">சரிபார்த்த நாள்: ${esc(fmt(p.verifiedOn))}</div></div><div class="proofBox"><div class="proofHead">பதிப்பு குறிப்பு</div><p>${esc(p.editionNote)}</p><p>${esc(p.publicDomainNote)}</p></div></section><section class="share"><h2>இந்தக் கவிதையைப் பகிருங்கள்</h2><p>கவிதை வரிகள், கவிஞர் பெயர், சரிபார்க்கப்பட்ட பக்க இணைப்பு ஆகியவை சேர்க்கப்படும்.</p><div class="primary"><button class="wa" id="wa">WhatsApp-ல் பகிர்</button><button class="copy" id="copy">நகல்</button></div><div class="social"><button data-social="facebook">Facebook</button><button data-social="x">X</button><button data-social="telegram">Telegram</button><button data-social="linkedin">LinkedIn</button><button data-social="email">Email</button><button id="more">மற்ற செயலிகள்</button></div></section><div class="bottom"><a class="archive" href="archive.html">கவிதைத் தொகுப்பு →</a></div>`;wire(p)}
    function wire(p){document.getElementById('wa').onclick=()=>location.href='https://wa.me/?text='+encodeURIComponent(shareText(p));document.getElementById('copy').onclick=async()=>{try{await navigator.clipboard.writeText(shareText(p));showToast('கவிதை நகலெடுக்கப்பட்டது')}catch{showToast('நகலெடுக்க இயலவில்லை')}};document.getElementById('more').onclick=()=>native(p);document.querySelectorAll('[data-social]').forEach(b=>b.onclick=()=>social(b.dataset.social,p))}
    async function native(p){if(navigator.share){try{await navigator.share({title:`${p.title} — ${p.authorDisplay}`,text:p.excerptLines.filter(Boolean).join('\n'),url:pageUrl(p)});return}catch(e){if(e.name==='AbortError')return}}try{await navigator.clipboard.writeText(shareText(p));showToast('இணைப்பு நகலெடுக்கப்பட்டது')}catch{}}
    function social(n,p){const u=encodeURIComponent(pageUrl(p)),t=encodeURIComponent(`${p.title} — ${p.authorDisplay}`),full=encodeURIComponent(shareText(p));if(n==='facebook'){if(navigator.share){native(p);return}window.open(`https://www.facebook.com/sharer/sharer.php?display=popup&u=${u}`,'_blank','noopener,noreferrer,width=720,height=640');return}const urls={x:`https://twitter.com/intent/tweet?text=${t}&url=${u}`,telegram:`https://t.me/share/url?url=${u}&text=${t}`,linkedin:`https://www.linkedin.com/sharing/share-offsite/?url=${u}`};if(n==='email'){location.href=`mailto:?subject=${t}&body=${full}`;return}window.open(urls[n],'_blank','noopener,noreferrer,width=720,height=640')}
    load();
  </script>
</body>
</html>
