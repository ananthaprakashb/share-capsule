  <title>21ஆம் நூற்றாண்டுத் தமிழ்க் கவிதை — பா</title>
  <style>
    :root{--sun:#f3a744;--rose:#f47489;--leaf:#4c9c70;--ink:#29231f;--muted:#736960;--paper:#fffdf8;--line:#ecdfd1;--blue:#e2f4fb;--shadow:0 24px 70px rgba(86,56,27,.13)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;background:radial-gradient(circle at 12% 3%,#fff 0,transparent 28%),radial-gradient(circle at 88% 9%,#ffe693 0,transparent 27%),linear-gradient(155deg,#def4ff,#fff0d8 55%,#ffe6ec);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans Tamil","Tamil Sangam MN","Latha",sans-serif;-webkit-font-smoothing:antialiased}button,a{font:inherit}.shell{width:min(100%,790px);margin:auto;padding:max(18px,env(safe-area-inset-top)) 16px calc(46px + env(safe-area-inset-bottom))}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:24px}.brand{font-weight:950;font-size:27px;color:var(--ink);text-decoration:none}.home{color:var(--muted);text-decoration:none;font-size:13px;font-weight:850;padding:10px 13px;border:1px solid rgba(255,255,255,.9);border-radius:999px;background:rgba(255,255,255,.76)}.policy{margin-bottom:18px;background:rgba(255,255,255,.76);border:1px solid rgba(255,255,255,.92);border-radius:22px;padding:16px 17px;color:var(--muted);font-size:13px;line-height:1.6}.policy strong{display:block;color:#8c4f13;margin-bottom:4px}.kicker{margin:0 0 8px;font-size:12px;font-weight:950;letter-spacing:.1em;text-transform:uppercase;color:#9f5815}.date{margin:0 0 18px;color:var(--muted);font-size:14px}.card{position:relative;overflow:hidden;background:rgba(255,253,248,.97);border:1px solid rgba(255,255,255,.96);border-radius:32px;padding:clamp(23px,6vw,46px);box-shadow:var(--shadow)}.bubble{position:absolute;border-radius:50%;opacity:.34}.b1{width:125px;height:125px;background:var(--sun);right:-30px;top:-30px}.b2{width:92px;height:92px;background:var(--rose);left:-34px;bottom:38px}.badges{position:relative;z-index:1;display:flex;flex-wrap:wrap;gap:8px}.badge{display:inline-flex;border-radius:999px;padding:7px 10px;font-size:11px;font-weight:950}.era{background:#e3f2ff;color:#275f83}.mood{background:#fff0c8;color:#945700}.title{position:relative;z-index:1;margin:17px 0 0;font-size:clamp(38px,9vw,66px);line-height:.98;letter-spacing:-.055em}.label{position:relative;z-index:1;margin-top:12px;color:var(--muted);font-size:12px;font-weight:850}.poem{position:relative;z-index:1;margin:24px 0 0;padding:0;font:700 clamp(22px,5vw,31px)/1.75 Georgia,"Noto Serif Tamil","Tamil MN",serif;white-space:pre-line}.discovery{position:relative;z-index:1;margin-top:24px;background:linear-gradient(145deg,#fff7e7,#f6fbff);border:1px solid var(--line);border-radius:22px;padding:20px}.discovery strong{color:#9c5714}.discovery p{margin:8px 0 0;color:var(--muted);line-height:1.65}.author{position:relative;z-index:1;margin-top:27px;padding-top:20px;border-top:1px solid var(--line)}.authorName{font-size:19px;font-weight:950}.bio{margin:9px 0 0;color:var(--muted);font-size:14px;line-height:1.65}.links{display:flex;flex-wrap:wrap;gap:12px;margin-top:11px}.links a{color:#864816;font-weight:850;font-size:13px}.happy{margin-top:18px;background:rgba(255,255,255,.84);border-radius:22px;padding:18px;border:1px solid rgba(255,255,255,.94)}.happy strong{color:#9f5815}.happy p{margin:7px 0 0;color:var(--muted);line-height:1.6;font-size:14px}.proof{margin-top:16px;display:grid;gap:13px}.proofBox{background:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.96);border-radius:24px;padding:20px}.proofHead{font-size:12px;font-weight:950;letter-spacing:.07em;text-transform:uppercase;color:var(--leaf)}.proof h2{margin:10px 0 0;font-size:21px;letter-spacing:-.035em}.proof p{margin:9px 0 0;color:var(--muted);font-size:13px;line-height:1.65}.proof a{display:inline-flex;margin-top:12px;color:#864816;font-weight:850;font-size:13px}.verified{margin-top:11px;color:var(--muted);font-size:11px}.rights .proofHead{color:#a75d20}.share{margin-top:17px;background:rgba(255,255,255,.86);border-radius:26px;padding:20px;box-shadow:0 14px 45px rgba(86,56,27,.08)}.share h2{margin:0;font-size:22px;letter-spacing:-.035em}.share>p{margin:7px 0 0;color:var(--muted);font-size:13px;line-height:1.55}.primary{display:grid;grid-template-columns:1fr 72px;gap:10px;margin-top:16px}.primary button,.social button{border:0;border-radius:16px;min-height:52px;font-weight:900;cursor:pointer}.wa{background:#168b55;color:#fff}.copy{background:#f0e8dd;color:var(--ink)}.social{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}.social button{background:#fff;border:1px solid var(--line);text-align:left;padding:10px 13px;color:var(--ink)}.bottom{margin-top:22px;display:flex;justify-content:center}.archive{display:inline-flex;color:var(--ink);font-weight:950;text-decoration:none;background:#fff;border:1px solid rgba(255,255,255,.96);padding:14px 18px;border-radius:999px}.error{background:#fff;padding:28px;border-radius:24px;color:var(--muted);text-align:center}.toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,14px);opacity:0;background:#29231f;color:#fff;padding:11px 15px;border-radius:999px;font-size:13px;transition:.2s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translate(-50%,0)}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top"><a class="brand" href="/paa/">பா</a><a class="home" href="/">அனைத்து வெளியீடுகள்</a></header>
    <div id="app"><div class="error">கவிதை அறிமுகம் ஏற்றப்படுகிறது…</div></div>
  </main>
  <div class="toast" id="toast" role="status"></div>
  <script>
    const app=document.getElementById('app'),toast=document.getElementById('toast');
    const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fmt=d=>new Date(d+'T12:00:00').toLocaleDateString('ta-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    const localDate=()=>{const d=new Date(),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`};
    const pageUrl=p=>`${location.origin}/paa/?date=${encodeURIComponent(p.date)}`;
    function shareText(p){const intro=p.contentType==='collection-introduction'?'21ஆம் நூற்றாண்டுத் தமிழ்க் கவிதைத் தொகுப்பு அறிமுகம்':p.excerptLines.filter(Boolean).join('\n');return`${p.title}\n\n${intro}\n\n— ${p.authorDisplay}\n\nசரிபார்க்கப்பட்ட மூலம்: ${p.sourceTitle}\n${pageUrl(p)}`}
    function showToast(t){toast.textContent=t;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),1700)}
    async function load(){try{const r=await fetch(`data.json?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);const data=await r.json();const requested=new URLSearchParams(location.search).get('date');const all=[...(data.poems||[])].sort((a,b)=>b.date.localeCompare(a.date));const today=localDate();let poem=requested?all.find(x=>x.date===requested):null;if(!poem)poem=all.find(x=>x.era==='21st-century'&&x.featured!==false&&x.date<=today)||all.find(x=>x.era==='21st-century')||all[0];if(!poem)throw new Error('சரிபார்க்கப்பட்ட பதிவு இல்லை');render(poem,data.site||{})}catch(e){app.innerHTML=`<div class="error"><h2>பதிவு கிடைக்கவில்லை</h2><p>${esc(e.message)}</p></div>`}}
    function render(p,site){document.title=`${p.title} — ${p.authorDisplay} | பா`;const isDiscovery=p.contentType==='collection-introduction';const body=isDiscovery?`<div class="discovery"><strong>கவிதைத் தொகுப்பு அறிமுகம்</strong><p>இது சமகாலப் படைப்பின் தலைப்பு மற்றும் கவிஞர் அறிமுகம். பதிப்புரிமையை மதித்து முழு கவிதை உரை இங்கு மறுபதிப்பிக்கப்படவில்லை.</p></div>`:`<div class="label">${esc(p.excerptLabel||'சரிபார்க்கப்பட்ட குறுந்தொகுப்பு')}</div><blockquote class="poem">${esc((p.excerptLines||[]).join('\n'))}</blockquote>`;const official=p.authorOfficialUrl?`<a href="${esc(p.authorOfficialUrl)}" target="_blank" rel="noopener">அதிகாரப்பூர்வ தளம் ↗</a>`:'';app.innerHTML=`<section class="policy"><strong>${esc(site.focus||'21ஆம் நூற்றாண்டுத் தமிழ்க் கவிஞர்கள்')}</strong>${esc(site.selectionPolicy||'மூலத்துடன் சரிபார்க்கப்பட்ட சமகாலப் படைப்புகள் மட்டும் முதன்மைப்படுத்தப்படும்.')}</section><p class="kicker">இன்றைய 21ஆம் நூற்றாண்டுக் கவிதை அறிமுகம்</p><p class="date">${esc(fmt(p.date))}</p><article class="card"><span class="bubble b1"></span><span class="bubble b2"></span><div class="badges"><span class="badge era">21ஆம் நூற்றாண்டு${p.publicationYear?` · ${esc(p.publicationYear)}`:''}</span><span class="badge mood">☀ ${esc(p.mood)}</span></div><h1 class="title">${esc(p.title)}</h1>${body}<div class="author"><div class="authorName">— ${esc(p.authorDisplay)}</div><p class="bio">${esc(p.authorBio)}</p><div class="links"><a href="${esc(p.authorEncyclopediaUrl)}" target="_blank" rel="noopener">கவிஞர் கலைக்களஞ்சியப் பக்கம் ↗</a>${official}</div></div></article><section class="happy"><strong>ஏன் இது சுவாரஸ்யமாகவும் மகிழ்ச்சியாகவும் உள்ளது?</strong><p>${esc(p.happyNote)}</p></section><section class="proof"><div class="proofBox"><div class="proofHead">✓ தகவல் சரிபார்க்கப்பட்டது</div><h2>${esc(p.sourceTitle)}</h2><p><strong>${esc(p.sourceType)}</strong><br>${esc(p.verificationNote)}</p><a href="${esc(p.sourceUrl)}" target="_blank" rel="noopener">சரிபார்ப்பு மூலத்தைத் திறக்க ↗</a><div class="verified">சரிபார்த்த நாள்: ${esc(fmt(p.verifiedOn))}</div></div><div class="proofBox rights"><div class="proofHead">பதிப்புரிமை நடைமுறை</div><p>${esc(p.rightsNote||p.editionNote||'உரிமை நிலைக்கு ஏற்ப குறுந்தொகுப்பு அல்லது அறிமுகம் மட்டும் பகிரப்படுகிறது.')}</p></div></section><section class="share"><h2>இந்த அறிமுகத்தைப் பகிருங்கள்</h2><p>படைப்புத் தலைப்பு, கவிஞர் பெயர், சரிபார்க்கப்பட்ட மூலத் தகவல் மற்றும் இந்தப் பக்க இணைப்பு மட்டும் பகிரப்படும்.</p><div class="primary"><button class="wa" id="wa">WhatsApp-ல் பகிர்</button><button class="copy" id="copy">நகல்</button></div><div class="social"><button data-social="facebook">Facebook</button><button data-social="x">X</button><button data-social="telegram">Telegram</button><button data-social="linkedin">LinkedIn</button><button data-social="email">Email</button><button id="more">மற்ற செயலிகள்</button></div></section><div class="bottom"><a class="archive" href="archive.html">21ஆம் நூற்றாண்டு & மரபுத் தொகுப்பு →</a></div>`;wire(p)}
    function wire(p){document.getElementById('wa').onclick=()=>location.href='https://wa.me/?text='+encodeURIComponent(shareText(p));document.getElementById('copy').onclick=async()=>{try{await navigator.clipboard.writeText(shareText(p));showToast('அறிமுகம் நகலெடுக்கப்பட்டது')}catch{showToast('நகலெடுக்க இயலவில்லை')}};document.getElementById('more').onclick=()=>native(p);document.querySelectorAll('[data-social]').forEach(b=>b.onclick=()=>social(b.dataset.social,p))}
    async function native(p){if(navigator.share){try{await navigator.share({title:`${p.title} — ${p.authorDisplay}`,text:'21ஆம் நூற்றாண்டுத் தமிழ்க் கவிதை அறிமுகம்',url:pageUrl(p)});return}catch(e){if(e.name==='AbortError')return}}try{await navigator.clipboard.writeText(shareText(p));showToast('இணைப்பு நகலெடுக்கப்பட்டது')}catch{}}
    function social(n,p){const u=encodeURIComponent(pageUrl(p)),t=encodeURIComponent(`${p.title} — ${p.authorDisplay}`),full=encodeURIComponent(shareText(p));if(n==='facebook'){if(navigator.share){native(p);return}window.open(`https://www.facebook.com/sharer/sharer.php?display=popup&u=${u}`,'_blank','noopener,noreferrer,width=720,height=640');return}const urls={x:`https://twitter.com/intent/tweet?text=${t}&url=${u}`,telegram:`https://t.me/share/url?url=${u}&text=${t}`,linkedin:`https://www.linkedin.com/sharing/share-offsite/?url=${u}`};if(n==='email'){location.href=`mailto:?subject=${t}&body=${full}`;return}window.open(urls[n],'_blank','noopener,noreferrer,width=720,height=640')}
    load();
  </script>
