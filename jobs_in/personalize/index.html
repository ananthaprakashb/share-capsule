<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Personalized India Jobs — Share Capsule</title><style>body{font-family:system-ui;margin:0;background:#eef3f8;color:#17212b}.wrap{max-width:1000px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between}.top a,a{color:inherit;text-decoration:none}.hero{padding:38px 0 18px}.panel{background:white;border-radius:20px;padding:20px;margin:14px 0;box-shadow:0 10px 30px #0001}.drop{display:block;padding:28px;border:2px dashed #aab8c4;border-radius:16px;text-align:center}.control{width:100%;box-sizing:border-box;padding:13px;border:1px solid #ccd6df;border-radius:13px;margin-top:10px}.btn{border:0;background:#17212b;color:white;padding:13px 18px;border-radius:13px;font-weight:700;margin-top:10px}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.chip{background:#e8f0f6;padding:8px 10px;border-radius:999px;font-size:13px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px}.card{background:white;border-radius:18px;padding:18px;box-shadow:0 10px 30px #0001;display:flex;flex-direction:column}.card p{color:#64717c;line-height:1.5}.apply{margin-top:auto;background:#17212b;color:white;padding:12px;border-radius:12px;text-align:center}.privacy{color:#176b4d;font-weight:700}</style></head><body><main class="wrap"><header class="top"><a href="/jobs_in/"><strong>India Jobs</strong></a><a href="/jobs_in/engineering/">Engineering</a></header><section class="hero"><h1>Personalize your India job search</h1><p>Upload a TXT résumé or paste résumé text. The page extracts likely keywords locally and recommends official India job sources.</p><p class="privacy">Your résumé is processed in your browser and is not uploaded.</p></section><section class="panel"><label class="drop">Choose a TXT résumé<input id="file" type="file" accept=".txt,text/plain" hidden></label><textarea id="text" class="control" rows="8" placeholder="Or paste résumé text here"></textarea><button class="btn" id="analyze">Find matching India jobs</button><div class="chips" id="chips"></div></section><section class="grid" id="grid"></section></main><script>const skills=['java','python','javascript','react','node','cloud','aws','azure','gcp','data','machine learning','ai','cybersecurity','devops','sre','sql','product','program','project','operations','finance','risk','sales','marketing','hr','human resources','consulting','supply chain','banking','analytics'];const sources=[['TCS','engineering consulting software cloud data','https://www.tcs.com/careers/india'],['Infosys','engineering software cloud ai data consulting','https://career.infosys.com/'],['Wipro','engineering cloud cybersecurity data consulting','https://careers.wipro.com/careers-home/'],['HCLTech','engineering software infrastructure cloud','https://www.hcltech.com/careers'],['Accenture India','engineering consulting cloud data management','https://www.accenture.com/in-en/careers/jobsearch'],['Microsoft India','software product cloud ai engineering','https://jobs.careers.microsoft.com/global/en/search?lc=India'],['Amazon India','software operations product program management','https://www.amazon.jobs/en/locations/india'],['Tata Group','management operations finance hr sales','https://www.tata.com/careers/jobs'],['Reliance Industries','operations supply chain finance management','https://careers.ril.com/'],['Deloitte India','consulting finance risk management analytics','https://www2.deloitte.com/in/en/careers/search-jobs.html'],['EY India','consulting finance risk management hr','https://careers.ey.com/ey/search/?q=&locationsearch=India'],['HDFC Bank','banking finance risk sales operations','https://www.hdfcbank.com/personal/about-us/careers'],['National Career Service','engineering management operations finance sales','https://www.ncs.gov.in/Pages/Search.aspx']];let fileText='';document.getElementById('file').onchange=async e=>{fileText=await e.target.files[0].text()};document.getElementById('analyze').onclick=()=>{const text=(fileText+' '+document.getElementById('text').value).toLowerCase();const found=skills.filter(k=>text.includes(k));document.getElementById('chips').innerHTML=found.length?found.map(k=>`<span class="chip">${k}</span>`).join(''):'<span>No known keywords found; add more résumé text.</span>';const ranked=sources.map(s=>({...s,score:found.filter(k=>s[1].includes(k)).length})).sort((a,b)=>b.score-a.score);document.getElementById('grid').innerHTML=ranked.map(s=>`<article class="card"><small>${s.score} keyword matches</small><h2>${s[0]}</h2><p>${s[1]}</p><a class="apply" href="${s[2]}" target="_blank" rel="noopener">Search official openings ↗</a></article>`).join('')};</script>  <script src="/site-shell.js" defer></script>
</body></html>
