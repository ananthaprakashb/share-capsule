<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Engineering Jobs in India — Share Capsule</title><style>body{font-family:system-ui;margin:0;background:#eef5f2;color:#17231f}.wrap{max-width:1050px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between}.top a,a{color:inherit;text-decoration:none}.hero{padding:38px 0 20px}.controls{display:grid;grid-template-columns:1fr 220px;gap:10px}.controls input,.controls select{padding:14px;border:1px solid #ccd9d2;border-radius:14px;background:white}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px;margin-top:18px}.card{background:white;border-radius:20px;padding:20px;box-shadow:0 10px 30px #0001;display:flex;flex-direction:column}.card p{color:#607067;line-height:1.55}.btn{margin-top:auto;background:#17231f;color:white;padding:13px;border-radius:12px;text-align:center}.status{margin-top:14px;color:#607067}</style></head><body><main class="wrap"><header class="top"><a href="/jobs_in/"><strong>India Jobs</strong></a><a href="/jobs_in/personalize/">Personalize</a></header><section class="hero"><h1>Engineering jobs in India</h1><p>Search official employer career portals for software, AI, cloud, data, cybersecurity, infrastructure and product-engineering roles.</p></section><section class="controls"><input id="q" placeholder="Search company, skill or role"><select id="type"><option value="all">All engineering areas</option><option value="software">Software & product</option><option value="data">Data & AI</option><option value="cloud">Cloud & infrastructure</option><option value="consulting">Technology consulting</option></select></section><div class="status" id="status"></div><section class="grid" id="grid"></section></main><script>const jobs=[['TCS','consulting','Software, cloud, data, cybersecurity and enterprise technology roles','https://www.tcs.com/careers/india'],['Infosys','consulting','Software engineering, AI, cloud, data and consulting roles','https://career.infosys.com/'],['Wipro','consulting','Engineering, cloud, cybersecurity, data and digital roles','https://careers.wipro.com/careers-home/'],['HCLTech','consulting','Software, infrastructure, engineering and digital roles','https://www.hcltech.com/careers'],['Tech Mahindra','consulting','Software, telecom, cloud and digital-engineering roles','https://careers.techmahindra.com/'],['Accenture India','consulting','Technology, cloud, security, data and application roles','https://www.accenture.com/in-en/careers/jobsearch'],['IBM India','data','Software, AI, data, cloud and research roles','https://www.ibm.com/in-en/careers/search'],['Microsoft India','software','Software engineering, cloud, AI and product roles','https://jobs.careers.microsoft.com/global/en/search?lc=India'],['Amazon India','software','Software development, operations, cloud and data roles','https://www.amazon.jobs/en/locations/india'],['Google India','software','Software, product, cloud, data and security roles','https://www.google.com/about/careers/applications/jobs/results/?location=India'],['Oracle India','cloud','Cloud, database, applications and engineering roles','https://careers.oracle.com/jobs/#en/sites/jobsearch/requisitions?location=India'],['SAP India','software','Enterprise software, cloud, data and product roles','https://jobs.sap.com/search/?locationsearch=India'],['Cisco India','cloud','Networking, security, cloud and software roles','https://jobs.cisco.com/jobs/SearchJobs/?21178=%5B169482%5D&21178_format=6020'],['National Career Service','all','Government-backed India job portal with employer vacancies','https://www.ncs.gov.in/Pages/Search.aspx']];const q=document.getElementById('q'),t=document.getElementById('type'),g=document.getElementById('grid'),s=document.getElementById('status');function r(){let x=jobs.filter(j=>(t.value==='all'||j[1]===t.value||j[1]==='all')&&(!q.value||j.join(' ').toLowerCase().includes(q.value.toLowerCase())));s.textContent=`Showing ${x.length} official sources`;g.innerHTML=x.map(j=>`<article class="card"><small>${j[1]}</small><h2>${j[0]}</h2><p>${j[2]}</p><a class="btn" href="${j[3]}" target="_blank" rel="noopener">Search official openings ↗</a></article>`).join('')}q.oninput=r;t.onchange=r;r()</script></body></html>
