<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Management Jobs in India — Share Capsule</title><style>body{font-family:system-ui;margin:0;background:#f7f3ec;color:#2b2118}.wrap{max-width:1050px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between}.top a,a{color:inherit;text-decoration:none}.hero{padding:38px 0 20px}.controls{display:grid;grid-template-columns:1fr 220px;gap:10px}.controls input,.controls select{padding:14px;border:1px solid #ddd1c3;border-radius:14px;background:white}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px;margin-top:18px}.card{background:white;border-radius:20px;padding:20px;box-shadow:0 10px 30px #0001;display:flex;flex-direction:column}.card p{color:#75675c;line-height:1.55}.btn{margin-top:auto;background:#2b2118;color:white;padding:13px;border-radius:12px;text-align:center}.status{margin-top:14px;color:#75675c}</style></head><body><main class="wrap"><header class="top"><a href="/jobs_in/"><strong>India Jobs</strong></a><a href="/jobs_in/personalize/">Personalize</a></header><section class="hero"><h1>Management jobs in India</h1><p>Search official career portals for operations, consulting, finance, HR, sales, product, program and general-management roles.</p></section><section class="controls"><input id="q" placeholder="Search company or management area"><select id="type"><option value="all">All management areas</option><option value="consulting">Consulting & strategy</option><option value="operations">Operations & program</option><option value="finance">Finance & risk</option><option value="people">HR & people</option><option value="sales">Sales & business</option></select></section><div class="status" id="status"></div><section class="grid" id="grid"></section></main><script>const jobs=[['Tata Group','operations','Business, operations, finance, HR and leadership roles across Tata companies','https://www.tata.com/careers/jobs'],['Reliance Industries','operations','Operations, retail, supply chain, finance and corporate roles','https://careers.ril.com/'],['Aditya Birla Group','operations','Management, finance, HR, sales and operations roles','https://careers.adityabirla.com/'],['Mahindra Group','operations','Business, manufacturing, product, program and leadership roles','https://jobs.mahindracareers.com/'],['HDFC Bank','finance','Banking, finance, risk, operations and relationship-management roles','https://www.hdfcbank.com/personal/about-us/careers'],['ICICI Bank','finance','Banking, operations, risk, sales and management roles','https://www.icicicareers.com/'],['Axis Bank','finance','Retail banking, risk, operations and business roles','https://www.axisbank.com/careers'],['Deloitte India','consulting','Consulting, strategy, risk, finance and transformation roles','https://www2.deloitte.com/in/en/careers/search-jobs.html'],['EY India','consulting','Consulting, strategy, finance, risk and people advisory roles','https://careers.ey.com/ey/search/?q=&locationsearch=India'],['KPMG India','consulting','Advisory, consulting, risk, tax and business roles','https://kpmg.com/in/en/home/careers.html'],['PwC India','consulting','Consulting, deals, risk, finance and operations roles','https://www.pwc.in/careers.html'],['Amazon India','operations','Operations, program, product, category and business-management roles','https://www.amazon.jobs/en/locations/india'],['Flipkart','operations','Category, product, operations, supply chain and business roles','https://www.flipkartcareers.com/#!/joblist'],['National Career Service','all','Government-backed India job portal with employer vacancies','https://www.ncs.gov.in/Pages/Search.aspx']];const q=document.getElementById('q'),t=document.getElementById('type'),g=document.getElementById('grid'),s=document.getElementById('status');function r(){let x=jobs.filter(j=>(t.value==='all'||j[1]===t.value||j[1]==='all')&&(!q.value||j.join(' ').toLowerCase().includes(q.value.toLowerCase())));s.textContent=`Showing ${x.length} official sources`;g.innerHTML=x.map(j=>`<article class="card"><small>${j[1]}</small><h2>${j[0]}</h2><p>${j[2]}</p><a class="btn" href="${j[3]}" target="_blank" rel="noopener">Search official openings ↗</a></article>`).join('')}q.oninput=r;t.onchange=r;r()</script></body></html>
