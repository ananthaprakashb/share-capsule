  <style>
    :root{--bg:#f4f1eb;--ink:#171717;--muted:#6f6a63;--green:#168b55;--line:#e7e0d6;--shadow:0 18px 60px rgba(50,40,28,.10)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at 10% 0,#fff 0,transparent 32%),var(--bg);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}button,input,a{font:inherit}button{cursor:pointer}.shell{width:min(100%,760px);margin:auto;padding:max(16px,env(safe-area-inset-top)) 16px calc(96px + env(safe-area-inset-bottom))}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:4px 2px 18px}.brand{border:0;background:transparent;padding:0;font-weight:900;font-size:20px;letter-spacing:-.045em;color:var(--ink)}.iconBtn{width:44px;height:44px;border:1px solid var(--line);border-radius:50%;background:#fff;color:var(--ink);font-size:19px}.hero{padding:28px 4px 22px}.hero h1{margin:0;font-size:clamp(38px,10vw,68px);line-height:.95;letter-spacing:-.065em}.hero p{margin:14px 0 0;color:var(--muted);font-size:16px;line-height:1.55}.toolbar{display:flex;gap:10px;margin:8px 0 18px}.search{width:100%;height:52px;border:1px solid var(--line);border-radius:17px;background:rgba(255,255,255,.88);padding:0 16px;color:var(--ink);outline:none}.count{white-space:nowrap;display:grid;place-items:center;padding:0 14px;border-radius:17px;background:#ece7de;color:var(--muted);font-size:13px;font-weight:800}.grid{display:grid;grid-template-columns:1fr;gap:15px}@media(min-width:650px){.grid{grid-template-columns:1fr 1fr}}.releaseCard{display:block;text-decoration:none;color:inherit;background:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.9);border-radius:25px;padding:10px;box-shadow:0 12px 38px rgba(50,40,28,.07);transition:transform .18s ease}.releaseCard:hover{transform:translateY(-2px)}.thumb{aspect-ratio:1.25;border-radius:19px;padding:20px;display:flex;align-items:flex-end;color:#fff;overflow:hidden;position:relative;background:#444 center/cover no-repeat}.thumb:after,.cover:after{content:"";position:absolute;width:76%;height:76%;border:1px solid rgba(255,255,255,.22);border-radius:50%;top:-32%;right:-24%}.thumbText,.coverText{position:relative;z-index:1;text-shadow:0 3px 20px rgba(0,0,0,.28)}.eyebrow{text-transform:uppercase;letter-spacing:.15em;font-size:10px;font-weight:850;opacity:.85}.thumbTitle{margin:6px 0 0;font-size:26px;line-height:.98;letter-spacing:-.05em;font-weight:900}.cardMeta{padding:13px 6px 8px}.cardMeta h2{margin:0;font-size:20px;letter-spacing:-.04em}.sub{margin:6px 0 0;color:var(--muted);font-size:13px}.empty,.error{padding:28px;text-align:center;background:#fff;border-radius:24px;color:var(--muted)}.back{border:0;background:transparent;padding:6px 0 16px;font-weight:800;color:var(--muted)}.card{background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.9);border-radius:30px;box-shadow:var(--shadow);overflow:hidden}.cover{aspect-ratio:1;margin:12px;border-radius:23px;padding:24px;display:flex;align-items:flex-end;color:#fff;position:relative;overflow:hidden;background:#444 center/cover no-repeat}.cover h1{font-size:clamp(39px,10vw,58px);line-height:.93;letter-spacing:-.06em;margin:8px 0 0}.coverPlayer{position:absolute;z-index:3;top:24px;right:24px;display:flex;flex-direction:column;align-items:center;gap:12px;width:min(42%,190px)}.coverPlay{width:84px;height:84px;border:2px solid rgba(255,255,255,.78);border-radius:50%;background:rgba(10,20,30,.22);color:#fff;font-size:34px;display:grid;place-items:center;padding:0 0 0 5px;box-shadow:0 12px 36px rgba(0,0,0,.2);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}.coverPlay.playing{padding-left:0;font-size:27px}.coverTrack{width:100%;padding:9px 11px;border:1px solid rgba(255,255,255,.24);border-radius:15px;background:rgba(10,20,30,.24);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}.coverTime{display:flex;justify-content:space-between;gap:10px;margin-bottom:6px;font-size:11px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.35)}.coverBar{height:6px;border-radius:99px;background:rgba(255,255,255,.28);overflow:hidden}.coverFill{height:100%;width:0;border-radius:inherit;background:#fff}.meta{padding:10px 20px 23px}.title{margin:0;font-size:30px;letter-spacing:-.05em}.artist{color:var(--muted);margin:7px 0 10px}.description{color:var(--muted);font-size:14px;line-height:1.55;margin:0 0 20px}.inlinePlayer{margin:18px 0 2px}.playerHead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}.playerHead strong{font-size:14px}.playerHead span{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em}.spotifyFrame{width:100%;height:152px;border:0;border-radius:16px;display:block}.spotifyFrame.tall{height:352px}.videoFrame{width:100%;aspect-ratio:16/9;border:0;border-radius:16px;display:block;background:#000}.playerNote{margin:8px 2px 0;color:var(--muted);font-size:12px}.platforms{display:flex;gap:8px;overflow:auto;margin-top:17px;scrollbar-width:none}.platforms::-webkit-scrollbar{display:none}.pill{white-space:nowrap;border:1px solid var(--line);background:#f6f3ee;padding:10px 13px;border-radius:99px;font-size:13px;font-weight:760;color:#171717;text-decoration:none}.pill.disabled{opacity:.48;cursor:default}.section{margin-top:18px;background:rgba(255,255,255,.82);border-radius:28px;padding:22px 18px;box-shadow:0 12px 40px rgba(50,40,28,.07)}.section h2{margin:0;font-size:23px;letter-spacing:-.04em}.section>p{margin:8px 0 0;color:var(--muted);font-size:14px;line-height:1.5}.chips{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.chip{min-height:62px;border:1px solid var(--line);border-radius:17px;background:#fff;padding:10px 12px;text-align:left;font-weight:780;color:#171717}.chip.active{border-color:#111;box-shadow:inset 0 0 0 1px #111}.chipIcon{font-size:22px;margin-right:7px}.preview{margin-top:14px;background:#efebe4;border-radius:17px;padding:16px}.preview small{display:block;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-size:10px;font-weight:850;margin-bottom:7px}.preview p{white-space:pre-wrap;margin:0;line-height:1.45;font-size:14px}.actions{display:grid;grid-template-columns:1fr 76px;gap:10px;margin-top:14px}.wa,.copy{height:54px;border:0;border-radius:17px;font-weight:850}.wa{background:var(--green);color:#fff}.copy{background:#ece8e1;font-size:14px}.socialTitle{margin:20px 0 10px;font-size:13px;font-weight:850;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.socialShare{display:grid;grid-template-columns:1fr 1fr;gap:10px}.socialBtn{min-height:50px;border:1px solid var(--line);border-radius:16px;background:#fff;color:var(--ink);font-weight:800;text-align:left;padding:10px 13px;display:flex;align-items:center;gap:9px}.socialMark{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;background:#efebe4;font-size:13px;font-weight:900;flex:0 0 auto}.shareHint{margin:11px 2px 0!important;font-size:12px!important}.sticky{position:fixed;left:0;right:0;bottom:0;padding:28px 16px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 65%,transparent);pointer-events:none}.stickyIn{width:min(calc(100% - 32px),728px);margin:auto;display:grid;grid-template-columns:1fr 58px;gap:10px;pointer-events:auto}.sticky button{height:58px;border:0;border-radius:18px;font-weight:850;font-size:16px}.stickyWa{background:var(--green);color:#fff;box-shadow:0 12px 28px rgba(22,139,85,.24)}.native{background:#fff;border:1px solid var(--line)!important;font-size:22px!important}.toast{position:fixed;left:50%;bottom:92px;transform:translate(-50%,15px);background:#171717;color:#fff;padding:11px 15px;border-radius:99px;font-size:13px;opacity:0;transition:.2s;pointer-events:none;white-space:nowrap;z-index:20}.toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:430px){.coverPlayer{top:18px;right:18px;width:38%}.coverPlay{width:68px;height:68px;font-size:28px}.coverTrack{padding:7px 9px}.coverTime{font-size:10px}}

<body>
  <main class="shell">
    <div class="top"><button class="brand" id="homeButton">Share Capsule</button><button class="iconBtn" id="topShare" aria-label="Share with another app">↗</button></div>
    <div id="app" aria-live="polite"></div>
  </main>
  <div id="sticky"></div>
  <div class="toast" id="toast" role="status"></div>
  <script>
    const state={data:null,release:null,audience:null,audio:null,demo:{playing:false,start:0,elapsed:0,timer:null,ctx:null,nodes:[]}};
    const app=document.getElementById('app'),sticky=document.getElementById('sticky'),toastEl=document.getElementById('toast');
    const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const formatDate=s=>{if(!s)return'';const d=new Date(s+'T00:00:00');return Number.isNaN(d.getTime())?s:d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'})};
    const formatTime=s=>{const n=Number(s)||0;return`${Math.floor(n/60)}:${String(Math.floor(n%60)).padStart(2,'0')}`};
    const releaseUrl=slug=>`${location.origin}${location.pathname}?release=${encodeURIComponent(slug)}`;
    function showToast(text){toastEl.textContent=text;toastEl.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toastEl.classList.remove('show'),1700)}
    function coverStyle(r){const image=r.coverImage?`url('${String(r.coverImage).replace(/'/g,"%27")}')`:'';return image||r.coverBackground||'linear-gradient(145deg,#826,#234)'}
    function coverLines(r,small=false){const lines=(r.coverLines?.length?r.coverLines:[r.title]).map(esc).join('<br>');return`<div class="${small?'thumbText':'coverText'}"><div class="eyebrow">${esc(r.coverEyebrow||r.category||'Release')}</div>${small?`<div class="thumbTitle">${lines}</div>`:`<h1>${lines}</h1>`}</div>`}
    function coverPlayerHtml(r){if(!(r.previewUrl||r.demoTone))return'';return`<div class="coverPlayer"><button class="coverPlay" id="play" aria-label="Play ${esc(r.title)}">▶</button><div class="coverTrack"><div class="coverTime"><span id="clock">0:00</span><span id="duration">${formatTime(r.demoDuration||0)}</span></div><div class="coverBar"><div class="coverFill" id="fill"></div></div></div></div>${r.previewUrl?`<audio id="audio" preload="metadata" src="${esc(r.previewUrl)}"></audio>`:''}`}
    function spotifySource(r){const preferred=r.primaryPlayer?.provider?.toLowerCase()==='spotify'?r.primaryPlayer.url:null;const fallback=(r.platforms||[]).find(p=>String(p.label).toLowerCase()==='spotify'&&p.url)?.url;const url=preferred||fallback;if(!url)return null;try{const u=new URL(url),m=u.pathname.match(/^\/(track|album|episode|show|playlist)\/([^/?#]+)/);if(!m)return null;return{type:m[1],url:`https://open.spotify.com/embed/${m[1]}/${m[2]}?utm_source=generator`}}catch{return null}}
    function youtubeSource(r){const preferred=r.primaryPlayer?.provider?.toLowerCase()==='youtube'?r.primaryPlayer.url:null;if(!preferred)return null;try{const u=new URL(preferred);let id='';if(u.hostname==='youtu.be')id=u.pathname.split('/').filter(Boolean)[0]||'';else if(u.hostname.includes('youtube.com'))id=u.searchParams.get('v')||'';return id?`https://www.youtube.com/embed/${encodeURIComponent(id)}?rel=0`:null}catch{return null}}
    function primaryPlayerHtml(r){const youtube=youtubeSource(r);if(youtube)return`<div class="inlinePlayer"><div class="playerHead"><strong>Watch on YouTube</strong><span>Default player</span></div><iframe class="videoFrame" src="${esc(youtube)}" title="YouTube video for ${esc(r.title)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="eager"></iframe><p class="playerNote">Play the video without leaving Share Capsule.</p></div>`;const spotify=spotifySource(r);if(spotify)return`<div class="inlinePlayer"><div class="playerHead"><strong>Play on Spotify</strong><span>Default player</span></div><iframe class="spotifyFrame ${spotify.type==='track'||spotify.type==='episode'?'':'tall'}" src="${esc(spotify.url)}" title="Spotify player for ${esc(r.title)}" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="eager"></iframe><p class="playerNote">Tap play in the embedded Spotify player. No page change required.</p></div>`;return''}
    async function load(){try{const res=await fetch(`data/releases.json?v=${Date.now()}`,{cache:'no-store'});if(!res.ok)throw new Error(`HTTP ${res.status}`);state.data=await res.json();route()}catch(err){app.innerHTML=`<div class="error"><h2>Couldn’t load releases</h2><p>Please refresh the page. ${esc(err.message)}</p></div>`}}
    function route(){stopPlayback(true);const slug=new URLSearchParams(location.search).get('release');if(slug){const r=state.data.releases.find(x=>x.slug===slug);r?renderRelease(r):renderNotFound(slug)}else renderCatalog()}
    function goHome(){history.pushState({},'',location.pathname);route();scrollTo({top:0,behavior:'smooth'})}
    function openRelease(slug){history.pushState({},'',`?release=${encodeURIComponent(slug)}`);route();scrollTo({top:0,behavior:'smooth'})}
    function renderCatalog(){state.release=null;sticky.innerHTML='';document.title=state.data.site?.name||'Share Capsule';document.getElementById('topShare').style.visibility='hidden';const releases=[...state.data.releases].sort((a,b)=>(b.publishedAt||'').localeCompare(a.publishedAt||''));app.innerHTML=`<section class="hero"><h1>${esc(state.data.site?.name||'Share Capsule')}</h1><p>${esc(state.data.site?.tagline||'Audio worth passing on')}. Discover a release, listen, then pass it to someone who may enjoy it.</p></section><div class="toolbar"><input class="search" id="search" type="search" placeholder="Search releases, artists or topics" aria-label="Search releases"><div class="count" id="count">${releases.length} releases</div></div><div class="grid" id="grid"></div>`;renderCards(releases);document.getElementById('search').addEventListener('input',e=>{const q=e.target.value.trim().toLowerCase();const filtered=releases.filter(r=>[r.title,r.artist,r.category,r.language,r.description,...(r.tags||[])].join(' ').toLowerCase().includes(q));renderCards(filtered)})}
    function renderCards(items){const grid=document.getElementById('grid'),count=document.getElementById('count');count.textContent=`${items.length} release${items.length===1?'':'s'}`;grid.innerHTML=items.length?items.map(r=>`<a href="?release=${encodeURIComponent(r.slug)}" class="releaseCard" data-release="${esc(r.slug)}"><div class="thumb" style="background:${coverStyle(r)}">${coverLines(r,true)}</div><div class="cardMeta"><h2>${esc(r.title)}</h2><p class="sub">${esc(r.artist)} · ${esc(r.category||r.type||'Audio')}${r.publishedAt?` · ${esc(formatDate(r.publishedAt))}`:''}</p></div></a>`).join(''):'<div class="empty">No matching releases.</div>';grid.querySelectorAll('[data-release]').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();openRelease(a.dataset.release)}))}
    function renderNotFound(slug){sticky.innerHTML='';document.getElementById('topShare').style.visibility='hidden';app.innerHTML=`<button class="back" id="back">← All releases</button><div class="error"><h2>Release not found</h2><p>No release exists with the slug <strong>${esc(slug)}</strong>.</p></div>`;document.getElementById('back').onclick=goHome}
    function renderRelease(r){state.release=r;const messageKeys=Object.keys(r.shareMessages||{});state.audience=messageKeys[0]||null;document.title=`${r.title} — ${r.artist} | Share Capsule`;document.getElementById('topShare').style.visibility='visible';const platforms=(r.platforms||[]).map(p=>p.url?`<a class="pill" href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.icon||'↗')} ${esc(p.label)}</a>`:`<span class="pill disabled">${esc(p.icon||'•')} ${esc(p.label)}</span>`).join('');const chips=messageKeys.map((k,i)=>{const m=r.shareMessages[k];return`<button class="chip ${i===0?'active':''}" data-audience="${esc(k)}"><span class="chipIcon">${esc(m.icon||'💬')}</span>${esc(m.label||k)}</button>`}).join('');app.innerHTML=`<button class="back" id="back">← All releases</button><section class="card"><div class="cover" style="background:${coverStyle(r)}">${coverLines(r,false)}${coverPlayerHtml(r)}</div><div class="meta"><h1 class="title">${esc(r.title)}</h1><p class="artist">${esc(r.artist)} · ${esc(r.type||'Audio release')}${r.language?` · ${esc(r.language)}`:''}</p>${r.description?`<p class="description">${esc(r.description)}</p>`:''}${primaryPlayerHtml(r)}<div class="platforms">${platforms}</div></div></section><section class="section"><h2>Who would enjoy this?</h2><p>Pick an audience. We’ll prepare a natural message so sharing feels personal, not promotional.</p><div class="chips" id="chips">${chips}</div><div class="preview"><small>Ready to share</small><p id="message"></p></div><div class="actions"><button class="wa" id="wa">Share on WhatsApp</button><button class="copy" id="copy" aria-label="Copy share text">Copy</button></div><div class="socialTitle">Share on social media</div><div class="socialShare"><button class="socialBtn" data-social="facebook"><span class="socialMark">f</span>Facebook</button><button class="socialBtn" data-social="x"><span class="socialMark">𝕏</span>X</button><button class="socialBtn" data-social="telegram"><span class="socialMark">✈</span>Telegram</button><button class="socialBtn" data-social="linkedin"><span class="socialMark">in</span>LinkedIn</button><button class="socialBtn" data-social="reddit"><span class="socialMark">r</span>Reddit</button><button class="socialBtn" data-social="email"><span class="socialMark">✉</span>Email</button><button class="socialBtn" id="moreApps"><span class="socialMark">↗</span>More apps</button></div><p class="shareHint">Use “More apps” for Instagram, Messages and other apps installed on your phone.</p></section>`;sticky.innerHTML='<div class="sticky"><div class="stickyIn"><button class="stickyWa" id="stickyWa">Share on WhatsApp</button><button class="native" id="native" aria-label="Share with another app">↗</button></div></div>';wireRelease(r)}
    function shareCaption(){const r=state.release,m=r.shareMessages?.[state.audience]?.text||'Thought you might enjoy this 🎧';return`${m}\n\n${r.title} — ${r.artist}`}
    function shareText(){const r=state.release;return`${shareCaption()}\n${releaseUrl(r.slug)}`}
    function updateMessage(){const el=document.getElementById('message');if(el)el.textContent=shareText()}
    function wireRelease(r){document.getElementById('back').onclick=goHome;document.getElementById('chips')?.addEventListener('click',e=>{const b=e.target.closest('.chip');if(!b)return;state.audience=b.dataset.audience;document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x===b));updateMessage()});document.getElementById('wa').onclick=openWhatsApp;document.getElementById('stickyWa').onclick=openWhatsApp;document.getElementById('native').onclick=nativeShare;document.getElementById('moreApps').onclick=nativeShare;document.getElementById('copy').onclick=copyShare;document.querySelectorAll('[data-social]').forEach(button=>button.addEventListener('click',()=>openSocial(button.dataset.social)));const play=document.getElementById('play');if(play)play.onclick=()=>togglePlayback(r);updateMessage();if(r.previewUrl)setupAudio()}
    function setPlayState(playing){const play=document.getElementById('play');if(!play)return;play.textContent=playing?'❚❚':'▶';play.classList.toggle('playing',playing);play.setAttribute('aria-label',`${playing?'Pause':'Play'} ${state.release?.title||'audio'}`)}
    function setupAudio(){state.audio=document.getElementById('audio');const audio=state.audio;audio.addEventListener('loadedmetadata',()=>{const duration=document.getElementById('duration');if(duration)duration.textContent=formatTime(audio.duration)});audio.addEventListener('timeupdate',()=>{const fill=document.getElementById('fill'),clock=document.getElementById('clock');if(fill)fill.style.width=`${audio.duration?audio.currentTime/audio.duration*100:0}%`;if(clock)clock.textContent=formatTime(audio.currentTime)});audio.addEventListener('play',()=>setPlayState(true));audio.addEventListener('pause',()=>setPlayState(false));audio.addEventListener('ended',()=>setPlayState(false))}
    async function togglePlayback(r){if(r.previewUrl&&state.audio){state.audio.paused?await state.audio.play():state.audio.pause();return}if(r.demoTone)toggleDemo(r.demoDuration||12)}
    async function toggleDemo(duration){const d=state.demo;if(d.playing){d.elapsed=Math.min(duration,(performance.now()-d.start)/1000);stopDemo(false);return}d.ctx=d.ctx||new(window.AudioContext||window.webkitAudioContext)();await d.ctx.resume();d.playing=true;d.start=performance.now()-d.elapsed*1000;setPlayState(true);const notes=[261.63,329.63,392,329.63,293.66,349.23,440,392],base=d.ctx.currentTime;notes.forEach((f,i)=>{const noteStart=i*2,noteEnd=Math.min(duration,noteStart+2);if(noteEnd<=d.elapsed||noteStart>=duration)return;const o=d.ctx.createOscillator(),g=d.ctx.createGain(),s=Math.max(0,noteStart-d.elapsed),remaining=noteEnd-Math.max(d.elapsed,noteStart);o.type='sine';o.frequency.value=f;o.connect(g);g.connect(d.ctx.destination);g.gain.setValueAtTime(.0001,base+s);g.gain.exponentialRampToValueAtTime(.12,base+s+.06);g.gain.exponentialRampToValueAtTime(.0001,base+s+Math.max(.08,remaining));o.start(base+s);o.stop(base+s+Math.max(.1,remaining));d.nodes.push(o)});d.timer=setInterval(()=>{d.elapsed=(performance.now()-d.start)/1000;const p=Math.min(100,d.elapsed/duration*100),fill=document.getElementById('fill'),clock=document.getElementById('clock');if(fill)fill.style.width=p+'%';if(clock)clock.textContent=formatTime(Math.min(duration,d.elapsed));if(d.elapsed>=duration)stopDemo(true)},100)}
    function stopDemo(reset){const d=state.demo;d.nodes.forEach(n=>{try{n.stop()}catch{}});d.nodes=[];clearInterval(d.timer);d.playing=false;setPlayState(false);if(reset){d.elapsed=0;const fill=document.getElementById('fill'),clock=document.getElementById('clock');if(fill)fill.style.width='0%';if(clock)clock.textContent='0:00'}}
    function stopPlayback(reset){if(state.audio){state.audio.pause();if(reset)state.audio.currentTime=0;state.audio=null}stopDemo(reset)}
    function openWhatsApp(){location.href='https://wa.me/?text='+encodeURIComponent(shareText())}
    function openSocial(network){if(!state.release)return;const r=state.release,url=releaseUrl(r.slug),caption=shareCaption(),title=`${r.title} — ${r.artist}`;const u=encodeURIComponent(url),c=encodeURIComponent(caption),t=encodeURIComponent(title);let target='';switch(network){case'facebook':if(navigator.share){nativeShare();return}target=`https://www.facebook.com/sharer/sharer.php?display=popup&u=${u}`;break;case'x':target=`https://twitter.com/intent/tweet?text=${c}&url=${u}`;break;case'telegram':target=`https://t.me/share/url?url=${u}&text=${c}`;break;case'linkedin':target=`https://www.linkedin.com/sharing/share-offsite/?url=${u}`;break;case'reddit':target=`https://www.reddit.com/submit?url=${u}&title=${t}`;break;case'email':location.href=`mailto:?subject=${t}&body=${encodeURIComponent(shareText())}`;return;default:return}window.open(target,'_blank','noopener,noreferrer,width=720,height=640')}
    async function nativeShare(){if(!state.release)return;const r=state.release,data={title:`${r.title} — ${r.artist}`,text:shareCaption(),url:releaseUrl(r.slug)};if(navigator.share){try{await navigator.share(data);return}catch(e){if(e.name==='AbortError')return}}try{await navigator.clipboard.writeText(shareText());showToast('Link copied — paste it into any app')}catch{openWhatsApp()}}
    async function copyShare(){try{await navigator.clipboard.writeText(shareText());showToast('Share text copied')}catch{showToast('Copy unavailable')}}
    document.getElementById('homeButton').onclick=goHome;document.getElementById('topShare').onclick=nativeShare;window.addEventListener('popstate',route);load();
