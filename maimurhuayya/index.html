திசைக்கு.`,meaning:'சொன்ன வேலைகளை மாற்றமில்லாமல் செய்பவர்களை உடன் கொண்டிருப்பது இனிது. குற்றங்களில் ஈடுபடாமல் கற்பது மிக இனிது. ஏரும் உழவுமாடும் உடையவன் விவசாயம் செய்வது இனிது. செல்லும் திசையில் நன்மை தரும் நட்பைத் தேர்ந்தெடுப்பதும் இனிது.',thought:'நல்ல துணை, கற்றல், உழைப்பு, நல்ல நட்பு — வாழ்க்கையின் நான்கு இனிமைகள்.'},
{book:'இனியவை நாற்பது',author:'பூதஞ்சேந்தனார்',number:'4',text:`யானையுடைய படைகாண்டல்

}
