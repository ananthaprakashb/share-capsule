திசைக்கு.`,meaning:'சொன்ன வேலைகளை மாற்றமில்லாமல் செய்பவர்களை உடன் கொண்டிருப்பது இனிது. குற்றங்களில் ஈடுபடாமல் கற்பது மிக இனிது. ஏரும் உழவுமாடும் உடையவன் விவசாயம் செய்வது இனிது. செல்லும் திசையில் நன்மை தரும் நட்பைத் தேர்ந்தெடுப்பதும் இனிது.',thought:'நல்ல துணை, கற்றல், உழைப்பு, நல்ல நட்பு — வாழ்க்கையின் நான்கு இனிமைகள்.'},
{book:'இனியவை நாற்பது',author:'பூதஞ்சேந்தனார்',number:'4',text:`யானையுடைய படைகாண்டல்
முன்இனிதே ஊனைத்தின்
றூனைப் பெருக்காமை முன்இனிதே
கான்யாற்றடை கரையூர்இனி
தாங்கினிதே மானமுடையார்
மதிப்பு.`,meaning:'அரசன் வலிமையான யானைப் படையை உடையிருப்பது இனிது. பிற உயிரின் தசையை உண்டு உடலை வளர்க்காமல் இருப்பது இனிது. ஆற்றங்கரையில் அமைந்த ஊர் இனிது. அதுபோல மானமுடையவர்களின் மதிப்பைப் பெறுவதும் இனிது.',thought:'வலிமையோடு கருணையும், வாழ்வோடு மரியாதையும் சேர்ந்தால்தான் நிறைவு.'}
];
let index=new Date().getDate()%poems.length;
const $=id=>document.getElementById(id);
function render(){
 const p=poems[index],url=`${location.origin}/marimuthu/?poem=${p.number}`;
 $('source').textContent=`${p.book} · பாடல் ${p.number} · ${p.author}`;
 $('poem').textContent=p.text;$('meaning').textContent=p.meaning;$('thought').textContent=`இன்றைய சிந்தனை: ${p.thought}`;$('count').textContent=`${index+1} / ${poems.length}`;
 const text=`${p.book} — பாடல் ${p.number}\n\n${p.text}\n\n${p.meaning}\n\nசுப மாரிமுத்து அய்யா பகிர்வில் இருந்து`;
 $('wa').href=`https://wa.me/?text=${encodeURIComponent(text+'\n'+url)}`;
 $('fb').href=`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
 $('x').href=`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
 $('native').onclick=async()=>{if(navigator.share)await navigator.share({title:p.book,text,url});else navigator.clipboard.writeText(text+'\n'+url)};
 $('copy').onclick=async()=>{await navigator.clipboard.writeText(url);$('copy').textContent='நகலெடுக்கப்பட்டது';setTimeout(()=>$('copy').textContent='இணைப்பை நகலெடு',1500)};
 history.replaceState(null,'',`?poem=${p.number}`);
}
$('prev').onclick=()=>{index=(index-1+poems.length)%poems.length;render()};$('next').onclick=()=>{index=(index+1)%poems.length;render()};$('random').onclick=()=>{index=Math.floor(Math.random()*poems.length);render()};$('today').onclick=()=>{index=new Date().getDate()%poems.length;render()};
const requested=new URLSearchParams(location.search).get('poem');if(requested){const found=poems.findIndex(p=>p.number===requested);if(found>=0)index=found}render();
</script>
<script src="/site-shell.js" defer></script>
