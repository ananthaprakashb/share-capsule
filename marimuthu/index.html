<!doctype html><html lang="ta"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#173d2a"><meta name="description" content="சுப மாரிமுத்து அய்யா பகிர்வில் இருந்து — தமிழ் நீதி இலக்கியப் பாடல்கள் மற்றும் பொருள்."><meta property="og:title" content="சுப மாரிமுத்து அய்யா பகிர்வு"><meta property="og:url" content="https://sharecapsule.app/marimuthu/"><title>சுப மாரிமுத்து அய்யா பகிர்வு</title><style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700;800&family=Noto+Serif+Tamil:wght@500;600;700&display=swap');:root{--ink:#1d241e;--green:#173d2a;--green2:#2d6041;--cream:#fffaf0;--line:#e8dcc3;--muted:#746d61}*{box-sizing:border-box}body{margin:0;background:linear-gradient(145deg,#f7f3e7,#e5eee2);color:var(--ink);font-family:"Noto Sans Tamil",system-ui,sans-serif}.shell{width:min(100%,980px);margin:auto;padding:26px 14px 96px}.hero{text-align:center;padding:8px 0 20px}.eyebrow{color:var(--green2);font-size:12px;font-weight:800}.hero h1{margin:8px 0;font-family:"Noto Serif Tamil",serif;color:var(--green);font-size:clamp(32px,7vw,56px)}.hero p{margin:auto;max-width:700px;color:var(--muted);line-height:1.7}.controls{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;margin-bottom:18px}.controls button,.navigation button{border:0;border-radius:999px;padding:11px 16px;background:#fff;color:var(--green);font:800 14px inherit;box-shadow:0 8px 22px rgba(45,66,48,.08)}.post{overflow:hidden;background:var(--cream);border:1px solid var(--line);border-radius:30px;box-shadow:0 22px 70px rgba(31,55,38,.14)}.profileBar{display:block;padding:24px 30px;background:linear-gradient(135deg,#173d2a,#2f6544);color:#fff;text-align:center}.profileBar h2{margin:0;font-family:"Noto Serif Tamil",serif;font-size:clamp(24px,5vw,34px)}.profileBar p{margin:7px 0 0;line-height:1.8;color:rgba(255,255,255,.85)}.content{padding:clamp(20px,5vw,38px)}.meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}.pill{padding:8px 11px;border-radius:999px;background:#eef4ee;color:var(--green);font-size:12px;font-weight:800}.poem{margin:0;padding:4px 0 20px;font-family:"Noto Serif Tamil",serif;font-size:clamp(22px,4.5vw,34px);line-height:1.85;white-space:pre-line}.meaning{padding:22px;border-radius:22px;background:#f4eee0;border:1px solid #e3d5b9}.meaning h3,.thought h3{margin:0 0 9px;font-family:"Noto Serif Tamil",serif;color:var(--green)}.meaning p,.thought p{margin:0;line-height:1.9}.thought{margin-top:16px;padding:20px;border-radius:22px;background:linear-gradient(135deg,#173d2a,#2d6041);color:#fff}.thought h3{color:#f8e9bd}.navigation{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.navigation button{border-radius:16px;background:#efe4cc;color:#49371f}.share{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}.share a,.share button{display:grid;place-items:center;min-height:48px;border:1px solid #e5dccb;border-radius:15px;background:#fff;color:#26211b;text-decoration:none;font:800 14px inherit}.counter{text-align:center;color:var(--muted);font-size:12px;margin-top:14px}@media(min-width:680px){.share{grid-template-columns:repeat(5,1fr)}}</style></head><body><main class="shell"><section class="hero"><div class="eyebrow">தமிழ் நீதி இலக்கியம்</div><h1>பாடலும் பொருளும்</h1><p>தமிழ் வாழ்வியல் சிந்தனைகள் — சுப மாரிமுத்து அய்யா பகிர்வில் இருந்து.</p></section><div class="controls"><button id="today">இன்றைய பாடல்</button><button id="random">வேறு பாடல்</button></div><article class="post"><section class="profileBar"><h2>சுப மாரிமுத்து</h2><p>அய்யா பகிர்வில் இருந்து<br>தமிழ் வாழ்வியல் சிந்தனைகள்</p></section><section class="content" data-read-aloud><div class="meta"><span class="pill" id="book"></span><span class="pill" id="number"></span><span class="pill" id="author"></span></div><div class="poem" id="poem"></div><section class="meaning"><h3>விளக்கம் / பொருள்</h3><p id="meaning"></p></section><section class="thought"><h3>இன்றைய சிந்தனை</h3><p id="thought"></p></section><div class="navigation"><button id="prev">← முந்தையது</button><button id="next">அடுத்தது →</button></div><div class="share"><a id="wa" target="_blank" rel="noopener">WhatsApp</a><a id="fb" target="_blank" rel="noopener">Facebook</a><a id="x" target="_blank" rel="noopener">X</a><button id="native">பகிருங்கள்</button><button id="copy">இணைப்பை நகலெடு</button></div><div class="counter" id="counter"></div></section></article></main><script>const poems=[{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"3","text":"ஏவது மாறா இளங்கிளைமை\nமுன்இனிதே நாளும்\nநவைபோகான் கற்றல்\nமிகஇனிதே ஏருடையான்\nவேளாண்மை தானினிது\nஆங்கினிதே தேரிற்கோள் நட்புத்\nதிசைக்கு.","meaning":"சொன்ன வேலையை மாற்றமில்லாமல் செய்வோர் இனிது. குற்றங்களில் ஈடுபடாமல் கற்பது இனிது. ஏரும் உழவுமாடும் உடையவன் விவசாயம் செய்வதும், நன்மை தரும் நட்பைத் தேர்ந்தெடுப்பதும் இனிது.","thought":"நல்ல துணை, கற்றல், உழைப்பு, நல்ல நட்பு — வாழ்க்கையின் நான்கு அடித்தளங்கள்."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"4","text":"யானையுடைய படைகாண்டல்\nமுன்இனிதே ஊனைத்தின்\nறூனைப் பெருக்காமை முன்இனிதே\nகான்யாற்றடை கரையூர்இனி\nதாங்கினிதே மானமுடையார்\nமதிப்பு.","meaning":"அரசன் யானைப் படையை உடையிருப்பது இனிது. உயிர்களை உணவாக்கி உடலை வளர்க்காமை இனிது. ஆற்றங்கரையில் அமைந்த ஊரும் மானமுடையோரின் மதிப்பும் இனிது.","thought":"வலிமையோடு கருணையும், வாழ்வோடு மரியாதையும் சேர வேண்டும்."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"5","text":"கொல்லாமை முன்இனிது\nகோல்கோடி மாராயஞ்\nசெய்யாமை முன்இனிது\nசெங்கோலன் ஆகுதல் எய்தும்\nதிறத்தால் இனிதென்ப\nயார்மட்டும் பொல்லாங்கு\nஉரையாமை நன்கு.","meaning":"கொல்லாமை இனிது. அரசன் நடுநிலை தவறாமல் ஆட்சி செய்வது இனிது. யாரிடமும் குற்றம் கூறாமல் இருப்பதும் மிக இனிது.","thought":"நீதி, உயிர்க்கருணை, பிறரை இகழாமை — நல்ல வாழ்வின் அடிப்படை."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"6","text":"ஆற்றுந் துணையால்\nஅறஞ்செய்கை முன்இனிதே\nபாற்பட்டார் கூறும் பயமொழி\nமாண்பினிதே வாய்ப்புடையராகி\nவலவைகள் அல்லாரைக்\nகாப்படையக் கோடல் இனிது.","meaning":"இயன்ற அளவு அறம் செய்வது இனிது. சான்றோரின் பயனுள்ள சொல் இனிது. செல்வமும் அதிகாரமும் இருந்தும் அகந்தை இல்லாதவரைத் துணையாகக் கொள்வது இனிது.","thought":"அறம் செய்யவும், நல்ல சொல் கேட்கவும், அகந்தையற்ற துணையைத் தேர்ந்தெடுக்கவும்."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"7","text":"அந்தணர் ஓத்துடைமை ஆற்ற\nமிகஇனிதே பந்தம் உடையான்\nபடையாண்மை முன்இனிதே\nதந்தையே ஆயினும்\nதானடங்கான் ஆகுமேல்\nகொண்டடையான் ஆகல் இனிது.","meaning":"வேதம் ஓதுதல், இல்லறத்தில் பாசம், படையுடையவனுக்கு வீரியம் ஆகியவை இனிது. தந்தையே ஆனாலும் தவறானவற்றைச் செய்யாமல் இருப்பதும் இனிது.","thought":"அன்பும் வீரமும் இருந்தாலும், தவறிற்கு இடம் கொடுக்காத மனமே உயர்வு."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"8","text":"ஊருங் கலிமா உரனுடைமை\nமுன்இனிதே தார்புனை மன்னர்\nதமக்குற்ற வெஞ்சமத்துக்\nகார்வரை யானைக்\nகதங்காண்டல் முன்இனிதே\nஆர்வமுடையவர் ஆற்றவும்\nநல்லவை பேதுறார் கேட்டல் இனிது.","meaning":"வீரனுக்கு வலிமையான குதிரை இனிது. போர்க்களத்தில் யானைகளின் வீரத்தைப் பார்ப்பதும், அன்புடையோரின் நல்ல சொற்களை கேட்பதும் இனிது.","thought":"வலிமை செயலில் தெரியும்; அன்பு சொல்லில் தெரியும்."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"9","text":"தங்கணமர்புடையார்\nதாம்வாழ்தல் முன்இனிதே\nஅங்கண் விசும்பின் அகல்நிலாக்\nகாண்பினிதே பங்கமில்\nசெய்கையராகிப்\nபரிந்துயார்க்கும் அன்புடைய\nராதல் இனிது.","meaning":"நண்பர்கள் செல்வத்துடன் வாழ்வது இனிது. அகன்ற வானில் நிலாவைக் காணுதல் இனிது. குற்றமற்ற செயல்களுடன் அன்புடையவராக இருப்பதும் இனிது.","thought":"நண்பரின் வளமும், இயற்கையின் அழகும், குற்றமற்ற அன்பும் மனதை நிறைக்கும்."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"10","text":"கடமுண்டு வாழாமை காண்டல்\nஇனிதே நிறைமாண்பில்\nபெண்டிரை நீக்கல் இனிதே\nமனமாண்பிலாதவரை அஞ்சி\nஅகறல் எனைமாண்பும்\nதான்இனிது நன்கு.","meaning":"கடன் வாங்கி வாழாமல் இருப்பது இனிது. மனப்பெருமை இல்லாதவரை விட்டு விலகுவதும் மிக இனிது.","thought":"கடனற்ற வாழ்வும், கண்ணியமற்ற உறவிலிருந்து விலகலும் மன அமைதியை காக்கும்."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"11","text":"அதர்சென்று வாழாமை ஆற்ற\nஇனிதே குதர்சென்று கொள்ளாத\nகூர்மை இனிதே உயிர்சென்று\nதான்படினும் உண்ணார்கைத்\nதுண்ணாப் பெருமைபோல்\nபீடுடையது இல்.","meaning":"தவறான வழியில் வாழாதிருப்பது இனிது. தவறான முறையில் பொருள் தேடாமை இனிது. உயிர் போனாலும் தகாதவரிடத்து உணவு உண்ணாத தன்னம்பிக்கை மிக உயர்ந்தது.","thought":"வாழ்வை விட கண்ணியத்தை உயர்வாகக் காக்கும் மனமே பெருமை."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"13","text":"மானம் அழிந்தபின் வாழாமை\nமுன்இனிதே தானம் அழியாமைத்\nதானடங்கி வாழ்வினிதே\nஊனமொன்றின்றி உயர்ந்த\nபொருளுடைமை மானிடவர்க்கு\nஎல்லாம் இனிது.","meaning":"மானம் அழிந்தபின் உயிர்வாழாமை எனும் உயர்ந்த கண்ணியம் கூறப்படுகிறது. செல்வம் அழியாதபடி அடக்கமாக வாழ்வதும், குற்றமற்ற பொருளைப் பெறுவதும் இனிது.","thought":"கண்ணியம், அடக்கம், நேர்மையான செல்வம் — மனித உயர்வின் மூன்று தூண்கள்."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"14","text":"குழவி தளர்நடை காண்டல்\nஇனிதே அவர்மழலை கேட்டல்\nஅமிழ்தின் இனிதே\nவினையுடையான் வந்தடைந்து\nவெய்துறும் போது\nமனனஞ்சான் ஆகல் இனிது.","meaning":"குழந்தையின் தளர்நடையைக் காண்பதும் மழலைச் சொற்களை கேட்பதும் அமுதத்தைவிட இனிது. தீய செயலின் விளைவு வந்தபோதும் மனம் அஞ்சாமல் இருப்பதும் இனிது.","thought":"குழந்தைமையின் மகிழ்ச்சியும், சோதனையில் மனத்திடமும் வாழ்வை செழிக்கச் செய்கின்றன."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"15","text":"பிறன்மனை பின்னோக்காப்\nபீடினிது ஆற்ற வறனுழக்கும்\nபைங்கூழ்க்கு வான்சோர்\nவினிதே மறமன்னர்\nதங்கடையுள் மாமலைபோல்\nயானை மதமுழக்கம் கேட்டல் இனிது.","meaning":"பிறருடைய மனைவியை விரும்பாத பெருமை இனிது. நீர் இல்லாமல் வாடும் பயிருக்கு மழை பொழிவது இனிது. வீரமன்னரின் யானை முழக்கத்தைக் கேட்பதும் இனிது.","thought":"ஒழுக்கம் மனிதனை உயர்த்தும்; மழை நிலத்தை உயிர்ப்பிக்கும்."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"16","text":"கற்றார்முன் கல்வி உரைத்தல்\nமிகஇனிதே மிக்காரைச் சேர்தல்\nமிகமாண முன்இனிதே\nஎள்துணையானும் இரவாது\nதான்ஈதல் எத்துணையும்\nஆற்ற இனிது.","meaning":"கற்றவர்முன் தன் கல்வியைப் பகிர்வது இனிது. அறிவில் மேம்பட்டவருடன் சேர்ந்து இருப்பது பெருமை. பிறரிடம் யாசிக்காமல், இயன்ற அளவு பிறருக்கு கொடுப்பதும் மிக இனிது.","thought":"கற்றதைப் பகிர்; மேம்பட்டவருடன் சேர்; இயன்றதை ஈ."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"17","text":"நாட்டார்க்கு நல்ல செயலினிது\nஎத்துணையும் ஒட்டாரை\nஒட்டிக் கொளல் அதனின்\nமுன்இனிதே பற்பல தானியத்தது\nஆகிப் பலருடையும்\nமெய்த்துணையுஞ் சேரல் இனிது.","meaning":"நண்பர்களுக்கு உதவுவது இனிது. பகைவரையும் நட்பாக்கிக் கொள்வது அதைவிட இனிது. பலருடன் உண்மையான பாதுகாப்பும் ஒற்றுமையும் அமைத்துக் கொள்வது இனிது.","thought":"உதவி நட்பை வளர்க்கும்; மன்னிப்பு பகையையும் நட்பாக்கும்."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"18","text":"மன்றின் முதுமக்கள் வாழும்\nபதி இனிதே தந்திரத்தின் வாழும்\nதவசிகள் மாண்பினிதே எஞ்சா\nவிழுச்சீர் இருமுது மக்களைக்\nகண்டெழுதல் காலை இனிது.","meaning":"அறிவுடைய மூத்தோர் வாழும் ஊர் இனிது. அறநெறிப்படி வாழும் தவத்தோரின் மாட்சிமை இனிது. காலையில் தாய் தந்தையரை வணங்கி எழுவது இனிது.","thought":"மூத்தோரின் அறிவையும் பெற்றோரின் அருளையும் மதிப்பதே வாழ்வின் செல்வம்."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"19","text":"நட்டார்ப் புறங்கூறான் வாழ்தல்\nநனிஇனிதே பட்டாங்கு பேணிப்\nபணிந்தொழுதல் முன்இனிதே\nமுட்டில் பெரும்பொருள்\nஆக்கியக்கால் மற்றது தக்குழி\nஈதல் இனிது.","meaning":"நண்பர்களைப் பற்றி புறங்கூறாமல் வாழ்வது இனிது. உண்மையைப் பேணி பணிவுடன் நடப்பது இனிது. பெரும் செல்வம் பெற்றால் தகுதியான தேவையுள்ளோர்க்கு கொடுப்பதும் இனிது.","thought":"நட்பில் நம்பிக்கை, வாழ்வில் உண்மை, செல்வத்தில் பகிர்வு வேண்டும்."},{"book":"இனியவை நாற்பது","author":"பூதஞ்சேந்தனார்","number":"20","text":"சலவாரைச் சாரா விடுதல்\nஇனிதே புலவர்தம் வாய்மொழி\nபோற்றல் இனிதே மலர்தலை\nஞாலத்து மன்னுயிர்க்கெல்லாம்\nதகுதியால் வாழ்தல் இனிது.","meaning":"வஞ்சகரைச் சாராமல் விலகுவது இனிது. அறிவுடையோரின் சொற்களைப் போற்றி நடப்பது இனிது. உலகிலுள்ள எல்லா உயிர்களுடனும் இணக்கமாக வாழ்வதும் இனிது.","thought":"வஞ்சகத்திலிருந்து விலகு; ஞானத்தை ஏற்று; உயிர்களோடு இணங்கி வாழ்."},{"book":"இன்னா நாற்பது","author":"கபிலர்","number":"1","text":"பந்தமில்லாத மனையின்\nவனப்பின்னா தந்தையில்லாத\nபுதல்வன் அழகின்னா அந்தணர்\nஇல்லிருந்து ஊணின்னா\nஆங்கின்னா மந்திரம் வாயா விடின்.","meaning":"சுற்றமில்லாத வீட்டின் அழகு துன்பம். தந்தையில்லாத மகனின் அழகு துன்பம். துறவோர் வீட்டில் உண்பதும், பயனளிக்காத மந்திரமும் துன்பம்.","thought":"உறவு, வழிகாட்டுதல், பொருத்தமான செயல் — இவை இல்லையேல் வெளிப்புற அழகு பயனில்லை."},{"book":"இன்னா நாற்பது","author":"கபிலர்","number":"2","text":"பார்ப்பாரிற் கோழியும் நாயும்\nபுகலின்னா ஆர்த்த மனைவி\nஅடங்காமை நன்கின்னா பாத்தில்\nபுடைவை உடையின்னா\nஆங்கின்னா காப்பாற்றா வேந்தன் உலகு.","meaning":"ஒழுங்குக்கு மாறான சூழல் துன்பம். குடும்பத்தில் ஒற்றுமையின்மை துன்பம். சரியான பகுப்பு இல்லாத உடையும், மக்களை காக்காத அரசனுடைய நாடும் துன்பம்.","thought":"ஒழுங்கும் பொறுப்பும் இல்லாத இடத்தில் அமைதி நிலைக்காது."},{"book":"இன்னா நாற்பது","author":"கபிலர்","number":"3","text":"கொடுங்கோல் மறமன்னர்\nகீழ்வாழ்தல் இன்னா நெடுநீர்\nபுணையின்றி நீந்துதல் இன்னா\nகடுமொழியாளர் தொடர்பின்னா\nஇன்னா தடுமாறி வாழ்தல் உயிர்க்கு.","meaning":"கொடுங்கோல் அரசனின் கீழ் வாழ்வது துன்பம். தெப்பமின்றி பெரிய நீரை கடப்பது துன்பம். கடுமொழி பேசுவோருடன் உறவு துன்பம். மனம் தடுமாறி வாழ்வதும் துன்பம்.","thought":"பாதுகாப்பற்ற சூழலும் கடுமையான உறவும் மன அமைதியை கெடுக்கும்."},{"book":"இன்னா நாற்பது","author":"கபிலர்","number":"4","text":"எருதில் உழவர்க்குப் போகீரம்\nஇன்னா கருவிகள் மாறிப்\nபுறங்கொடுத்தல் இன்னா\nதிருவுடையாரைச் செறலின்னா\nஇன்னா பெருவலியார்க்கு இன்னா செயல்.","meaning":"எருது இல்லாத உழவருக்கு ஈரமான நிலம் துன்பம். கருவிகளை இழந்து போரில் பின்வாங்குதல் துன்பம். செல்வமுடையோரிடம் கோபிப்பதும், வலிமையுடையோர்க்கு தீங்கு செய்வதும் துன்பம்.","thought":"தயாரிப்பில்லாத முயற்சியும் அளவறியாத எதிர்ப்பும் துன்பத்தை தரும்."},{"book":"இன்னா நாற்பது","author":"கபிலர்","number":"5","text":"சிறையில் கரும்பினைக்\nகாத்தோம்பல் இன்னா உறைசேர்\nபழங்கூரை சேர்ந்தொழுகல் இன்னா\nமுறையின்றி ஆளும் அரசின்னா\nஇன்னா மறையின்றிச் செய்யும் வினை.","meaning":"வேலி இல்லாத கரும்புப் பயிரை காப்பது துன்பம். ஒழுகும் பழைய கூரையுள்ள வீட்டில் வாழ்வது துன்பம். நீதி இல்லாத ஆட்சியும், மறைவு இல்லாமல் செய்ய வேண்டியதல்லாத செயலும் துன்பம்.","thought":"பாதுகாப்பு, பராமரிப்பு, நீதி இல்லாத இடத்தில் நிம்மதி இல்லை."}];let index=0;const $=id=>document.getElementById(id);function selectedUrl(p){return `${location.origin}/marimuthu/?book=${encodeURIComponent(p.book)}&poem=${encodeURIComponent(p.number)}`}function render(){const p=poems[index],url=selectedUrl(p);$('book').textContent=p.book;$('number').textContent=`பாடல் ${p.number}`;$('author').textContent=`ஆசிரியர்: ${p.author}`;$('poem').textContent=p.text;$('meaning').textContent=p.meaning;$('thought').textContent=p.thought;$('counter').textContent=`${index+1} / ${poems.length}`;const shareText=`${p.book} — பாடல் ${p.number}\n\n${p.text}\n\n${p.meaning}\n\nசுப மாரிமுத்து அய்யா பகிர்வில் இருந்து`;$('wa').href=`https://wa.me/?text=${encodeURIComponent(shareText+'\n'+url)}`;$('fb').href=`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;$('x').href=`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(url)}`;$('native').onclick=async()=>{if(navigator.share)await navigator.share({title:`${p.book} — பாடல் ${p.number}`,text:shareText,url});else await navigator.clipboard.writeText(shareText+'\n'+url)};$('copy').onclick=async()=>{await navigator.clipboard.writeText(url);$('copy').textContent='நகலெடுக்கப்பட்டது';setTimeout(()=>$('copy').textContent='இணைப்பை நகலெடு',1400)};history.replaceState(null,'',`?book=${encodeURIComponent(p.book)}&poem=${encodeURIComponent(p.number)}`)}$('prev').onclick=()=>{index=(index-1+poems.length)%poems.length;render()};$('next').onclick=()=>{index=(index+1)%poems.length;render()};$('random').onclick=()=>{index=Math.floor(Math.random()*poems.length);render()};$('today').onclick=()=>{index=(new Date().getDate()-1)%poems.length;render()};const qs=new URLSearchParams(location.search),book=qs.get('book'),num=qs.get('poem');const found=poems.findIndex(p=>p.number===num&&(!book||p.book===book));index=found>=0?found:(new Date().getDate()-1)%poems.length;render();</script><script src="/site-shell.js" defer></script>  <script src="/marimuthu-profile.js" defer></script>
