  <title>Today’s Global Legal Principle — Share Capsule Law</title>
  <style>
    :root{--bg:#edf2f6;--paper:#fffdf9;--ink:#17212b;--muted:#65717c;--line:#dbe4eb;--navy:#18324a;--blue:#24658b;--gold:#a86f20;--green:#287253;--red:#9c493f;--shadow:0 24px 72px rgba(22,48,72,.13)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;background:radial-gradient(circle at 10% 0,#fff 0,transparent 32%),linear-gradient(150deg,#edf4f8,#e8edf2 55%,#f4eee6);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}button,a{font:inherit}.shell{width:min(100%,820px);margin:auto;padding:max(18px,env(safe-area-inset-top)) 16px calc(48px + env(safe-area-inset-bottom))}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}.brand{font-size:21px;font-weight:950;letter-spacing:-.045em;color:var(--ink);text-decoration:none}.home{color:var(--muted);text-decoration:none;font-size:13px;font-weight:850;padding:10px 13px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.8)}
    .fm{margin-bottom:20px;background:linear-gradient(135deg,#132f45,#244f68 58%,#8a5b20);color:#fff;border-radius:24px;padding:16px;box-shadow:0 16px 46px rgba(19,47,69,.2)}.fmTop{display:flex;align-items:center;gap:13px}.fmPlay{width:50px;height:50px;flex:0 0 50px;border:1px solid rgba(255,255,255,.55);border-radius:50%;background:rgba(255,255,255,.14);color:#fff;font-size:20px;font-weight:900;cursor:pointer}.fmInfo{min-width:0;flex:1}.fmName{font-size:11px;font-weight:950;letter-spacing:.14em;text-transform:uppercase;color:#cae7f6}.fmTitle{margin-top:4px;font-size:16px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.fmState{margin-top:3px;font-size:11px;color:rgba(255,255,255,.72)}.fmNext{border:1px solid rgba(255,255,255,.38);border-radius:999px;background:transparent;color:#fff;padding:9px 11px;font-size:11px;font-weight:900;cursor:pointer}.fmTrack{margin-top:13px;height:6px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;cursor:pointer}.fmFill{height:100%;width:0;background:#fff;border-radius:99px}.fmTimes{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:rgba(255,255,255,.7)}
    .scope{background:#fff7e8;border:1px solid #efdfbd;border-radius:23px;padding:17px 18px;margin-bottom:20px;color:#66533b;font-size:13px;line-height:1.65}.scope strong{display:block;color:#835616;margin-bottom:4px}.kicker{margin:0 0 8px;color:var(--blue);font-size:12px;font-weight:950;letter-spacing:.13em;text-transform:uppercase}.date{margin:0 0 18px;color:var(--muted);font-size:14px}.card{position:relative;overflow:hidden;background:rgba(255,253,249,.97);border:1px solid rgba(255,255,255,.95);border-radius:32px;padding:clamp(24px,6vw,46px);box-shadow:var(--shadow)}.seal{position:absolute;right:-24px;top:-31px;width:150px;height:150px;border-radius:50%;display:grid;place-items:center;background:#e3edf4;color:#c6d8e5;font:900 72px/1 Georgia,serif}.category{position:relative;z-index:1;display:inline-flex;background:#e6f1f8;color:var(--blue);padding:7px 10px;border-radius:999px;font-size:11px;font-weight:950;letter-spacing:.08em;text-transform:uppercase}.title{position:relative;z-index:1;margin:18px 0 0;font-size:clamp(38px,8.5vw,63px);line-height:.98;letter-spacing:-.058em}.plain{position:relative;z-index:1;margin:19px 0 0;font-size:20px;line-height:1.52;font-weight:760}.meaning{position:relative;z-index:1;margin-top:23px;padding:18px;border-radius:20px;background:#f1f6f9;color:#43515c;font-size:14px;line-height:1.65}.meaning strong{color:var(--ink)}.steps{position:relative;z-index:1;margin:23px 0 0;padding:0;list-style:none;display:grid;gap:11px}.steps li{display:grid;grid-template-columns:30px 1fr;gap:10px;color:#34434e;line-height:1.5}.steps span{width:30px;height:30px;border-radius:50%;background:#e6eef3;color:var(--navy);display:grid;place-items:center;font-size:12px;font-weight:950}.takeaway{position:relative;z-index:1;margin-top:23px;border-left:4px solid var(--gold);padding:4px 0 4px 15px;color:#554a3c;line-height:1.58}.panels{display:grid;gap:14px;margin-top:18px}.panel{background:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.96);border-radius:25px;padding:21px}.panelHead{font-size:12px;font-weight:950;letter-spacing:.08em;text-transform:uppercase}.basis .panelHead{color:var(--green)}.incident .panelHead{color:var(--gold)}.local .panelHead{color:var(--red)}.panel h2{margin:10px 0 0;font-size:22px;letter-spacing:-.04em}.panel p{margin:9px 0 0;color:var(--muted);font-size:13px;line-height:1.65}.panel a{display:inline-flex;margin-top:12px;color:var(--blue);font-weight:850;font-size:13px}.sources{display:flex;flex-wrap:wrap;gap:12px}.validated{margin-top:12px;color:var(--muted);font-size:11px}.share{margin-top:18px;background:rgba(255,255,255,.86);border-radius:27px;padding:20px;box-shadow:0 14px 45px rgba(22,48,72,.08)}.share h2{margin:0;font-size:22px;letter-spacing:-.035em}.share>p{margin:7px 0 0;color:var(--muted);font-size:13px;line-height:1.55}.primary{display:grid;grid-template-columns:1fr 72px;gap:10px;margin-top:16px}.primary button,.social button{border:0;border-radius:16px;min-height:52px;font-weight:900;cursor:pointer}.wa{background:#168b55;color:#fff}.copy{background:#e8edf1;color:var(--ink)}.social{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}.social button{background:#fff;border:1px solid var(--line);text-align:left;padding:10px 13px;color:var(--ink)}.bottom{margin-top:22px;display:flex;justify-content:center}.archive{display:inline-flex;color:var(--ink);font-weight:950;text-decoration:none;background:#fff;border:1px solid var(--line);padding:14px 18px;border-radius:999px}.error{background:#fff;padding:28px;border-radius:24px;color:var(--muted);text-align:center}.toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,14px);opacity:0;background:#17212b;color:#fff;padding:11px 15px;border-radius:999px;font-size:13px;transition:.2s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translate(-50%,0)}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top"><a class="brand" href="/law/">Share Capsule Law</a><a class="home" href="/">All releases</a></header>
    <section class="fm" id="fm" aria-label="ShareCapsule FM audio player">
      <div class="fmTop"><button class="fmPlay" id="fmPlay" type="button" aria-label="Play ShareCapsule FM">▶</button><div class="fmInfo"><div class="fmName">ShareCapsule FM</div><div class="fmTitle" id="fmTitle">Finding a random audio article…</div><div class="fmState" id="fmState">Loading</div></div><button class="fmNext" id="fmNext" type="button">Next</button></div>
      <div class="fmTrack" id="fmTrack" aria-label="Audio progress"><div class="fmFill" id="fmFill"></div></div><div class="fmTimes"><span id="fmCurrent">0:00</span><span id="fmDuration">0:00</span></div><audio id="fmAudio" preload="metadata"></audio>
    </section>
    <div id="app"><div class="error">Loading today’s validated legal principle…</div></div>
  </main>
  <div class="toast" id="toast" role="status"></div>
  <script>
    const app=document.getElementById('app'),toast=document.getElementById('toast');
    const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fmt=d=>new Date(d+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    const localDate=()=>{const d=new Date(),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`};
    const daysBetween=(a,b)=>Math.floor((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000);
    function principleForDate(data,date){const list=data.principles||[];if(!list.length)return null;const offset=daysBetween(data.site?.startDate||'2026-07-12',date);return list[((offset%list.length)+list.length)%list.length]}
    const pageUrl=date=>`${location.origin}/law/?date=${encodeURIComponent(date)}`;
    const shareText=(p,date)=>`${p.title}\n\n${p.plainRule}\n\nReal incident: ${p.incidentTitle}\nGlobal basis: ${p.globalBasis}\n\n${pageUrl(date)}`;
    function showToast(t){toast.textContent=t;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),1700)}
    async function load(){try{const r=await fetch(`data.json?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);const data=await r.json();const requested=new URLSearchParams(location.search).get('date');const date=/^\d{4}-\d{2}-\d{2}$/.test(requested||'')?requested:localDate();const principle=principleForDate(data,date);if(!principle)throw new Error('No validated legal principles are available');render(principle,date,data.site||{})}catch(e){app.innerHTML=`<div class="error"><h2>Legal principle unavailable</h2><p>${esc(e.message)}</p></div>`}}
    function render(p,date,site){document.title=`${p.title} | Share Capsule Law`;const steps=(p.practicalSteps||[]).map((x,i)=>`<li><span>${i+1}</span><div>${esc(x)}</div></li>`).join('');app.innerHTML=`<section class="scope"><strong>Global principle, local law varies</strong>${esc(site.scopeNote||'International standards are not identical to domestic law. Check the rules where you live.')}</section><p class="kicker">Today’s validated legal principle</p><p class="date">${esc(fmt(date))}</p><article class="card"><div class="seal">§</div><div class="category">${esc(p.category)}</div><h1 class="title">${esc(p.title)}</h1><p class="plain">${esc(p.plainRule)}</p><div class="meaning"><strong>What it means in daily life:</strong> ${esc(p.everydayMeaning)}</div><ol class="steps">${steps}</ol><div class="takeaway"><strong>Key takeaway:</strong> ${esc(p.takeaway)}</div></article><section class="panels"><div class="panel basis"><div class="panelHead">✓ International legal basis</div><h2>${esc(p.globalBasis)}</h2><p>The cited instruments establish the broad principle. Domestic implementation, enforcement and remedies differ.</p><div class="sources"><a href="${esc(p.globalSourceUrl)}" target="_blank" rel="noopener">${esc(p.globalSourceTitle)} ↗</a><a href="${esc(p.secondaryGlobalSourceUrl)}" target="_blank" rel="noopener">${esc(p.secondaryGlobalSourceTitle)} ↗</a></div></div><div class="panel incident"><div class="panelHead">Documented real incident</div><h2>${esc(p.incidentTitle)}</h2><p><strong>${esc(p.incidentJurisdiction)} · ${esc(fmt(p.incidentDate))}</strong><br>${esc(p.incidentSummary)}</p><p><strong>Outcome:</strong> ${esc(p.incidentOutcome)}</p><a href="${esc(p.incidentSourceUrl)}" target="_blank" rel="noopener">Read the official incident source ↗</a><div class="validated">Validated on ${esc(fmt(p.validatedOn))}</div></div><div class="panel local"><div class="panelHead">Check your local law</div><p>${esc(p.localLawWarning)}</p><p>This page is public legal education, not legal advice for a specific person or case.</p></div></section><section class="share"><h2>Share this legal principle</h2><p>The plain-language rule, real incident, global basis and permanent dated page link will be included.</p><div class="primary"><button class="wa" id="wa">Share on WhatsApp</button><button class="copy" id="copy">Copy</button></div><div class="social"><button data-social="facebook">Facebook</button><button data-social="x">X</button><button data-social="telegram">Telegram</button><button data-social="linkedin">LinkedIn</button><button data-social="email">Email</button><button id="more">More apps</button></div></section><div class="bottom"><a class="archive" href="archive.html">Previous legal principles →</a></div>`;wire(p,date)}
    function wire(p,date){document.getElementById('wa').onclick=()=>location.href='https://wa.me/?text='+encodeURIComponent(shareText(p,date));document.getElementById('copy').onclick=async()=>{try{await navigator.clipboard.writeText(shareText(p,date));showToast('Legal principle copied')}catch{showToast('Copy unavailable')}};document.getElementById('more').onclick=()=>native(p,date);document.querySelectorAll('[data-social]').forEach(b=>b.onclick=()=>social(b.dataset.social,p,date))}
    async function native(p,date){if(navigator.share){try{await navigator.share({title:p.title,text:p.plainRule,url:pageUrl(date)});return}catch(e){if(e.name==='AbortError')return}}try{await navigator.clipboard.writeText(shareText(p,date));showToast('Copied — paste into any app')}catch{}}
    function social(n,p,date){const u=encodeURIComponent(pageUrl(date)),t=encodeURIComponent(`${p.title}: ${p.plainRule}`),full=encodeURIComponent(shareText(p,date));if(n==='facebook'){if(navigator.share){native(p,date);return}window.open(`https://www.facebook.com/sharer/sharer.php?display=popup&u=${u}`,'_blank','noopener,noreferrer,width=720,height=640');return}const urls={x:`https://twitter.com/intent/tweet?text=${t}&url=${u}`,telegram:`https://t.me/share/url?url=${u}&text=${t}`,linkedin:`https://www.linkedin.com/sharing/share-offsite/?url=${u}`};if(n==='email'){location.href=`mailto:?subject=${encodeURIComponent(p.title)}&body=${full}`;return}window.open(urls[n],'_blank','noopener,noreferrer,width=720,height=640')}

    const fmAudio=document.getElementById('fmAudio'),fmPlay=document.getElementById('fmPlay'),fmNext=document.getElementById('fmNext'),fmTitle=document.getElementById('fmTitle'),fmState=document.getElementById('fmState'),fmFill=document.getElementById('fmFill'),fmTrack=document.getElementById('fmTrack'),fmCurrent=document.getElementById('fmCurrent'),fmDuration=document.getElementById('fmDuration');
    let fmItems=[],fmIndex=-1;
    const time=v=>{v=Math.max(0,Number(v)||0);return`${Math.floor(v/60)}:${String(Math.floor(v%60)).padStart(2,'0')}`};
    const randomIndex=()=>{if(fmItems.length<2)return 0;let i;do{i=Math.floor(Math.random()*fmItems.length)}while(i===fmIndex);return i};
    function setFmItem(index,autoplay=true){if(!fmItems.length)return;fmIndex=index;const item=fmItems[index];fmAudio.src=item.mediaUrl;fmTitle.textContent=item.title;fmState.textContent=`${item.language||'Audio'} · ${item.category||'Article'}`;fmFill.style.width='0%';fmCurrent.textContent='0:00';fmDuration.textContent='0:00';fmPlay.textContent='▶';fmPlay.setAttribute('aria-label',`Play ${item.title}`);if(autoplay)attemptFmAutoplay()}
    async function attemptFmAutoplay(){try{await fmAudio.play();fmState.textContent='Playing automatically'}catch{fmState.textContent='Autoplay blocked — tap play to listen';fmPlay.textContent='▶'}}
    async function loadFm(){try{const r=await fetch(`/audio/data.json?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);const data=await r.json();fmItems=(data.audio||[]).filter(x=>x.mediaUrl&&String(x.mimeType||'').startsWith('audio/'));if(!fmItems.length)throw new Error('No audio articles available');setFmItem(randomIndex(),true)}catch(e){fmTitle.textContent='Audio unavailable';fmState.textContent=e.message;fmPlay.disabled=true;fmNext.disabled=true}}
    fmPlay.onclick=()=>fmAudio.paused?fmAudio.play().catch(()=>{fmState.textContent='Tap again or check audio permissions'}):fmAudio.pause();
    fmNext.onclick=()=>setFmItem(randomIndex(),true);
    fmAudio.onplay=()=>{fmPlay.textContent='❚❚';fmPlay.setAttribute('aria-label','Pause ShareCapsule FM');fmState.textContent='Playing'};
    fmAudio.onpause=()=>{fmPlay.textContent='▶';fmPlay.setAttribute('aria-label','Play ShareCapsule FM');if(fmAudio.currentTime>0&&!fmAudio.ended)fmState.textContent='Paused'};
    fmAudio.onloadedmetadata=()=>fmDuration.textContent=time(fmAudio.duration);
    fmAudio.ontimeupdate=()=>{fmCurrent.textContent=time(fmAudio.currentTime);fmFill.style.width=`${fmAudio.duration?fmAudio.currentTime/fmAudio.duration*100:0}%`};
    fmAudio.onended=()=>setFmItem(randomIndex(),true);
    fmTrack.onclick=e=>{if(!fmAudio.duration)return;const r=fmTrack.getBoundingClientRect();fmAudio.currentTime=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*fmAudio.duration};
    load();loadFm();
  </script>
