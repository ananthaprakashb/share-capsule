name: Publish daily story

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: Publish immediately, ignoring the Pacific-time gate
        required: false
        default: 'true'
  push:
    branches:
      - main
      - agent/add-daily-story-endpoint
    paths:
      - story/data.json
      - story/import-blogger-story.mjs
      - .github/workflows/publish-daily-story.yml

permissions:
  contents: write

concurrency:
  group: publish-daily-story
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Import one Blogger story
        env:
          FORCE_NOW: ${{ github.event_name != 'schedule' || inputs.force == 'true' }}
        run: |
          if [ "$FORCE_NOW" = "true" ]; then
            node story/import-blogger-story.mjs --force
          else
            node story/import-blogger-story.mjs
          fi
      - name: Validate story catalog
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('story/data.json', 'utf8'));
          const ids = new Set();
          const urls = new Set();
          for (const story of data.stories || []) {
            for (const key of ['id','title','author','contentText','sourceUrl','publishedOn']) {
              if (!story[key]) throw new Error(`Story missing ${key}`);
            }
            if (ids.has(story.id)) throw new Error(`Duplicate story id: ${story.id}`);
            if (urls.has(story.sourceUrl)) throw new Error(`Duplicate source URL: ${story.sourceUrl}`);
            if (!story.sourceUrl.startsWith('https://thinkfiveminutes.blogspot.com/')) throw new Error(`Untrusted source: ${story.sourceUrl}`);
            ids.add(story.id);
            urls.add(story.sourceUrl);
          }
          console.log(`Validated ${ids.size} stories.`);
          NODE
      - name: Commit published story
        run: |
          if git diff --quiet -- story/data.json; then
            echo "No new story to commit."
            exit 0
          fi
          git config user.name share-capsule-bot
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add story/data.json
          git commit -m "Publish daily story"
          git push
