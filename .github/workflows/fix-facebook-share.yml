name: Fix Facebook mobile sharing

on:
  push:
    branches: [main]
    paths:
      - 'automation/fix-facebook-share.txt'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Route Facebook through native share on supported devices
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = "case'facebook':target=`https://www.facebook.com/sharer/sharer.php?u=${u}&quote=${c}`;break;"
          new = "case'facebook':if(navigator.share){nativeShare();return}target=`https://www.facebook.com/sharer/sharer.php?display=popup&u=${u}`;break;"
          if old not in text:
              raise SystemExit('Facebook share implementation was not found')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')

      - name: Commit fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m 'Use native share sheet for Facebook on mobile [skip ci]'
          git push origin HEAD:main
