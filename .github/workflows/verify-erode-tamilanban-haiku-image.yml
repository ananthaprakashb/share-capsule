name: Verify Erode Tamilanban poem image

on:
  pull_request:
    paths:
      - 'automation/verify-erode-tamilanban-haiku-image.txt'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Tamil OCR
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr tesseract-ocr-tam
          pip install requests pillow

      - name: Download and inspect author-owned poem image
        shell: python
        run: |
          import json, subprocess, requests
          from pathlib import Path
          from PIL import Image

          image_url='https://erodetamilanban.com/wp-content/uploads/2020/10/oru-thuli-kavithai-web.jpg'
          headers={'User-Agent':'ShareCapsuleTamilHaikuVerifier/1.2 (ananthaprakashb@gmail.com)'}
          r=requests.get(image_url,headers=headers,timeout=60)
          r.raise_for_status()
          img_path=Path('/tmp/oru-thuli-kavithai-web.jpg')
          img_path.write_bytes(r.content)
          image=Image.open(img_path)
          ocr=subprocess.run(['tesseract',str(img_path),'stdout','-l','tam+eng','--psm','6'],capture_output=True,text=True,check=True)
          output={
              'imageUrl':image_url,
              'hostPage':'https://erodetamilanban.com/நதிமூலம்/',
              'authorSite':'https://erodetamilanban.com/',
              'imageSize':{'width':image.width,'height':image.height},
              'ocrText':ocr.stdout.strip(),
              'verificationStatus':'requires_manual_review',
              'note':'OCR is only a reading aid. Do not publish unless the text is semantically coherent and attribution is supported by the author-owned host page.'
          }
          Path('tulip/erode-tamilanban-image-verification.json').write_text(json.dumps(output,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          Path('automation/verify-erode-tamilanban-haiku-image.txt').unlink(missing_ok=True)

      - name: Commit verification result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tulip/erode-tamilanban-image-verification.json automation/verify-erode-tamilanban-haiku-image.txt
          git diff --cached --quiet && exit 0
          git commit -m 'Verify Erode Tamilanban poem image text'
          git push origin HEAD:${{ github.head_ref }}
