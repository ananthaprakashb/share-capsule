name: Publish verified daily news content

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/publish-daily-news-content.mjs
      - scripts/daily-news-content-library.json
      - .github/workflows/publish-daily-news-content.yml
  schedule:
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"

permissions:
  contents: write

concurrency:
  group: publish-daily-news-content
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Keep execution at 8 AM Pacific
        if: github.event_name == 'schedule'
        run: |
          HOUR=$(TZ=America/Los_Angeles date +%H)
          test "$HOUR" = "08" || { echo "Not 8 AM Pacific; exiting."; exit 0; }
      - name: Select and validate daily items
        run: node scripts/publish-daily-news-content.mjs
      - name: Validate generated JSON
        run: |
          node -e "for(const p of ['tip/data.json','paa/data.json','law/data.json','tulip/data.json'])JSON.parse(require('fs').readFileSync(p))"
      - name: Commit daily items
        run: |
          if git diff --quiet -- tip/data.json paa/data.json law/data.json tulip/data.json; then
            echo "No daily content changes."
            exit 0
          fi
          git config user.name share-capsule-bot
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tip/data.json paa/data.json law/data.json tulip/data.json
          git commit -m "Publish verified daily news-matched content"
          git push
