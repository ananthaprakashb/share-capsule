name: Normalize Arupadai Anandham release

on:
  push:
    branches: [main]
    paths:
      - 'automation/normalize-arupadai-anandham.txt'

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Normalize source catalog entry
        shell: python
        run: |
          import json

          path = 'data/channel-catalog.json'
          with open(path, encoding='utf-8') as f:
              data = json.load(f)

          found = False
          for item in data.get('items', []):
              if '52gsUH3W3KMRpkt2fSj6gA' in str(item.get('spotifyUrl') or ''):
                  item['slug'] = 'arupadai-anandham'
                  item['title'] = 'ஆறுபடை ஆனந்தம்'
                  item['artist'] = 'தமிழாலே'
                  item['category'] = 'Tamil Music'
                  item['language'] = 'Tamil'
                  item['music'] = True
                  item['description'] = 'A Tamil devotional music release by தமிழாலே.'
                  item['coverLines'] = ['ஆறுபடை', 'ஆனந்தம்']
                  found = True
                  break

          if not found:
              raise SystemExit('Release 52gsUH3W3KMRpkt2fSj6gA not found')

          with open(path, 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
              f.write('\n')

      - name: Commit normalized source entry
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/channel-catalog.json
          git diff --cached --quiet && exit 0
          git commit -m 'Normalize Arupadai Anandham release metadata'
          git push origin HEAD:main
