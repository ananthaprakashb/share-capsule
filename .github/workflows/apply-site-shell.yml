name: Apply shared FM and breadcrumbs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "site-shell.js"
      - "home-marimuthu-today.js"
      - "marimuthu-profile.js"
      - "marimuthu-recent.js"
      - "marimuthu-batches.js"
      - "marimuthu/data/**"
      - "scripts/apply-site-shell.mjs"
      - ".github/workflows/apply-site-shell.yml"

permissions:
  contents: write

concurrency:
  group: apply-site-shell
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Add the shared shell to every HTML page
        run: node scripts/apply-site-shell.mjs
      - name: Validate and commit page coverage
        run: |
          node --check site-shell.js
          node --check home-marimuthu-today.js
          node --check marimuthu-profile.js
          node --check marimuthu-recent.js
          node --check marimuthu-batches.js
          node --check scripts/apply-site-shell.mjs
          node -e "const fs=require('fs');for(const f of fs.readdirSync('marimuthu/data').filter(x=>x.endsWith('.json')))JSON.parse(fs.readFileSync('marimuthu/data/'+f,'utf8'))"
          missing=$(find . -type f -name '*.html' -not -path './.git/*' -not -path './node_modules/*' -print0 | xargs -0 grep -L '/site-shell.js' || true)
          if [ -n "$missing" ]; then echo "Missing site shell in:"; echo "$missing"; exit 1; fi
          if ! grep -q '/home-marimuthu-today.js' index.html; then echo "Homepage is missing today's Marimuthu article card"; exit 1; fi
          marimuthu_missing=$(find marimuthu -type f -name '*.html' -print0 | xargs -0 grep -L '/marimuthu-profile.js' || true)
          if [ -n "$marimuthu_missing" ]; then echo "Missing Marimuthu author image renderer in:"; echo "$marimuthu_missing"; exit 1; fi
          marimuthu_recent_missing=$(find marimuthu -type f -name '*.html' -print0 | xargs -0 grep -L '/marimuthu-recent.js' || true)
          if [ -n "$marimuthu_recent_missing" ]; then echo "Missing recent Marimuthu poem collection in:"; echo "$marimuthu_recent_missing"; exit 1; fi
          marimuthu_batches_missing=$(find marimuthu -type f -name '*.html' -print0 | xargs -0 grep -L '/marimuthu-batches.js' || true)
          if [ -n "$marimuthu_batches_missing" ]; then echo "Missing Marimuthu batch loader in:"; echo "$marimuthu_batches_missing"; exit 1; fi
          if git diff --quiet -- '*.html'; then echo "All HTML pages already include the shared shell."; exit 0; fi
          git config user.name share-capsule-bot
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add '*.html' ':!node_modules'
          git commit -m "Keep FM and breadcrumbs on every page"
          git push
