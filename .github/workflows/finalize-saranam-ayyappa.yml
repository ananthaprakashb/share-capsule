name: Finalize Saranam Ayyappa release

on:
  push:
    branches: [main]
    paths:
      - 'automation/finalize-saranam-ayyappa.txt'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Write finalized release into live catalog
        shell: python
        run: |
          import json
          from urllib.parse import quote

          source_path = 'data/channel-catalog.json'
          releases_path = 'data/releases.json'
          spotify_id = '35zsu1UWLZjZqkUazDlJIj'

          with open(source_path, encoding='utf-8') as f:
              source = json.load(f)
          with open(releases_path, encoding='utf-8') as f:
              live = json.load(f)

          item = next(
              x for x in source.get('items', [])
              if spotify_id in str(x.get('spotifyUrl') or '')
          )

          youtube_id = (item.get('videoIds') or ['GB5C6Uf-aVs'])[0]
          title = item.get('title') or 'சரணம் ஐயப்பா'
          artist = item.get('artist') or 'தமிழாலே'

          platforms = [
              {'label': 'Spotify', 'icon': '●', 'url': item['spotifyUrl']},
              {'label': 'Apple Music', 'icon': '♫', 'url': item['appleUrl']},
              {
                  'label': 'Amazon Music search',
                  'icon': 'a',
                  'url': 'https://music.amazon.com/search/' + quote(f'{title} {artist}', safe='')
              },
              {'label': 'YouTube', 'icon': '▶', 'url': f'https://www.youtube.com/watch?v={youtube_id}'},
              {'label': 'YouTube Music', 'icon': '♫', 'url': f'https://music.youtube.com/watch?v={youtube_id}'}
          ]

          release = {
              'slug': 'saranam-ayyappa',
              'title': title,
              'artist': artist,
              'type': 'Music release',
              'category': 'Tamil Devotional',
              'language': 'Tamil',
              'description': item.get('description') or 'A Tamil Ayyappa devotional music release by தமிழாலே.',
              'coverImage': item.get('artwork') or f'https://img.youtube.com/vi/{youtube_id}/hqdefault.jpg',
              'coverBackground': 'linear-gradient(145deg,#2b5876,#4e4376)',
              'coverEyebrow': 'Tamil devotional',
              'coverLines': item.get('coverLines') or ['சரணம்', 'ஐயப்பா'],
              'previewUrl': '',
              'demoTone': False,
              'platforms': platforms,
              'shareMessages': {
                  'friend': {'label': 'Close friend', 'icon': '💛', 'text': 'Thought you might enjoy this Tamil devotional release 🎧'},
                  'family': {'label': 'Family', 'icon': '👨‍👩‍👧', 'text': 'Sharing this Ayyappa devotional song with the family 🙏'},
                  'devotional': {'label': 'Devotional listener', 'icon': '🙏', 'text': 'A Tamil Ayyappa devotional song you may enjoy.'},
                  'special': {'label': 'Someone special', 'icon': '✨', 'text': 'Sharing this devotional song with you 🙏'}
              },
              'primaryPlayer': {'provider': 'spotify', 'url': item['spotifyUrl']}
          }
          if item.get('publishedAt'):
              release['publishedAt'] = item['publishedAt']

          old_slugs = {'sakthi-kooda-saranam-ayyappa', 'saranam-ayyappa'}
          live['releases'] = [
              x for x in live.get('releases', [])
              if x.get('slug') not in old_slugs
              and spotify_id not in str((x.get('primaryPlayer') or {}).get('url') or '')
          ]
          live['releases'].append(release)

          with open(releases_path, 'w', encoding='utf-8') as f:
              json.dump(live, f, ensure_ascii=False, indent=2)
              f.write('\n')

      - name: Commit finalized release
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/releases.json
          git diff --cached --quiet && exit 0
          git commit -m 'Finalize Saranam Ayyappa release [skip ci]'
          git push origin HEAD:main
