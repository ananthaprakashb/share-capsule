name: Discover original Tamil haiku sources

on:
  pull_request:
    paths:
      - 'automation/discover-original-tamil-haiku.txt'

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests beautifulsoup4

      - name: Crawl author-owned Tamil haiku sources
        shell: python
        run: |
          import json, re, requests
          from pathlib import Path
          from bs4 import BeautifulSoup

          headers={'User-Agent':'ShareCapsuleTamilHaikuVerifier/1.0 (ananthaprakashb@gmail.com)'}
          base='https://erodetamilanban.com'
          result={'source':base,'requests':[],'matches':[],'books':[]}

          def clean_html(html):
              soup=BeautifulSoup(html or '','html.parser')
              for tag in soup(['script','style','noscript']): tag.decompose()
              return '\n'.join(x.strip() for x in soup.get_text('\n').splitlines() if x.strip())

          def get(url, **kwargs):
              try:
                  r=requests.get(url,headers=headers,timeout=45,**kwargs)
                  result['requests'].append({'url':r.url,'status':r.status_code,'contentType':r.headers.get('content-type')})
                  return r
              except Exception as ex:
                  result['requests'].append({'url':url,'error':str(ex)})
                  return None

          # WordPress REST discovery.
          api=get(base+'/wp-json/')
          if api and api.ok:
              result['wpJsonAvailable']=True

          for kind in ['posts','pages']:
              page=1
              while page<=20:
                  r=get(base+f'/wp-json/wp/v2/{kind}',params={'per_page':100,'page':page,'_fields':'id,date,link,slug,title,content,excerpt'})
                  if not r or not r.ok:
                      break
                  rows=r.json()
                  if not rows: break
                  for row in rows:
                      title=clean_html((row.get('title') or {}).get('rendered'))
                      text=clean_html((row.get('content') or {}).get('rendered'))
                      joined=title+'\n'+text
                      if any(k in joined for k in ['ஹைக்கூ','ஹைகூ','குறு நூறு','ஐந்திணை']):
                          # Keep line blocks to inspect exact poem-level evidence.
                          lines=[x.strip() for x in joined.splitlines() if x.strip()]
                          blocks=[]
                          for i in range(max(0,len(lines)-2)):
                              block=lines[i:i+3]
                              if all(1<=len(x)<=120 for x in block):
                                  blocks.append(block)
                          result['matches'].append({
                              'kind':kind,'id':row.get('id'),'date':row.get('date'),'title':title,
                              'url':row.get('link'),'excerpt':clean_html((row.get('excerpt') or {}).get('rendered')),
                              'textPreview':text[:12000],'threeLineBlocks':blocks[:80]
                          })
                  page+=1

          # Verify official book catalogue entries and attribution.
          r=get(base+'/புத்தகங்கள்/')
          if r and r.ok:
              soup=BeautifulSoup(r.text,'html.parser')
              text=clean_html(r.text)
              for title in ['ஐந்திணை ஹைக்கூ','கவின் குறு நூறு','ஜப்பானிய ஹைகூ 100 – குறிப்புரையுடன்']:
                  result['books'].append({'title':title,'present':title in text,'author':'ஈரோடு தமிழன்பன்','catalogueUrl':r.url})

          # Homepage biography and haiku contribution.
          r=get(base+'/')
          if r and r.ok:
              text=clean_html(r.text)
              result['authorEvidence']={
                  'namePresent':'ஈரோடு தமிழன்பன்' in text,
                  'haikuContributionPresent':'ஹைக்கூவைத் தமிழில் பிரபலப்படுத்திய' in text,
                  'bioUrl':r.url,
                  'preview':text[:6000]
              }

          Path('tulip').mkdir(exist_ok=True)
          Path('tulip/original-tamil-source-audit.json').write_text(json.dumps(result,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          Path('automation/discover-original-tamil-haiku.txt').unlink(missing_ok=True)

      - name: Commit source audit to PR branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tulip/original-tamil-source-audit.json automation/discover-original-tamil-haiku.txt
          git diff --cached --quiet && exit 0
          git commit -m 'Audit original Tamil haiku sources'
          git push origin HEAD:${{ github.head_ref }}
