name: Add release 35zsu1UWLZjZqkUazDlJIj

on:
  push:
    branches: [main]
    paths:
      - 'automation/add-release-35zsu1uwlzjzqkuazdljij.txt'

permissions:
  contents: write

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -U requests beautifulsoup4

      - name: Resolve metadata and update source catalog
        shell: python
        run: |
          import json, requests, re
          from bs4 import BeautifulSoup

          spotify_id = '35zsu1UWLZjZqkUazDlJIj'
          apple_album_id = '1838677675'
          youtube_id = 'GB5C6Uf-aVs'
          spotify_url = f'https://open.spotify.com/track/{spotify_id}'
          apple_url = 'https://music.apple.com/us/album/%E0%AE%9A%E0%AE%95-%E0%AE%A4-%E0%AE%95-%E0%AE%9F-%E0%AE%9A%E0%AE%B0%E0%AE%A3%E0%AE%AE-%E0%AE%90%E0%AE%AF%E0%AE%AA-%E0%AE%AA-single/1838677675'
          youtube_url = f'https://music.youtube.com/watch?v={youtube_id}'
          title = 'சக்தி கூட சரணம் ஐயப்பா'
          artist = 'தமிழாலே'
          artwork = ''
          published_at = None
          headers = {'User-Agent': 'Mozilla/5.0'}

          # Spotify oEmbed gives public title and artwork.
          try:
              r = requests.get('https://open.spotify.com/oembed', params={'url': spotify_url}, headers=headers, timeout=30)
              if r.ok:
                  meta = r.json()
                  if meta.get('title'):
                      title = str(meta['title']).strip()
                  artwork = str(meta.get('thumbnail_url') or '').strip()
          except Exception as ex:
              print('Spotify oEmbed unavailable:', ex)

          # Spotify embed page can expose artist metadata.
          try:
              r = requests.get(f'https://open.spotify.com/embed/track/{spotify_id}', headers=headers, timeout=30)
              if r.ok:
                  soup = BeautifulSoup(r.text, 'html.parser')
                  for script in soup.find_all('script'):
                      text = (script.string or script.get_text() or '').strip()
                      if not text.startswith('{'):
                          continue
                      try:
                          payload = json.loads(text)
                      except Exception:
                          continue
                      entity = payload.get('props', {}).get('pageProps', {}).get('state', {}).get('data', {}).get('entity') or {}
                      if entity.get('name'):
                          title = str(entity['name']).strip()
                      artists = entity.get('artists') or []
                      if artists and isinstance(artists[0], dict) and artists[0].get('name'):
                          artist = str(artists[0]['name']).replace(' - Topic', '').strip()
                      if title:
                          break
          except Exception as ex:
              print('Spotify embed metadata unavailable:', ex)

          # Apple lookup helps confirm the exact release title, date and artwork.
          try:
              r = requests.get('https://itunes.apple.com/lookup', params={
                  'id': apple_album_id,
                  'entity': 'song',
                  'country': 'US'
              }, headers=headers, timeout=30)
              if r.ok:
                  rows = r.json().get('results') or []
                  track = next((row for row in rows if row.get('wrapperType') == 'track'), None)
                  collection = next((row for row in rows if row.get('wrapperType') == 'collection'), None)
                  chosen = track or collection or {}
                  if chosen.get('trackName'):
                      title = str(chosen['trackName']).strip()
                  elif chosen.get('collectionName'):
                      title = str(chosen['collectionName']).replace(' - Single', '').strip()
                  if chosen.get('artistName'):
                      artist = str(chosen['artistName']).replace(' - Topic', '').strip()
                  if chosen.get('artworkUrl100'):
                      artwork = str(chosen['artworkUrl100']).replace('100x100bb', '1200x1200bb')
                  release_date = chosen.get('releaseDate')
                  if release_date:
                      published_at = str(release_date)[:10]
          except Exception as ex:
              print('Apple lookup unavailable:', ex)

          # Use a stable, readable slug for the devotional song.
          slug = 'sakthi-kooda-saranam-ayyappa'

          with open('data/channel-catalog.json', encoding='utf-8') as f:
              catalog = json.load(f)

          items = catalog.setdefault('items', [])
          items = [
              item for item in items
              if item.get('slug') != slug
              and spotify_id not in str(item.get('spotifyUrl') or '')
              and youtube_id not in (item.get('videoIds') or [])
          ]

          entry = {
              'slug': slug,
              'title': title,
              'artist': artist or 'தமிழாலே',
              'videoIds': [youtube_id],
              'category': 'Tamil Devotional',
              'language': 'Tamil',
              'music': True,
              'spotifyUrl': spotify_url,
              'appleUrl': apple_url,
              'description': 'A Tamil Ayyappa devotional music release by தமிழாலே.',
              'coverLines': [title]
          }
          if artwork:
              entry['artwork'] = artwork
          if published_at:
              entry['publishedAt'] = published_at

          items.insert(0, entry)
          catalog['items'] = items

          with open('data/channel-catalog.json', 'w', encoding='utf-8') as f:
              json.dump(catalog, f, ensure_ascii=False, indent=2)
              f.write('\n')

          print(json.dumps(entry, ensure_ascii=False, indent=2))

      - name: Commit source catalog update
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/channel-catalog.json
          git diff --cached --quiet && exit 0
          git commit -m 'Add Ayyappa devotional release 35zsu1UWLZjZqkUazDlJIj [skip ci]'
          git push origin HEAD:main
