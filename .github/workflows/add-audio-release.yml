name: Add audio release to catalog

on:
  push:
    branches: [agent/add-audio-endpoint]
    paths: [.github/workflows/add-audio-release.yml]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/add-audio-endpoint
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Add release once
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('data/releases.json')
          data = json.loads(path.read_text())
          slug = 'economic-indicators'
          if not any(r.get('slug') == slug for r in data.get('releases', [])):
              data['releases'].insert(0, {
                'slug': slug,
                'title': 'Economic Indicators',
                'artist': 'Share Capsule',
                'type': 'Audio capsule',
                'category': 'Personal Finance',
                'language': 'English',
                'publishedAt': '2026-07-12',
                'description': 'An audio capsule about economic indicators, hosted in Cloudflare R2.',
                'featured': True,
                'coverImage': '',
                'coverBackground': 'linear-gradient(145deg,#0f766e,#164e63 55%,#312e81)',
                'coverEyebrow': 'Audio capsule',
                'coverLines': ['Economic', 'Indicators'],
                'previewUrl': '',
                'demoTone': False,
                'audioPageUrl': '/audio/?id=economic-indicators',
                'platforms': [
                  {'label': 'Listen', 'icon': '▶', 'url': '/audio/?id=economic-indicators'}
                ],
                'shareMessages': {
                  'friend': {'label': 'Friend', 'icon': '🎧', 'text': 'Here is a useful audio capsule about economic indicators.'},
                  'family': {'label': 'Family', 'icon': '👨‍👩‍👧', 'text': 'Sharing this simple audio explanation of economic indicators.'},
                  'topic': {'label': 'Finance learner', 'icon': '📈', 'text': 'This economic indicators audio may be useful for you.'}
                }
              })
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n')
          PY
      - name: Commit catalog update
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name share-capsule-bot
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/releases.json
          git commit -m "Add Economic Indicators audio release"
          git push
