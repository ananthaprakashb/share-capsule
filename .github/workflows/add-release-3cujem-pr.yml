name: Add release 3CUjEmBp1drcCP8ek7MOQo via PR

on:
  pull_request:
    paths:
      - 'automation/add-release-3cujem-pr.txt'

permissions:
  contents: write

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Resolve metadata and add release
        shell: python
        run: |
          import json, requests
          from pathlib import Path

          spotify_id = '3CUjEmBp1drcCP8ek7MOQo'
          apple_song_id = '1809626579'
          short_id = 'DI8u-2zQsyg'
          youtube_music_id = 'M6iorJ7Srrc'
          spotify_url = f'https://open.spotify.com/track/{spotify_id}'
          apple_url = 'https://music.apple.com/us/song/%E0%AE%AA-%E0%AE%B0-%E0%AE%99-%E0%AE%95%E0%AE%B5-%E0%AE%AF%E0%AE%AE/1809626579'
          amazon_url = 'https://amazon.com/music/player/tracks/B0F5NX5YZC?marketplaceId=ATVPDKIKX0DER&musicTerritory=US&ref=dm_sh_Dn8UT1kqNT0nBaBxPC6YXyRXU'
          short_url = f'https://youtube.com/shorts/{short_id}'
          headers = {'User-Agent': 'Mozilla/5.0'}

          title = 'தமிழாலே இசை வெளியீடு'
          artist = 'தமிழாலே'
          artwork = ''
          published_at = None

          r = requests.get('https://itunes.apple.com/lookup', params={'id': apple_song_id, 'country': 'US'}, headers=headers, timeout=30)
          if r.ok:
              rows = r.json().get('results') or []
              row = rows[0] if rows else {}
              title = str(row.get('trackName') or title).strip()
              artist = str(row.get('artistName') or artist).replace(' - Topic', '').strip()
              if row.get('artworkUrl100'):
                  artwork = str(row['artworkUrl100']).replace('100x100bb', '1200x1200bb')
              if row.get('releaseDate'):
                  published_at = str(row['releaseDate'])[:10]

          catalog_path = Path('data/channel-catalog.json')
          catalog = json.loads(catalog_path.read_text(encoding='utf-8'))
          items = [
              item for item in catalog.get('items', [])
              if spotify_id not in str(item.get('spotifyUrl') or '')
              and short_id not in (item.get('videoIds') or [])
              and youtube_music_id not in (item.get('videoIds') or [])
          ]
          entry = {
              'slug': 'apple-song-1809626579',
              'title': title,
              'artist': artist or 'தமிழாலே',
              'videoIds': [youtube_music_id],
              'youtubeExtra': [short_url],
              'category': 'Tamil Music',
              'language': 'Tamil',
              'music': True,
              'spotifyUrl': spotify_url,
              'appleUrl': apple_url,
              'amazonUrl': amazon_url,
              'description': 'A Tamil music release by தமிழாலே, with a YouTube Short and full audio links.',
              'coverLines': [title]
          }
          if artwork:
              entry['artwork'] = artwork
          if published_at:
              entry['publishedAt'] = published_at
          items.insert(0, entry)
          catalog['items'] = items
          catalog_path.write_text(json.dumps(catalog, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          Path('automation/add-release-3cujem-pr.txt').unlink(missing_ok=True)
          print(json.dumps(entry, ensure_ascii=False, indent=2))

      - name: Commit release to PR branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/channel-catalog.json automation/add-release-3cujem-pr.txt
          git diff --cached --quiet && exit 0
          git commit -m 'Add Tamil release 3CUjEmBp1drcCP8ek7MOQo'
          git push origin HEAD:${{ github.head_ref }}
