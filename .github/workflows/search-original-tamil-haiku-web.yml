name: Search web for original Tamil haiku text

on:
  pull_request:
    paths:
      - 'automation/search-original-tamil-haiku-web.txt'

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests beautifulsoup4 lxml

      - name: Search and inspect candidate sources
        shell: python
        run: |
          import json, re, time, requests, xml.etree.ElementTree as ET
          from pathlib import Path
          from bs4 import BeautifulSoup
          from urllib.parse import quote, urlparse

          headers={'User-Agent':'Mozilla/5.0 (compatible; ShareCapsuleTamilHaikuVerifier/1.1)'}
          queries=[
              '"ஈரோடு தமிழன்பன்" "ஹைக்கூ" கவிதை',
              '"மு. முருகேஷ்" "ஹைக்கூ"',
              '"மித்ரா" "ஹைக்கூ" தமிழ் கவிதை',
              '"அமுதபாரதி" "ஹைக்கூ"',
              '"கவிக்கோ அப்துல் ரகுமான்" ஹைக்கூ',
              '"அறிவுமதி" ஹைக்கூ கவிதை',
              '"தமிழ் ஹைக்கூ" "கவிதை" ஆசிரியர்',
              '"ஹைக்கூ கவிதைகள்" "தமிழ்" கவிஞர்',
              '"சூரியப் பிறைகள்" ஹைக்கூ',
              '"ஐந்திணை ஹைக்கூ" கவிதை'
          ]
          blocked={'facebook.com','youtube.com','instagram.com','pinterest.com','x.com','twitter.com','amazon.in','flipkart.com'}

          def clean(html):
              soup=BeautifulSoup(html or '','lxml')
              for tag in soup(['script','style','noscript','svg']): tag.decompose()
              lines=[]
              for line in soup.get_text('\n').splitlines():
                  line=re.sub(r'\s+',' ',line).strip()
                  if line: lines.append(line)
              return lines

          def tamil_ratio(s):
              tamil=sum(1 for c in s if '\u0B80'<=c<='\u0BFF')
              letters=sum(1 for c in s if c.isalpha())
              return tamil/max(letters,1)

          def allowed(url):
              try:
                  host=urlparse(url).netloc.lower().replace('www.','')
                  return url.startswith('http') and not any(host==d or host.endswith('.'+d) for d in blocked)
              except Exception:
                  return False

          candidates=[]; seen=set(); search_status=[]
          for q in queries:
              url='https://www.bing.com/search?format=rss&q='+quote(q)
              try:
                  r=requests.get(url,headers=headers,timeout=45)
                  search_status.append({'query':q,'status':r.status_code,'url':r.url,'bytes':len(r.content)})
                  if r.ok:
                      root=ET.fromstring(r.content)
                      count=0
                      for item in root.findall('.//item'):
                          href=(item.findtext('link') or '').strip()
                          title=(item.findtext('title') or '').strip()
                          description=(item.findtext('description') or '').strip()
                          if not href or href in seen or not allowed(href): continue
                          seen.add(href); count+=1
                          candidates.append({'query':q,'url':href,'resultTitle':title,'resultDescription':description})
                          if count>=15: break
              except Exception as ex:
                  search_status.append({'query':q,'error':str(ex)})
              time.sleep(.6)

          inspected=[]
          for c in candidates[:120]:
              try:
                  r=requests.get(c['url'],headers=headers,timeout=35,allow_redirects=True)
                  ctype=r.headers.get('content-type') or ''
                  if not r.ok or 'text/html' not in ctype:
                      inspected.append({**c,'status':r.status_code,'contentType':ctype,'finalUrl':r.url})
                      continue
                  lines=clean(r.text)
                  joined='\n'.join(lines)
                  if not any(k in joined for k in ['ஹைக்கூ','ஹைகூ']): continue
                  blocks=[]
                  for i in range(len(lines)-2):
                      block=lines[i:i+3]
                      if all(1<=len(x)<=90 and tamil_ratio(x)>=0.55 for x in block) and sum(map(len,block))<=180:
                          nearby=' | '.join(lines[max(0,i-4):min(len(lines),i+7)])
                          blocks.append({'lines':block,'context':nearby[:1200]})
                  contexts=[]
                  for i,line in enumerate(lines):
                      if any(k in line for k in ['ஹைக்கூ','ஹைகூ','கவிஞர்','ஆசிரியர்','எழுதியவர்']):
                          contexts.append(' | '.join(lines[max(0,i-3):min(len(lines),i+5)])[:1400])
                  title=BeautifulSoup(r.text,'lxml').title
                  inspected.append({
                      **c,'status':r.status_code,'finalUrl':r.url,
                      'pageTitle':title.get_text(' ',strip=True) if title else '',
                      'keywordContext':contexts[:25],
                      'candidateBlocks':blocks[:60]
                  })
              except Exception as ex:
                  inspected.append({**c,'error':str(ex)})
              time.sleep(.25)

          output={'searchStatus':search_status,'candidateCount':len(candidates),'inspected':inspected}
          Path('tulip/original-tamil-web-search.json').write_text(json.dumps(output,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          Path('automation/search-original-tamil-haiku-web.txt').unlink(missing_ok=True)

      - name: Commit search results
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tulip/original-tamil-web-search.json automation/search-original-tamil-haiku-web.txt
          git diff --cached --quiet && exit 0
          git commit -m 'Search web for original Tamil haiku sources'
          git push origin HEAD:${{ github.head_ref }}
