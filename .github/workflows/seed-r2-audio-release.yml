name: Seed configured R2 audio release

on:
  push:
    branches: [agent/auto-publish-r2-audio]
    paths: [.github/workflows/seed-r2-audio-release.yml]

permissions:
  contents: write

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/auto-publish-r2-audio
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Publish metadata overrides without bucket credentials
        env:
          SEED_ONLY: "true"
          R2_BUCKET: techvideos
          R2_PUBLIC_BASE_URL: https://pub-7cc02c56240d42c98154d45ae3b67481.r2.dev
        run: node audio/publish-r2.mjs
      - name: Validate and commit
        run: |
          node --check audio/publish-r2.mjs
          git config user.name share-capsule-bot
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add audio/data.json data/releases.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Publish Trading Holy Grail Tamil audio"
          git push
