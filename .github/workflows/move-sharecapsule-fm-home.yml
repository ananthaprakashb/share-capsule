name: Install mixed ShareCapsule FM on homepage

on:
  push:
    branches: [main]
    paths:
      - sharecapsule-fm.js
      - .github/workflows/move-sharecapsule-fm-home.yml

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install FM only on homepage
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          home_path=Path('index.html')
          home=home_path.read_text()
          if '/sharecapsule-fm.js' not in home:
              home=home.replace('</body>','  <script src="/sharecapsule-fm.js" defer></script>\n</body>',1)
          home_path.write_text(home)

          law_path=Path('law/index.html')
          law=law_path.read_text()
          law=law.replace('gap:12px;margin-bottom:16px}.brand','gap:12px;margin-bottom:24px}.brand')
          law=re.sub(r'\n\s*\.fm\{.*?\.fmTimes\{[^\n]*\}\n','\n',law,count=1)
          law=re.sub(r'\n\s*<section class="fm" id="fm"[\s\S]*?</section>\n','\n',law,count=1)
          law=re.sub(r'\n\s*const fmAudio=document\.getElementById\(\'fmAudio\'\)[\s\S]*?fmTrack\.onclick=e=>\{[^\n]*\};\n','\n',law,count=1)
          law=law.replace('load();loadFm();','load();')
          law_path.write_text(law)
          PY
      - name: Commit installation
        run: |
          rm .github/workflows/move-sharecapsule-fm-home.yml
          git config user.name share-capsule-bot
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html law/index.html sharecapsule-fm.js .github/workflows/move-sharecapsule-fm-home.yml
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Add songs and audio articles to ShareCapsule FM"
          git push
