name: Build validated Tamil poem endpoint

on:
  pull_request:
    paths:
      - 'automation/build-paa.txt'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests beautifulsoup4

      - name: Inspect Tamil Wikisource results
        shell: python
        run: |
          import json, re, requests
          from pathlib import Path
          from bs4 import BeautifulSoup

          api='https://ta.wikisource.org/w/api.php'
          headers={'User-Agent':'ShareCapsulePoemVerifier/1.2 (ananthaprakashb@gmail.com)'}
          markers=['ஓடி விளையாடு பாப்பா','கூடி விளையாடு பாப்பா','சின்னஞ் சிறு குருவி போலே','மனதில் மகிழ்ச்சி கொள்ளு பாப்பா']
          def norm(s): return re.sub(r'[^\w\u0B80-\u0BFF]+','',str(s or '').casefold())

          titles=[]
          searches=[]
          for query in ['ஓடி விளையாடு பாப்பா','பாப்பா பாட்டு பாரதியார்','பாப்பாப் பாட்டு பாரதியார்','சின்னஞ் சிறு குருவி போலே']:
              r=requests.get(api,params={'action':'query','list':'search','srsearch':query,'srnamespace':0,'srlimit':50,'format':'json','formatversion':2},headers=headers,timeout=30)
              searches.append({'query':query,'status':r.status_code,'body':r.text[:300] if not r.ok else None})
              if not r.ok: continue
              rows=r.json().get('query',{}).get('search',[])
              searches[-1]['titles']=[x.get('title') for x in rows]
              titles.extend(x.get('title') for x in rows if x.get('title'))

          titles.extend(['பாப்பா பாட்டு','பாப்பாப் பாட்டு','பாரதியார் பாடல்கள்/பாப்பா பாட்டு','பாரதியார் பாடல்கள்/பாப்பாப் பாட்டு','தேசிய கீதங்கள்/பாப்பா பாட்டு'])
          pages=[]; seen=set()
          for title in titles:
              if not title or title in seen: continue
              seen.add(title)
              r=requests.get(api,params={'action':'parse','page':title,'prop':'text','format':'json','formatversion':2},headers=headers,timeout=30)
              row={'title':title,'status':r.status_code}
              if r.ok:
                  payload=r.json().get('parse') or {}
                  text=BeautifulSoup(payload.get('text') or '','html.parser').get_text('\n')
                  row['resolvedTitle']=payload.get('title')
                  row['matches']={m:(norm(m) in norm(text)) for m in markers}
                  row['snippet']=text[:2500]
              else:
                  row['error']=r.text[:500]
              pages.append(row)

          Path('paa').mkdir(exist_ok=True)
          Path('paa/source-debug.json').write_text(json.dumps({'searches':searches,'pages':pages},ensure_ascii=False,indent=2)+'\n',encoding='utf-8')

      - name: Commit source diagnostics
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add paa/source-debug.json
          git diff --cached --quiet && exit 0
          git commit -m 'Inspect Tamil Wikisource poem source'
          git push origin HEAD:${{ github.head_ref }}
