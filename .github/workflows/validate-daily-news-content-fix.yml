name: Validate daily news publisher fix

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/fix-daily-content-source-failures
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: node --check scripts/publish-daily-news-content.mjs
