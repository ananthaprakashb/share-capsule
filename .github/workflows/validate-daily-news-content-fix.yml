name: Validate daily news publisher fix

on:
  push:
    branches: [agent/fix-daily-content-source-failures]
    paths:
      - scripts/publish-daily-news-content.mjs
      - .github/workflows/validate-daily-news-content-fix.yml

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/fix-daily-content-source-failures
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Check syntax
        run: node --check scripts/publish-daily-news-content.mjs
      - name: Exercise safe publisher path
        env:
          SEED_NEWS_CONTEXT: 'true'
        run: |
          node scripts/publish-daily-news-content.mjs
          node -e "for(const p of ['tip/data.json','paa/data.json','law/data.json','tulip/data.json'])JSON.parse(require('fs').readFileSync(p,'utf8'))"
