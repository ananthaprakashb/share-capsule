name: Validate audio endpoint

on:
  pull_request:
    paths:
      - 'audio/**'
      - 'data/releases.json'
      - '.github/workflows/validate-audio.yml'
  push:
    paths:
      - 'audio/**'
      - 'data/releases.json'
      - '.github/workflows/validate-audio.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Validate catalog and public media URL
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          audio = json.loads(Path('audio/data.json').read_text())
          releases = json.loads(Path('data/releases.json').read_text())
          items = audio.get('audio', [])
          assert items, 'audio/data.json has no audio items'
          ids = [x.get('id') for x in items]
          assert len(ids) == len(set(ids)), 'duplicate audio ids'
          for item in items:
              assert item.get('title') and item.get('objectKey'), 'title and objectKey are required'
              public = item.get('mediaUrl') or audio.get('site', {}).get('publicBaseUrl')
              assert public and str(public).startswith('https://'), f"{item['id']} needs a public HTTPS R2 media URL"
          assert any(r.get('slug') == 'economic-indicators' for r in releases.get('releases', [])), 'Economic Indicators missing from releases'
          html = Path('audio/index.html').read_text()
          for required in ['data-like', 'data-clap', 'WhatsApp', 'LinkedIn', 'navigator.share', '<audio']:
              assert required in html, f'missing {required}'
          print(f'Validated {len(items)} audio item(s).')
          PY
