name: Discover YouTube channel catalog

on:
  pull_request:
    paths:
      - 'automation/run-channel-discovery.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -U yt-dlp requests

      - name: Discover channel videos and cross-platform links
        shell: python
        run: |
          import json, subprocess, requests, time, os

          channel = 'https://www.youtube.com/channel/UCejnFIrCLi0MaskXd2HNi5w/videos'
          raw = subprocess.check_output([
              'yt-dlp', '--flat-playlist', '--dump-single-json', '--no-warnings', channel
          ], text=True)
          data = json.loads(raw)
          entries = data.get('entries') or []
          out = []
          for e in entries:
              vid = e.get('id')
              if not vid:
                  continue
              youtube_url = f'https://www.youtube.com/watch?v={vid}'
              item = {
                  'videoId': vid,
                  'title': e.get('title') or '',
                  'youtube': youtube_url,
                  'thumbnail': f'https://img.youtube.com/vi/{vid}/hqdefault.jpg',
                  'duration': e.get('duration'),
                  'timestamp': e.get('timestamp'),
                  'platforms': {}
              }
              try:
                  r = requests.get(
                      'https://api.song.link/v1-alpha.1/links',
                      params={'url': youtube_url, 'userCountry': 'US'},
                      timeout=30,
                      headers={'User-Agent': 'ShareCapsuleCatalogSync/1.0'}
                  )
                  if r.ok:
                      links = (r.json().get('linksByPlatform') or {})
                      for src, dest in {
                          'spotify': 'spotify',
                          'appleMusic': 'appleMusic',
                          'amazonMusic': 'amazonMusic',
                          'youtubeMusic': 'youtubeMusic',
                          'youtube': 'youtube'
                      }.items():
                          url = links.get(src, {}).get('url')
                          if url:
                              item['platforms'][dest] = url
                  else:
                      item['songlinkStatus'] = f'HTTP {r.status_code}'
              except Exception as ex:
                  item['songlinkStatus'] = str(ex)
              out.append(item)
              time.sleep(0.25)

          os.makedirs('output', exist_ok=True)
          with open('output/youtube-channel-discovery.json', 'w', encoding='utf-8') as f:
              json.dump({
                  'channel': channel,
                  'channelId': 'UCejnFIrCLi0MaskXd2HNi5w',
                  'count': len(out),
                  'videos': out
              }, f, ensure_ascii=False, indent=2)

      - name: Upload discovery output
        uses: actions/upload-artifact@v4
        with:
          name: youtube-channel-discovery
          path: output/youtube-channel-discovery.json
          retention-days: 7
