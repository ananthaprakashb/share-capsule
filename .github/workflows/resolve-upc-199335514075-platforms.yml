name: Resolve UPC 199335514075 platform links

on:
  pull_request:
    paths:
      - 'automation/resolve-upc-199335514075-platforms.txt'

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests beautifulsoup4

      - name: Resolve cross-platform links
        shell: python
        run: |
          import json, requests, time
          from pathlib import Path
          from bs4 import BeautifulSoup

          headers={'User-Agent':'ShareCapsuleUPCAudit/1.0'}
          source=json.loads(Path('data/upc-199335514075-release.json').read_text(encoding='utf-8'))
          spotify_album_id='3cQMnRtQgGUZm0cEqv1xL6'

          # Build a Spotify track map from the album's public embed payload.
          spotify_map={}
          try:
              r=requests.get(f'https://open.spotify.com/embed/album/{spotify_album_id}',headers=headers,timeout=30)
              if r.ok:
                  soup=BeautifulSoup(r.text,'html.parser')
                  for script in soup.find_all('script'):
                      text=(script.string or script.get_text() or '').strip()
                      if not text.startswith('{'):
                          continue
                      try: payload=json.loads(text)
                      except Exception: continue
                      entity=payload.get('props',{}).get('pageProps',{}).get('state',{}).get('data',{}).get('entity') or {}
                      for t in entity.get('trackList') or []:
                          name=str(t.get('title') or t.get('name') or '').strip()
                          uri=str(t.get('uri') or '')
                          if name and uri.startswith('spotify:track:'):
                              spotify_map[name.casefold()]=f"https://open.spotify.com/track/{uri.split(':')[-1]}"
                      if spotify_map:
                          break
          except Exception as ex:
              print('Spotify embed parse failed:',ex)

          results=[]
          for track in source.get('tracks') or []:
              if int(track.get('trackId') or 0)==1809626579:
                  continue
              item={**track,'platforms':{'appleMusic':track.get('appleUrl')}}
              spotify=spotify_map.get(str(track.get('title') or '').casefold())
              if spotify:
                  item['platforms']['spotify']=spotify

              # Songlink/Odesli is used only for exact canonical URL resolution.
              for attempt in range(6):
                  try:
                      r=requests.get('https://api.song.link/v1-alpha.1/links',params={
                          'url':track.get('appleUrl'),'userCountry':'US'
                      },headers=headers,timeout=30)
                      if r.ok:
                          links=r.json().get('linksByPlatform') or {}
                          for src,dest in {
                              'spotify':'spotify',
                              'appleMusic':'appleMusic',
                              'amazonMusic':'amazonMusic',
                              'youtubeMusic':'youtubeMusic',
                              'youtube':'youtube'
                          }.items():
                              url=(links.get(src) or {}).get('url')
                              if url:
                                  item['platforms'][dest]=url
                          item['resolverStatus']='ok'
                          break
                      if r.status_code==429:
                          item['resolverStatus']='rate_limited'
                          time.sleep(12+attempt*8)
                          continue
                      item['resolverStatus']=f'HTTP {r.status_code}'
                      break
                  except Exception as ex:
                      item['resolverStatus']=str(ex)
                      if attempt<5:
                          time.sleep(8)
                          continue
              results.append(item)
              time.sleep(5)

          output={
              'recordLabel':source.get('recordLabel'),
              'distroKidUPC':source.get('distroKidUPC'),
              'collectionName':source.get('collectionName'),
              'spotifyAlbumUrl':f'https://open.spotify.com/album/{spotify_album_id}',
              'trackCount':len(results),
              'tracks':results
          }
          Path('data/upc-199335514075-platform-links.json').write_text(
              json.dumps(output,ensure_ascii=False,indent=2)+'\n',encoding='utf-8'
          )
          Path('automation/resolve-upc-199335514075-platforms.txt').unlink(missing_ok=True)

      - name: Commit platform-link results
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/upc-199335514075-platform-links.json automation/resolve-upc-199335514075-platforms.txt
          git diff --cached --quiet && exit 0
          git commit -m 'Resolve platform links for UPC 199335514075 tracks'
          git push origin HEAD:${{ github.head_ref }}
