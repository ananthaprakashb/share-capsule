name: Revalidate legal guidance

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9,10 * * *"
  pull_request:
    paths:
      - "law/**"
      - "scripts/validate-law.mjs"
      - ".github/workflows/revalidate-law.yml"

permissions:
  contents: write

concurrency:
  group: revalidate-law
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Run only at 2 AM America/Los_Angeles
        id: local-time
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=America/Los_Angeles date +%H)
          if [ "$HOUR" = "02" ]; then echo "run=true" >> "$GITHUB_OUTPUT"; else echo "run=false" >> "$GITHUB_OUTPUT"; fi
      - name: Validate fields, primary authorities and case references
        if: steps.local-time.outputs.run == 'true'
        run: node scripts/validate-law.mjs
      - name: Commit revalidation metadata
        if: steps.local-time.outputs.run == 'true' && github.event_name != 'pull_request'
        shell: bash
        run: |
          if git diff --quiet -- law/data.json law/validation-report.json; then
            echo "No legal validation changes."
            exit 0
          fi
          git config user.name share-capsule-bot
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add law/data.json law/validation-report.json
          git commit -m "Revalidate primary-source legal guidance"
          git push
      - name: Upload legal validation report
        if: always() && steps.local-time.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: law-validation-report
          path: law/validation-report.json
          if-no-files-found: error
          retention-days: 30
