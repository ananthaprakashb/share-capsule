name: Scrape Amazon Music matches

on:
  pull_request:
    paths:
      - 'automation/run-amazon-music.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install browser
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Retry missing public Amazon Music matches
        shell: python
        run: |
          import asyncio, json, os
          from urllib.parse import quote
          from playwright.async_api import async_playwright

          tracks=[
            {'key':'suththi-paakka','queries':['சுத்திப்பாக்க','Suththi pakka','சுத்திப்பாக்க Suththi pakka']},
            {'key':'ai-kaatru','queries':['AI காற்று','AI காற்று Confusing Vibes','Confusing Vibes தமிழாலே']},
            {'key':'onnu-mannu','queries':['ஒன்னு மண்ணு','Onnu Mannu','ஒன்னு மண்ணு Onnu mannu']},
            {'key':'maanatpu','queries':['மாநட்பு','maanatpu','மாநட்பு maanatpu']},
            {'key':'tasty-prachanai','queries':['tasty பிரச்சினை','பிரச்சினை தமிழாலே']},
            {'key':'paarvaiyai-maathu','queries':['பார்வையை மாத்து','பார்வையை மாத்து Male','Change the Gaze தமிழாலே']},
            {'key':'needoozhi-vazhgave','queries':['நீ நீடூழி வாழவே','நீடூழி வாழ்கவே','Needoozhi தமிழாலே']}
          ]

          async def main():
              results=[]
              async with async_playwright() as p:
                  browser=await p.chromium.launch(headless=True)
                  page=await browser.new_page(viewport={'width':1440,'height':1200}, locale='en-US')
                  for t in tracks:
                      item={'key':t['key'],'attempts':[]}
                      for query in t['queries']:
                          url='https://music.amazon.com/search/'+quote(query,safe='')
                          attempt={'query':query,'searchUrl':url,'anchors':[]}
                          try:
                              await page.goto(url,wait_until='domcontentloaded',timeout=90000)
                              await page.wait_for_timeout(6000)
                              attempt['titleTag']=await page.title()
                              attempt['bodyText']=(await page.locator('body').inner_text())[:20000]
                              anchors=await page.locator('a[href]').evaluate_all("els => els.map(a => ({href:a.href,text:(a.innerText||a.textContent||'').trim(),aria:a.getAttribute('aria-label'),title:a.getAttribute('title')}))")
                              attempt['anchors']=[a for a in anchors if any(x in (a.get('href') or '') for x in ['/albums/','/tracks/','/music/player/albums/','/music/player/tracks/'])]
                          except Exception as ex:
                              attempt['error']=str(ex)
                          item['attempts'].append(attempt)
                          if attempt['anchors']:
                              break
                      results.append(item)
                  await browser.close()
              with open('output/amazon-music-search-results.json','w',encoding='utf-8') as f:
                  json.dump({'results':results},f,ensure_ascii=False,indent=2)

          os.makedirs('output',exist_ok=True)
          asyncio.run(main())
      - uses: actions/upload-artifact@v4
        with:
          name: amazon-music-search-results
          path: output/
          retention-days: 7
