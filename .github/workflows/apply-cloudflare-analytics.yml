name: Apply Cloudflare analytics

on:
  push:
    branches:
      - agent/add-cloudflare-analytics
    paths:
      - .github/workflows/apply-cloudflare-analytics.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/add-cloudflare-analytics
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Add analytics beacon once to every HTML page
        shell: python
        run: |
          from pathlib import Path

          token = "0eea133492b342da911e8cc91271e622"
          beacon = """  <!-- Cloudflare Web Analytics -->
            <script type='module' src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "0eea133492b342da911e8cc91271e622"}'></script>
            <!-- End Cloudflare Web Analytics -->
          """

          pages = sorted(Path(".").rglob("*.html"))
          if not pages:
              raise SystemExit("No HTML pages found")

          changed = []
          for page in pages:
              text = page.read_text(encoding="utf-8")
              count = text.count(token)
              if count > 1:
                  raise SystemExit(f"{page}: analytics token appears {count} times")
              if count == 1:
                  continue
              marker = "</body>"
              position = text.lower().rfind(marker)
              if position < 0:
                  raise SystemExit(f"{page}: missing closing body tag")
              updated = text[:position] + beacon + text[position:]
              page.write_text(updated, encoding="utf-8")
              changed.append(str(page))

          for page in pages:
              count = page.read_text(encoding="utf-8").count(token)
              if count != 1:
                  raise SystemExit(f"{page}: expected one analytics token, found {count}")

          print(f"Validated {len(pages)} HTML pages; updated {len(changed)}")
          for page in changed:
              print(page)
      - name: Commit generated page updates
        run: |
          if git diff --quiet; then
            echo "All HTML pages already contain the analytics beacon."
            exit 0
          fi
          git config user.name "share-capsule-bot"
          git config user.email "actions@users.noreply.github.com"
          git add '*.html' '**/*.html'
          git commit -m "Add Cloudflare analytics to all pages"
          git push origin HEAD:agent/add-cloudflare-analytics
