name: Import UPC 199335514075 tracks

on:
  pull_request:
    paths:
      - 'automation/import-upc-199335514075-tracks.txt'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Add all 10 missing album tracks to source catalog
        shell: python
        run: |
          import json
          from pathlib import Path

          source=json.loads(Path('data/upc-199335514075-resolved-media.json').read_text(encoding='utf-8'))
          catalog_path=Path('data/channel-catalog.json')
          catalog=json.loads(catalog_path.read_text(encoding='utf-8'))

          slugs={
              1809626058:'thirumba-pirakkanume',
              1809626570:'enakkena-piranthathu',
              1809626571:'kodiya-thee',
              1809626572:'ninaivile-kovile',
              1809626573:'naan-thaan-boss',
              1809626574:'yaarra-indha-ponnu',
              1809626575:'peruga-peruga',
              1809626576:'paala-kanaigal',
              1809626577:'ottamathu-kuraiyavillai',
              1809626578:'vizhi-oli-neeye'
          }

          incoming=[]
          for track in source.get('tracks') or []:
              tid=int(track.get('trackId') or 0)
              slug=slugs.get(tid)
              if not slug:
                  continue
              platforms=track.get('platforms') or {}
              yt=(track.get('youtubeMatch') or {}).get('id')
              entry={
                  'slug':slug,
                  'title':track.get('title'),
                  'artist':'தமிழாலே',
                  'videoIds':[yt] if yt else [],
                  'category':'Tamil Music',
                  'language':'Tamil',
                  'music':True,
                  'spotifyUrl':platforms.get('spotify'),
                  'appleUrl':track.get('appleUrl') or platforms.get('appleMusic'),
                  'description':f"Track {track.get('trackNumber')} from the Tamil album தமிழாலே, released through 9373145 Records DK (UPC 199335514075).",
                  'coverLines':[track.get('title')],
                  'artwork':track.get('artwork'),
                  'publishedAt':'2025-04-19',
                  'recordLabel':'9373145 Records DK',
                  'distroKidUPC':'199335514075',
                  'album':'தமிழாலே',
                  'trackNumber':track.get('trackNumber')
              }
              if platforms.get('amazonMusic'):
                  entry['amazonUrl']=platforms['amazonMusic']
              incoming.append(entry)

          new_slugs={x['slug'] for x in incoming}
          spotify_urls={x.get('spotifyUrl') for x in incoming if x.get('spotifyUrl')}
          apple_urls={x.get('appleUrl') for x in incoming if x.get('appleUrl')}
          video_ids={vid for x in incoming for vid in (x.get('videoIds') or [])}

          existing=[]
          for item in catalog.get('items') or []:
              if item.get('slug') in new_slugs:
                  continue
              if item.get('spotifyUrl') in spotify_urls:
                  continue
              if item.get('appleUrl') in apple_urls:
                  continue
              if video_ids.intersection(set(item.get('videoIds') or [])):
                  continue
              existing.append(item)

          catalog['items']=incoming+existing
          catalog_path.write_text(json.dumps(catalog,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')

          for path in [
              'data/apple-artist-catalog-audit.json',
              'data/upc-199335514075-release.json',
              'data/upc-199335514075-platform-links.json',
              'data/upc-199335514075-resolved-media.json',
              'automation/import-upc-199335514075-tracks.txt'
          ]:
              Path(path).unlink(missing_ok=True)

      - name: Commit imported tracks
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A data/channel-catalog.json data/apple-artist-catalog-audit.json data/upc-199335514075-release.json data/upc-199335514075-platform-links.json data/upc-199335514075-resolved-media.json automation/import-upc-199335514075-tracks.txt
          git diff --cached --quiet && exit 0
          git commit -m 'Add 10 tracks from UPC 199335514075 to Share Capsule'
          git push origin HEAD:${{ github.head_ref }}
