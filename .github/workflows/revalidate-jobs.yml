name: Refresh and validate jobs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9,10 * * *"
  push:
    paths:
      - "jobs/**"
      - ".github/workflows/revalidate-jobs.yml"
  pull_request:
    paths:
      - "jobs/**"
      - ".github/workflows/revalidate-jobs.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Run only at 2 AM America/Los_Angeles
        id: local-time
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=America/Los_Angeles date +%H)
          if [ "$HOUR" = "02" ]; then echo "run=true" >> "$GITHUB_OUTPUT"; else echo "run=false" >> "$GITHUB_OUTPUT"; fi
      - name: Validate official feeds, role filters, links and duplicates
        if: steps.local-time.outputs.run == 'true'
        run: node jobs/validate-sources.mjs
      - name: Build latest verified jobs snapshot
        if: steps.local-time.outputs.run == 'true'
        run: node jobs/refresh-snapshot.mjs
      - name: Commit refreshed snapshot
        if: steps.local-time.outputs.run == 'true' && github.event_name != 'pull_request'
        shell: bash
        run: |
          if git diff --quiet -- jobs/snapshot.json; then exit 0; fi
          git config user.name share-capsule-bot
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add jobs/snapshot.json
          git commit -m "Refresh verified jobs snapshot"
          git push
      - name: Upload source-by-source validation report
        if: always() && steps.local-time.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jobs-validation-report
          path: validation-report.json
          if-no-files-found: error
          retention-days: 14
