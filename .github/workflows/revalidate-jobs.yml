name: Revalidate jobs sources

on:
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * *"
  push:
    paths:
      - "jobs/**"
      - ".github/workflows/revalidate-jobs.yml"
  pull_request:
    paths:
      - "jobs/**"
      - ".github/workflows/revalidate-jobs.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate official feeds, role filters, links and duplicates
        run: node jobs/validate-sources.mjs
