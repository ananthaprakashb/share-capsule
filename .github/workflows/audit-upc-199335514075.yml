name: Audit UPC 199335514075 release

on:
  pull_request:
    paths:
      - 'automation/audit-upc-199335514075.txt'

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Resolve the exact Apple release and all tracks
        shell: python
        run: |
          import json, requests
          from pathlib import Path

          headers={'User-Agent':'ShareCapsuleUPCAudit/1.0'}
          track_id='1809626579'
          r=requests.get('https://itunes.apple.com/lookup',params={'id':track_id,'country':'US'},headers=headers,timeout=30)
          r.raise_for_status()
          rows=r.json().get('results') or []
          seed=next((x for x in rows if x.get('wrapperType')=='track'), rows[0] if rows else {})
          collection_id=seed.get('collectionId')
          if not collection_id:
              raise SystemExit('Collection ID not found')

          r=requests.get('https://itunes.apple.com/lookup',params={
              'id':collection_id,'entity':'song','country':'US','limit':200
          },headers=headers,timeout=30)
          r.raise_for_status()
          payload=r.json().get('results') or []
          collection=next((x for x in payload if x.get('wrapperType')=='collection'), {})
          tracks=[]
          for row in payload:
              if row.get('wrapperType')!='track' or row.get('kind')!='song':
                  continue
              tracks.append({
                  'trackId':row.get('trackId'),
                  'title':row.get('trackName'),
                  'artist':row.get('artistName'),
                  'trackNumber':row.get('trackNumber'),
                  'trackCount':row.get('trackCount'),
                  'durationMs':row.get('trackTimeMillis'),
                  'releaseDate':str(row.get('releaseDate') or '')[:10],
                  'appleUrl':row.get('trackViewUrl'),
                  'artwork':(row.get('artworkUrl100') or '').replace('100x100bb','1200x1200bb')
              })

          result={
              'recordLabel':'9373145 Records DK',
              'distroKidUPC':'199335514075',
              'uploadDate':'2025-04-19',
              'releaseDate':'2025-04-19',
              'seedTrackId':int(track_id),
              'collectionId':collection_id,
              'collectionName':collection.get('collectionName') or seed.get('collectionName'),
              'artist':collection.get('artistName') or seed.get('artistName'),
              'trackCount':len(tracks),
              'collectionAppleUrl':collection.get('collectionViewUrl'),
              'tracks':sorted(tracks,key=lambda x:x.get('trackNumber') or 0)
          }

          Path('data/upc-199335514075-release.json').write_text(
              json.dumps(result,ensure_ascii=False,indent=2)+'\n',encoding='utf-8'
          )
          Path('automation/audit-upc-199335514075.txt').unlink(missing_ok=True)

      - name: Commit UPC audit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/upc-199335514075-release.json automation/audit-upc-199335514075.txt
          git diff --cached --quiet && exit 0
          git commit -m 'Audit DistroKid UPC 199335514075 release'
          git push origin HEAD:${{ github.head_ref }}
