name: Add Psychology of Spending release

on:
  push:
    branches: [agent/post-psychology-of-spending]
    paths: [.github/workflows/add-psychology-of-spending-release.yml]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/post-psychology-of-spending
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Add release once
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('data/releases.json')
          data = json.loads(path.read_text())
          slug = 'psychology-of-spending'
          if not any(r.get('slug') == slug for r in data.get('releases', [])):
              data['releases'].insert(0, {
                'slug': slug,
                'title': 'Psychology of Spending',
                'artist': 'Share Capsule',
                'type': 'Audio article',
                'category': 'Personal Finance',
                'language': 'English',
                'publishedAt': '2026-07-12',
                'description': 'An audio article exploring the emotions, habits, and behavioral patterns that influence spending decisions.',
                'featured': True,
                'coverImage': '',
                'coverBackground': 'linear-gradient(145deg,#3f3cbb,#7b2cbf 55%,#c9184a)',
                'coverEyebrow': 'Money psychology',
                'coverLines': ['Psychology', 'of Spending'],
                'previewUrl': '',
                'demoTone': False,
                'audioPageUrl': '/audio/?id=psychology-of-spending',
                'platforms': [
                  {'label': 'Listen', 'icon': '▶', 'url': '/audio/?id=psychology-of-spending'}
                ],
                'shareMessages': {
                  'friend': {'label': 'Friend', 'icon': '🎧', 'text': 'Here is an insightful audio article about why we spend the way we do.'},
                  'family': {'label': 'Family', 'icon': '👨‍👩‍👧', 'text': 'Sharing this useful audio about spending habits and money psychology.'},
                  'topic': {'label': 'Finance learner', 'icon': '🧠', 'text': 'This Psychology of Spending audio article may be useful for you.'}
                }
              })
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n')
          PY
      - name: Commit catalog update
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name share-capsule-bot
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/releases.json
          git commit -m "Add Psychology of Spending release"
          git push
