name: Apply PWA push routes
on:
  push:
    branches: [main]
    paths:
      - 'workers/reactions/src/push-subscriptions.js'
      - 'scripts/apply-push-routes.mjs'
      - '.github/workflows/apply-push-routes.yml'
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/apply-push-routes.mjs
      - run: node --check workers/reactions/src/index.js && node --check workers/reactions/src/push-subscriptions.js && node --check sw.js && node --check pwa.js
      - name: Commit generated Worker route update
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add workers/reactions/src/index.js
          git commit -m 'Wire PWA push subscription routes'
          git push