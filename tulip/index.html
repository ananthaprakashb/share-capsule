  <style>
    :root{--ink:#2b2225;--muted:#776b70;--line:#ecdde2;--rose:#c94f79;--rose2:#fde7ef;--leaf:#4f9470;--paper:#fffdfb;--shadow:0 24px 72px rgba(99,45,66,.13)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;background:radial-gradient(circle at 10% 0,#fff 0,transparent 30%),radial-gradient(circle at 90% 8%,#ffdce9 0,transparent 27%),linear-gradient(150deg,#f7f1f4,#eef7f1 58%,#fff1df);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans Tamil","Tamil Sangam MN","Latha",sans-serif;-webkit-font-smoothing:antialiased}button,a{font:inherit}.shell{width:min(100%,780px);margin:auto;padding:max(18px,env(safe-area-inset-top)) 16px calc(46px + env(safe-area-inset-bottom))}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:24px}.brand{font-size:24px;font-weight:950;color:var(--ink);text-decoration:none}.home{color:var(--muted);text-decoration:none;font-size:13px;font-weight:850;padding:10px 13px;border:1px solid rgba(255,255,255,.92);border-radius:999px;background:rgba(255,255,255,.78)}.policy{background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.95);border-radius:22px;padding:16px 17px;color:var(--muted);font-size:13px;line-height:1.62;margin-bottom:19px}.policy strong{display:block;color:#8f3455;margin-bottom:4px}.kicker{margin:0 0 8px;font-size:12px;font-weight:950;letter-spacing:.11em;text-transform:uppercase;color:#9f3d60}.date{margin:0 0 18px;color:var(--muted);font-size:14px}.card{position:relative;overflow:hidden;background:rgba(255,253,251,.97);border:1px solid rgba(255,255,255,.96);border-radius:32px;padding:clamp(23px,6vw,46px);box-shadow:var(--shadow)}.petal{position:absolute;border-radius:60% 40% 62% 38%;opacity:.28}.p1{width:120px;height:150px;background:#f08aab;right:-28px;top:-38px;transform:rotate(28deg)}.p2{width:88px;height:118px;background:#94c7a8;left:-34px;bottom:20px;transform:rotate(-22deg)}.badges{position:relative;z-index:1;display:flex;flex-wrap:wrap;gap:8px}.badge{display:inline-flex;padding:7px 10px;border-radius:999px;font-size:11px;font-weight:950}.mood{background:var(--rose2);color:#8e3657}.type{background:#e7f4eb;color:#347053}.title{position:relative;z-index:1;margin:18px 0 0;font-size:clamp(40px,9vw,68px);line-height:.98;letter-spacing:-.06em}.titleNote{position:relative;z-index:1;margin-top:10px;color:var(--muted);font-size:11px;line-height:1.5}.tamil{position:relative;z-index:1;margin:28px 0 0;padding:0;font:750 clamp(25px,6vw,38px)/1.72 Georgia,"Noto Serif Tamil","Tamil MN",serif;white-space:pre-line}.credit{position:relative;z-index:1;margin-top:12px;color:var(--muted);font-size:12px;font-weight:800}.original{position:relative;z-index:1;margin-top:25px;padding:18px;border-radius:20px;background:#faf5f7;border:1px solid var(--line)}.original strong{display:block;color:#8e3657;margin-bottom:9px}.jp{font:600 21px/1.7 Georgia,"Yu Mincho","Hiragino Mincho ProN",serif;white-space:pre-line}.roman{margin-top:8px;color:var(--muted);font-size:12px;line-height:1.55;white-space:pre-line}.author{position:relative;z-index:1;margin-top:25px;padding-top:20px;border-top:1px solid var(--line)}.authorName{font-size:19px;font-weight:950}.bio{margin:9px 0 0;color:var(--muted);font-size:14px;line-height:1.65}.author a{display:inline-flex;margin-top:11px;color:#8e3657;font-weight:850;font-size:13px}.meaning{margin-top:17px;background:rgba(255,255,255,.85);border-radius:22px;padding:18px;border:1px solid rgba(255,255,255,.94)}.meaning strong{color:#8e3657}.meaning p{margin:7px 0 0;color:var(--muted);line-height:1.65;font-size:14px}.proof{margin-top:16px;display:grid;gap:13px}.proofBox{background:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.96);border-radius:24px;padding:20px}.proofHead{font-size:12px;font-weight:950;letter-spacing:.07em;text-transform:uppercase;color:var(--leaf)}.proof h2{margin:10px 0 0;font-size:21px;letter-spacing:-.035em}.proof p{margin:9px 0 0;color:var(--muted);font-size:13px;line-height:1.65}.proof a{display:inline-flex;margin-top:12px;color:#8e3657;font-weight:850;font-size:13px}.validated{margin-top:11px;color:var(--muted);font-size:11px}.share{margin-top:17px;background:rgba(255,255,255,.86);border-radius:26px;padding:20px;box-shadow:0 14px 45px rgba(99,45,66,.08)}.share h2{margin:0;font-size:22px}.share>p{margin:7px 0 0;color:var(--muted);font-size:13px;line-height:1.55}.primary{display:grid;grid-template-columns:1fr 72px;gap:10px;margin-top:16px}.primary button,.social button{border:0;border-radius:16px;min-height:52px;font-weight:900;cursor:pointer}.wa{background:#168b55;color:#fff}.copy{background:#f1e8ec;color:var(--ink)}.social{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}.social button{background:#fff;border:1px solid var(--line);text-align:left;padding:10px 13px;color:var(--ink)}.bottom{margin-top:22px;display:flex;justify-content:center}.archive{display:inline-flex;color:var(--ink);font-weight:950;text-decoration:none;background:#fff;border:1px solid rgba(255,255,255,.96);padding:14px 18px;border-radius:999px}.error{background:#fff;padding:28px;border-radius:24px;color:var(--muted);text-align:center}.toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,14px);opacity:0;background:#2b2225;color:#fff;padding:11px 15px;border-radius:999px;font-size:13px;transition:.2s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translate(-50%,0)}

<body>
  <main class="shell">
    <header class="top"><a class="brand" href="/tulip/">Tulip · துளிப்</a><a class="home" href="/">அனைத்து வெளியீடுகள்</a></header>
    <div id="app"><div class="error">இன்றைய குறுங்கவிதை ஏற்றப்படுகிறது…</div></div>
  </main>
  <div class="toast" id="toast" role="status"></div>
  <script>
    const app=document.getElementById('app'),toast=document.getElementById('toast');
    const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fmt=d=>new Date(d+'T12:00:00').toLocaleDateString('ta-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    const localDate=()=>{const d=new Date(),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`};
    const daysBetween=(a,b)=>Math.floor((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000);
    function itemForDate(data,date){const list=data.haiku||[];if(!list.length)return null;const offset=daysBetween(data.site?.startDate||'2026-07-12',date);return list[((offset%list.length)+list.length)%list.length]}
    const pageUrl=date=>`${location.origin}/tulip/?date=${encodeURIComponent(date)}`;
    const shareText=(h,date)=>`${h.title}\n\n${h.tamilRendering.join('\n')}\n\n— ${h.authorTamil}${h.author!==h.authorTamil?` (${h.author})`:''}\n${h.translationCredit||h.formLabel}\n\nசரிபார்க்கப்பட்ட மூலம்: ${h.poemSourceTitle}\n${pageUrl(date)}`;
    function showToast(t){toast.textContent=t;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),1700)}
    async function load(){try{const r=await fetch(`data.json?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);const data=await r.json();const requested=new URLSearchParams(location.search).get('date');const date=/^\d{4}-\d{2}-\d{2}$/.test(requested||'')?requested:localDate();const h=itemForDate(data,date);if(!h)throw new Error('சரிபார்க்கப்பட்ட குறுங்கவிதை இல்லை');render(h,date,data.site||{})}catch(e){app.innerHTML=`<div class="error"><h2>பதிவு கிடைக்கவில்லை</h2><p>${esc(e.message)}</p></div>`}}
    function render(h,date,site){document.title=`${h.title} — ${h.authorTamil} | Tulip`;const originalBlock=h.originalTamil?'':`<div class="original"><strong>அசல் ${esc(h.originalLanguage)} உரை</strong><div class="jp">${esc((h.originalScript||[]).join('\n'))}</div>${(h.romanization||[]).length?`<div class="roman">${esc(h.romanization.join('\n'))}</div>`:''}</div>`;app.innerHTML=`<section class="policy"><strong>பூஜ்ஜிய ஊகக் கொள்கை</strong>${esc(site.scopeNote||'மூலம் உறுதிப்படுத்தப்பட்ட குறுங்கவிதைகள் மட்டும் வெளியிடப்படும்.')}</section><p class="kicker">இன்றைய சரிபார்க்கப்பட்ட துளிப்</p><p class="date">${esc(fmt(date))}</p><article class="card"><span class="petal p1"></span><span class="petal p2"></span><div class="badges"><span class="badge mood">${esc(h.mood)}</span><span class="badge type">${esc(h.formLabel|| (h.originalTamil?'அசல் தமிழ்':'தமிழாக்க ஹைக்கூ'))}</span></div><h1 class="title">${esc(h.title)}</h1>${h.titleNote?`<div class="titleNote">${esc(h.titleNote)}</div>`:''}<blockquote class="tamil">${esc(h.tamilRendering.join('\n'))}</blockquote><div class="credit">${esc(h.translationCredit||'')}</div>${originalBlock}<div class="author"><div class="authorName">— ${esc(h.authorTamil)}${h.author!==h.authorTamil?` · ${esc(h.author)}`:''}</div><p class="bio">${esc(h.authorBio)}</p><a href="${esc(h.authorBioUrl)}" target="_blank" rel="noopener">${h.originalTamil?'ஆசிரியரின் கவிதைத் தளம்':'கவிஞர் வாழ்க்கை வரலாறு'} ↗</a></div></article><section class="meaning"><strong>வாசிப்பு குறிப்பு</strong><p>${esc(h.interpretation)}</p></section><section class="proof"><div class="proofBox"><div class="proofHead">✓ வரிகளும் ஆசிரியரும் சரிபார்க்கப்பட்டனர்</div><h2>${esc(h.poemSourceTitle)}</h2><p>${esc(h.sourceEvidence)}</p><a href="${esc(h.poemSourceUrl)}" target="_blank" rel="noopener">மூலப் பதிவைத் திறக்க ↗</a><div class="validated">சரிபார்த்த நாள்: ${esc(fmt(h.verifiedOn))}${h.publishedOn?` · முதலில் வெளியான நாள்: ${esc(fmt(h.publishedOn))}`:''}</div></div><div class="proofBox"><div class="proofHead">வெளியீட்டு நிலை</div><p>${esc(h.rightsNote||(h.publicDomain?'அசல் படைப்பு பொதுக் களஞ்சியத்தில் உள்ளது; தமிழாக்கம் Share Capsule-ல் புதிதாக எழுதப்பட்டது.':'பதிப்புரிமை நிலைக்கு ஏற்ப குறுந்தொகுப்பு மட்டும் வழங்கப்படுகிறது.'))}</p></div></section><section class="share"><h2>இந்தக் குறுங்கவிதையைப் பகிருங்கள்</h2><p>கவிதை, ஆசிரியர் பெயர், வடிவக் குறிப்பு மற்றும் சரிபார்க்கப்பட்ட பக்க இணைப்பு சேர்க்கப்படும்.</p><div class="primary"><button class="wa" id="wa">WhatsApp-ல் பகிர்</button><button class="copy" id="copy">நகல்</button></div><div class="social"><button data-social="facebook">Facebook</button><button data-social="x">X</button><button data-social="telegram">Telegram</button><button data-social="linkedin">LinkedIn</button><button data-social="email">Email</button><button id="more">மற்ற செயலிகள்</button></div></section><div class="bottom"><a class="archive" href="archive.html">சரிபார்க்கப்பட்ட துளிப் தொகுப்பு →</a></div>`;wire(h,date)}
    function wire(h,date){document.getElementById('wa').onclick=()=>location.href='https://wa.me/?text='+encodeURIComponent(shareText(h,date));document.getElementById('copy').onclick=async()=>{try{await navigator.clipboard.writeText(shareText(h,date));showToast('கவிதை நகலெடுக்கப்பட்டது')}catch{showToast('நகலெடுக்க இயலவில்லை')}};document.getElementById('more').onclick=()=>native(h,date);document.querySelectorAll('[data-social]').forEach(b=>b.onclick=()=>social(b.dataset.social,h,date))}
    async function native(h,date){if(navigator.share){try{await navigator.share({title:`${h.title} — ${h.authorTamil}`,text:h.tamilRendering.join('\n'),url:pageUrl(date)});return}catch(e){if(e.name==='AbortError')return}}try{await navigator.clipboard.writeText(shareText(h,date));showToast('இணைப்பு நகலெடுக்கப்பட்டது')}catch{}}
    function social(n,h,date){const u=encodeURIComponent(pageUrl(date)),t=encodeURIComponent(`${h.title} — ${h.authorTamil}`),full=encodeURIComponent(shareText(h,date));if(n==='facebook'){if(navigator.share){native(h,date);return}window.open(`https://www.facebook.com/sharer/sharer.php?display=popup&u=${u}`,'_blank','noopener,noreferrer,width=720,height=640');return}const urls={x:`https://twitter.com/intent/tweet?text=${t}&url=${u}`,telegram:`https://t.me/share/url?url=${u}&text=${t}`,linkedin:`https://www.linkedin.com/sharing/share-offsite/?url=${u}`};if(n==='email'){location.href=`mailto:?subject=${t}&body=${full}`;return}window.open(urls[n],'_blank','noopener,noreferrer,width=720,height=640')}
    load();
  </script>
