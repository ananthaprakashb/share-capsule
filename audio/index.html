<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="description" content="Share Capsule audio releases with playback, claps, likes and sharing.">
  <meta property="og:title" content="Share Capsule Audio">
  <meta property="og:description" content="Listen, react and share audio capsules.">
  <meta property="og:url" content="https://sharecapsule.app/audio/">
  <title>Share Capsule Audio</title>
  <style>
    :root{--bg:#eef5f4;--paper:#fff;--ink:#14201d;--muted:#65736e;--line:#d8e6e1;--accent:#0f766e;--soft:#dff4ef;--danger:#9d3f37}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 12% 0,#fff 0,transparent 34%),linear-gradient(150deg,#eff8f5,#e7eff4);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.shell{width:min(100%,850px);margin:auto;padding:20px 16px 64px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.brand{font-size:20px;font-weight:950;color:var(--ink);text-decoration:none}.home{color:var(--muted);text-decoration:none;border:1px solid var(--line);padding:10px 13px;border-radius:999px;background:#fff}.hero{padding:42px 2px 24px}.hero h1{margin:0;font-size:clamp(43px,10vw,76px);line-height:.94;letter-spacing:-.065em}.hero p{max-width:650px;color:var(--muted);line-height:1.65}.grid{display:grid;gap:18px}.card{background:rgba(255,255,255,.96);border:1px solid #fff;border-radius:30px;padding:22px;box-shadow:0 18px 60px rgba(31,68,59,.1)}.cover{min-height:340px;border-radius:23px;padding:24px;display:flex;align-items:flex-end;color:#fff;position:relative;overflow:hidden}.cover:after{content:"";position:absolute;width:280px;height:280px;border:1px solid rgba(255,255,255,.25);border-radius:50%;right:-65px;top:-90px}.coverText{position:relative;z-index:1;font-size:clamp(40px,9vw,68px);font-weight:950;line-height:.92;letter-spacing:-.06em;max-width:72%;text-shadow:0 4px 24px rgba(0,0,0,.18)}.bannerPlayer{position:absolute;z-index:3;top:24px;right:24px;width:min(43%,220px);display:flex;flex-direction:column;align-items:center;gap:12px}.playButton{width:90px;height:90px;border:2px solid rgba(255,255,255,.88);border-radius:50%;background:rgba(8,28,38,.22);color:#fff;font-size:36px;display:grid;place-items:center;padding:0 0 0 6px;box-shadow:0 14px 40px rgba(0,0,0,.22);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);cursor:pointer}.playButton.playing{font-size:27px;padding-left:0}.track{width:100%;padding:10px 12px;border:1px solid rgba(255,255,255,.3);border-radius:15px;background:rgba(8,28,38,.2);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}.times{display:flex;justify-content:space-between;font-size:11px;font-weight:800}.bar{height:6px;margin-top:7px;border-radius:99px;background:rgba(255,255,255,.28);overflow:hidden}.fill{height:100%;width:0;background:#fff;border-radius:99px}.hiddenAudio{display:none}.meta{margin-top:19px}.meta h2{margin:0;font-size:30px;letter-spacing:-.045em}.meta p{color:var(--muted);line-height:1.6}.notice{margin-top:14px;padding:14px;border-radius:16px;background:#fff3dd;color:#775018;font-size:13px;line-height:1.55}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}.actions button{min-height:52px;border-radius:16px;border:1px solid var(--line);background:#fff;font-weight:900;color:var(--ink);cursor:pointer}.actions button.active{background:var(--soft);border-color:#9bcfc2;color:var(--accent)}.actions button:disabled{opacity:.58;cursor:wait}.shareGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:10px}.shareGrid button,.shareGrid a{min-height:48px;border-radius:15px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:850;text-decoration:none;display:flex;align-items:center;justify-content:center;cursor:pointer}.status{margin-top:14px;color:var(--muted);font-size:12px}.status.error{color:var(--danger)}.empty{padding:28px;background:#fff;border-radius:24px;color:var(--muted)}@media(max-width:520px){.cover{min-height:300px}.coverText{max-width:75%}.bannerPlayer{top:18px;right:18px;width:42%}.playButton{width:70px;height:70px;font-size:29px}.track{padding:8px}.times{font-size:10px}}@media(min-width:700px){.card{padding:28px}.shareGrid{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top"><a class="brand" href="/audio/">Share Capsule Audio</a><a class="home" href="/">All releases</a></header>
    <section class="hero"><h1>Listen. React. Pass it on.</h1><p>Audio capsules hosted in Cloudflare R2, with direct playback, applause, likes and sharing across your favorite channels.</p></section>
    <section id="grid" class="grid"><div class="empty">Loading audio…</div></section>
  </main>
  <script>
    const grid=document.getElementById('grid');
    const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const pageUrl=id=>`${location.origin}/audio/?id=${encodeURIComponent(id)}`;
    const resolveUrl=(item,site)=>item.mediaUrl||((site.publicBaseUrl||'').replace(/\/$/,'')?`${site.publicBaseUrl.replace(/\/$/,'')}/${encodeURIComponent(item.objectKey)}`:'');
    const apiBase=site=>String(site.reactionsApiBaseUrl||'').replace(/\/$/,'');
    const shareText=item=>`${item.title}\n\n${item.description}\n\nListen on Share Capsule:\n${pageUrl(item.id)}`;
    const reactionState=new Map();
    const formatTime=value=>{const seconds=Math.max(0,Number(value)||0);return `${Math.floor(seconds/60)}:${String(Math.floor(seconds%60)).padStart(2,'0')}`};
    function getVisitorId(){const key='sharecapsule.visitorId';let id=localStorage.getItem(key);if(!id){id=crypto.randomUUID();localStorage.setItem(key,id)}return id}
    function socialUrl(type,item){const u=encodeURIComponent(pageUrl(item.id)),t=encodeURIComponent(shareText(item));return type==='whatsapp'?`https://wa.me/?text=${t}`:type==='facebook'?`https://www.facebook.com/sharer/sharer.php?u=${u}`:type==='x'?`https://twitter.com/intent/tweet?text=${t}`:type==='linkedin'?`https://www.linkedin.com/sharing/share-offsite/?url=${u}`:type==='email'?`mailto:?subject=${encodeURIComponent(item.title)}&body=${t}`:'#'}
    function getReaction(item){return reactionState.get(item.id)||{audioId:item.id,claps:0,likes:0,yourClaps:0,yourLike:false,loading:true,error:''}}
    function renderCard(item,site){const reaction=getReaction(item),src=resolveUrl(item,site),base=apiBase(site),id=esc(item.id);const player=src?`<div class="bannerPlayer"><button class="playButton" data-play="${id}" aria-label="Play ${esc(item.title)}">▶</button><div class="track"><div class="times"><span data-current="${id}">0:00</span><span data-duration="${id}">0:00</span></div><div class="bar"><div class="fill" data-progress="${id}"></div></div></div></div><audio class="hiddenAudio" data-audio="${id}" preload="metadata" ${item.autoplay?'autoplay':''} src="${esc(src)}"></audio>`:'';return `<article class="card" data-card="${id}"><div class="cover" style="background:${esc(item.coverBackground)}"><div class="coverText">${(item.coverLines||[item.title]).map(esc).join('<br>')}</div>${player}</div><div class="meta"><h2>${esc(item.title)}</h2><p>${esc(item.description)}</p>${src?'':`<div class="notice"><strong>Public R2 URL required.</strong><br>The object is recorded as <code>${esc(item.objectKey)}</code>.</div>`}<div class="actions"><button data-like="${id}" class="${reaction.yourLike?'active':''}" ${reaction.loading?'disabled':''}>♥ Like <span>${reaction.likes}</span></button><button data-clap="${id}" ${reaction.loading||reaction.yourClaps>=50?'disabled':''}>👏 Clap <span>${reaction.claps}</span></button><button data-native="${id}">↗ Share</button></div><div class="shareGrid"><a target="_blank" rel="noopener" href="${esc(socialUrl('whatsapp',item))}">WhatsApp</a><a target="_blank" rel="noopener" href="${esc(socialUrl('facebook',item))}">Facebook</a><a target="_blank" rel="noopener" href="${esc(socialUrl('x',item))}">X</a><a target="_blank" rel="noopener" href="${esc(socialUrl('linkedin',item))}">LinkedIn</a><a href="${esc(socialUrl('email',item))}">Email</a><button data-copy="${id}">Copy link</button></div><div class="status ${reaction.error?'error':''}" data-status="${id}">${reaction.loading?'Loading combined reactions…':reaction.error?esc(reaction.error):base?`Combined reactions · You clapped ${reaction.yourClaps} time${reaction.yourClaps===1?'':'s'}.`:'Reaction API is not configured yet.'}</div></div></article>`}
    function render(items,site){grid.innerHTML=items.length?items.map(x=>renderCard(x,site)).join(''):'<div class="empty">No audio found.</div>';bind(items,site)}
    function wirePlayer(item){const q=value=>grid.querySelector(`[${value}="${CSS.escape(item.id)}"]`),audio=q('data-audio'),button=q('data-play'),current=q('data-current'),duration=q('data-duration'),progress=q('data-progress');if(!audio||!button)return;button.onclick=()=>audio.paused?audio.play():audio.pause();audio.onloadedmetadata=()=>duration.textContent=formatTime(audio.duration);audio.ontimeupdate=()=>{current.textContent=formatTime(audio.currentTime);progress.style.width=`${audio.duration?audio.currentTime/audio.duration*100:0}%`};audio.onplay=()=>{button.textContent='❚❚';button.classList.add('playing');button.setAttribute('aria-label',`Pause ${item.title}`)};audio.onpause=()=>{button.textContent='▶';button.classList.remove('playing');button.setAttribute('aria-label',`Play ${item.title}`)};audio.onended=()=>{button.textContent='▶';button.classList.remove('playing');progress.style.width='0%';current.textContent='0:00'};if(item.autoplay)audio.play().catch(()=>{})}
    function updateReactionUi(item,site){const reaction=getReaction(item),id=CSS.escape(item.id),like=grid.querySelector(`[data-like="${id}"]`),clap=grid.querySelector(`[data-clap="${id}"]`),status=grid.querySelector(`[data-status="${id}"]`);if(like){like.classList.toggle('active',Boolean(reaction.yourLike));like.disabled=Boolean(reaction.loading);like.querySelector('span').textContent=reaction.likes}if(clap){clap.disabled=Boolean(reaction.loading||reaction.yourClaps>=50);clap.querySelector('span').textContent=reaction.claps}if(status){status.classList.toggle('error',Boolean(reaction.error));status.textContent=reaction.loading?'Updating reactions…':reaction.error?reaction.error:apiBase(site)?`Combined reactions · You clapped ${reaction.yourClaps} time${reaction.yourClaps===1?'':'s'}.`:'Reaction API is not configured yet.'}}
    async function apiRequest(site,path,options={}){const base=apiBase(site);if(!base)throw new Error('Reaction API is not configured yet.');const response=await fetch(`${base}${path}`,options);if(!response.ok){let detail='';try{detail=(await response.json()).error||''}catch{}throw new Error(detail||`Reaction service returned HTTP ${response.status}`)}return response.json()}
    async function loadReaction(item,site){try{const result=await apiRequest(site,`/api/audio/${encodeURIComponent(item.id)}/reactions?visitorId=${encodeURIComponent(getVisitorId())}`);reactionState.set(item.id,{...result,loading:false,error:''})}catch(error){reactionState.set(item.id,{...getReaction(item),loading:false,error:error.message})}updateReactionUi(item,site)}
    async function mutateReaction(item,site,kind){const current=getReaction(item);reactionState.set(item.id,{...current,loading:true,error:''});updateReactionUi(item,site);try{const body=kind==='clap'?{visitorId:getVisitorId(),amount:1}:{visitorId:getVisitorId()};const result=await apiRequest(site,`/api/audio/${encodeURIComponent(item.id)}/${kind}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});reactionState.set(item.id,{...result,loading:false,error:''})}catch(error){reactionState.set(item.id,{...current,loading:false,error:error.message})}updateReactionUi(item,site)}
    async function load(){try{const r=await fetch(`data.json?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);const data=await r.json(),wanted=new URLSearchParams(location.search).get('id'),items=wanted?(data.audio||[]).filter(x=>x.id===wanted):(data.audio||[]),site=data.site||{};items.forEach(item=>reactionState.set(item.id,{audioId:item.id,claps:0,likes:0,yourClaps:0,yourLike:false,loading:Boolean(apiBase(site)),error:apiBase(site)?'':'Reaction API is not configured yet.'}));render(items,site);if(apiBase(site))await Promise.all(items.map(item=>loadReaction(item,site)))}catch(e){grid.innerHTML=`<div class="empty">Unable to load audio. ${esc(e.message)}</div>`}}
    function bind(items,site){items.forEach(wirePlayer);grid.querySelectorAll('[data-like]').forEach(b=>b.onclick=()=>{const item=items.find(x=>x.id===b.dataset.like);if(item)mutateReaction(item,site,'like')});grid.querySelectorAll('[data-clap]').forEach(b=>b.onclick=()=>{const item=items.find(x=>x.id===b.dataset.clap);if(item)mutateReaction(item,site,'clap')});grid.querySelectorAll('[data-copy]').forEach(b=>b.onclick=async()=>{await navigator.clipboard.writeText(pageUrl(b.dataset.copy));b.textContent='Copied ✓'});grid.querySelectorAll('[data-native]').forEach(b=>b.onclick=async()=>{const item=items.find(x=>x.id===b.dataset.native);if(!item)return;const payload={title:item.title,text:item.description,url:pageUrl(item.id)};if(navigator.share)await navigator.share(payload);else await navigator.clipboard.writeText(payload.url)})}
    load();
  </script>
  <script type="module" src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token":"0eea133492b342da911e8cc91271e622"}'></script>
</body>
</html>
