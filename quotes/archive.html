<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#201a17">
  <meta name="description" content="Previous verified quotes from Share Capsule.">
  <title>Previous Quotes — Share Capsule</title>
  <style>
    :root{--bg:#f5efe6;--paper:#fffdf8;--ink:#221c18;--muted:#746a62;--line:#e8ddd0;--accent:#7b4938;--shadow:0 16px 48px rgba(67,45,30,.09)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 0,#fff 0,transparent 35%),linear-gradient(160deg,#f8f1e8,#efe6db);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}.shell{width:min(100%,820px);margin:auto;padding:max(18px,env(safe-area-inset-top)) 16px calc(42px + env(safe-area-inset-bottom))}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.brand{font-weight:900;letter-spacing:-.04em;color:var(--ink);text-decoration:none;font-size:20px}.back{color:var(--muted);text-decoration:none;font-size:13px;font-weight:800;padding:10px 13px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.72)}.hero{padding:38px 2px 24px}.hero h1{margin:0;font-size:clamp(42px,10vw,72px);line-height:.95;letter-spacing:-.06em}.hero p{margin:14px 0 0;color:var(--muted);line-height:1.6}.list{display:grid;gap:14px}.item{display:block;color:inherit;text-decoration:none;background:rgba(255,253,248,.96);border:1px solid rgba(255,255,255,.92);border-radius:24px;padding:22px;box-shadow:var(--shadow);transition:.18s}.item:hover{transform:translateY(-2px)}.date{color:var(--accent);font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.quote{margin:11px 0 0;font:700 clamp(24px,5vw,35px)/1.18 Georgia,"Times New Roman",serif;letter-spacing:-.025em}.author{margin:14px 0 0;color:var(--muted);font-weight:800}.verify{margin-top:11px;font-size:12px;color:#17683e;font-weight:850}.empty{background:#fff;border-radius:22px;padding:28px;text-align:center;color:var(--muted)}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top"><a class="brand" href="/quotes/">Share Capsule Quotes</a><a class="back" href="/quotes/">Today’s quote</a></header>
    <section class="hero"><h1>Previous quotes</h1><p>Every quote shown here has a recorded primary or official source. Open any quote to view its author information, verification note, and sharing options.</p></section>
    <div class="list" id="list"><div class="empty">Loading verified quotes…</div></div>
  </main>
  <script>
    const list=document.getElementById('list');
    const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fmt=d=>new Date(d+'T12:00:00').toLocaleDateString(undefined,{weekday:'short',year:'numeric',month:'long',day:'numeric'});
    const localDate=()=>{const d=new Date(),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`};
    async function load(){try{const r=await fetch(`data.json?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);const data=await r.json();const today=localDate();const quotes=[...(data.quotes||[])].filter(q=>q.date<today).sort((a,b)=>b.date.localeCompare(a.date));list.innerHTML=quotes.length?quotes.map(q=>`<a class="item" href="index.html?date=${encodeURIComponent(q.date)}"><div class="date">${esc(fmt(q.date))}</div><blockquote class="quote">${esc(q.quote)}</blockquote><p class="author">— ${esc(q.author)}</p><div class="verify">✓ Source verified</div></a>`).join(''):'<div class="empty">No previous quotes are available yet.</div>'}catch(e){list.innerHTML=`<div class="empty">Unable to load the quote archive. ${esc(e.message)}</div>`}}
    load();
  </script>
  <!-- Cloudflare Web Analytics -->
  <script type='module' src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "0eea133492b342da911e8cc91271e622"}'></script>
  <!-- End Cloudflare Web Analytics -->
  <script src="/site-shell.js" defer></script>
</body>
</html>
