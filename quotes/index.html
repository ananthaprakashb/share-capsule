<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#201a17">
  <meta name="description" content="A carefully verified quote for today from Share Capsule.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Today’s verified quote — Share Capsule">
  <meta property="og:description" content="One carefully sourced thought for today.">
  <meta property="og:url" content="https://sharecapsule.app/quotes/">
  <meta name="twitter:card" content="summary_large_image">
  <title>Today’s Quote — Share Capsule</title>
  <style>
    :root{--bg:#f5efe6;--paper:#fffdf8;--ink:#221c18;--muted:#746a62;--line:#e8ddd0;--accent:#7b4938;--green:#198754;--shadow:0 22px 70px rgba(67,45,30,.12)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 0,#fff 0,transparent 35%),linear-gradient(160deg,#f8f1e8,#efe6db);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}button,a{font:inherit}.shell{width:min(100%,760px);margin:auto;padding:max(18px,env(safe-area-inset-top)) 16px calc(42px + env(safe-area-inset-bottom))}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:26px}.brand{font-weight:900;letter-spacing:-.04em;color:var(--ink);text-decoration:none;font-size:20px}.home{color:var(--muted);text-decoration:none;font-size:13px;font-weight:800;padding:10px 13px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.72)}.kicker{font-size:12px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin:0 0 10px}.date{font-size:14px;color:var(--muted);margin:0 0 20px}.card{background:rgba(255,253,248,.96);border:1px solid rgba(255,255,255,.92);border-radius:30px;padding:clamp(24px,6vw,46px);box-shadow:var(--shadow);position:relative;overflow:hidden}.card:before{content:"“";position:absolute;right:20px;top:-25px;font:900 150px/1 Georgia,serif;color:#efe2d6}.quote{position:relative;z-index:1;margin:0;font:700 clamp(34px,8vw,62px)/1.08 Georgia,"Times New Roman",serif;letter-spacing:-.035em}.author{position:relative;z-index:1;margin-top:26px;display:flex;flex-wrap:wrap;align-items:center;gap:10px}.authorName{font-size:18px;font-weight:900}.authorLink{color:var(--accent);font-size:13px;font-weight:800;text-decoration:none}.bio{position:relative;z-index:1;margin:13px 0 0;color:var(--muted);line-height:1.6;font-size:14px}.verified{margin-top:22px;border-top:1px solid var(--line);padding-top:18px}.verifiedBadge{display:inline-flex;align-items:center;gap:7px;background:#ecf6ef;color:#17683e;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900}.source{margin:12px 0 0;color:var(--muted);font-size:13px;line-height:1.55}.source a{color:var(--accent);font-weight:800}.share{margin-top:18px;background:rgba(255,255,255,.78);border-radius:26px;padding:20px;box-shadow:0 14px 45px rgba(67,45,30,.07)}.share h2{margin:0;font-size:22px;letter-spacing:-.035em}.share p{margin:7px 0 0;color:var(--muted);font-size:13px;line-height:1.5}.primary{display:grid;grid-template-columns:1fr 72px;gap:10px;margin-top:16px}.primary button,.social button{border:0;border-radius:16px;min-height:52px;font-weight:850;cursor:pointer}.wa{background:var(--green);color:#fff}.copy{background:#ece5dc;color:var(--ink)}.social{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}.social button{background:#fff;border:1px solid var(--line);text-align:left;padding:10px 13px;color:var(--ink)}.bottom{margin-top:22px;display:flex;justify-content:center}.archive{display:inline-flex;align-items:center;gap:9px;color:var(--ink);font-weight:900;text-decoration:none;background:#fff;border:1px solid var(--line);padding:14px 18px;border-radius:999px}.error{background:#fff;padding:28px;border-radius:24px;color:var(--muted);text-align:center}.toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,14px);opacity:0;background:#1d1916;color:#fff;padding:11px 15px;border-radius:999px;font-size:13px;transition:.2s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translate(-50%,0)}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top"><a class="brand" href="/quotes/">Share Capsule Quotes</a><a class="home" href="/">All releases</a></header>
    <div id="app"><div class="error">Loading today’s verified quote…</div></div>
  </main>
  <div class="toast" id="toast" role="status"></div>
  <script>
    const app=document.getElementById('app'),toast=document.getElementById('toast');
    const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fmt=d=>new Date(d+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    const localDate=()=>{const d=new Date(),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`};
    const quoteUrl=q=>`${location.origin}/quotes/?date=${encodeURIComponent(q.date)}`;
    const shareText=q=>`“${q.quote}”\n— ${q.author}\n\n${quoteUrl(q)}`;
    function showToast(t){toast.textContent=t;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),1700)}
    async function load(){try{const r=await fetch(`data.json?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);const data=await r.json();const requested=new URLSearchParams(location.search).get('date');const sorted=[...(data.quotes||[])].sort((a,b)=>b.date.localeCompare(a.date));const today=localDate();const q=(requested&&sorted.find(x=>x.date===requested))||sorted.find(x=>x.date<=today)||sorted[0];if(!q)throw new Error('No verified quotes are available');render(q)}catch(e){app.innerHTML=`<div class="error"><h2>Quote unavailable</h2><p>${esc(e.message)}</p></div>`}}
    function render(q){document.title=`${q.author}: Today’s Quote | Share Capsule`;app.innerHTML=`<p class="kicker">Today’s verified quote</p><p class="date">${esc(fmt(q.date))}</p><article class="card"><blockquote class="quote">${esc(q.quote)}</blockquote><div class="author"><span class="authorName">— ${esc(q.author)}</span><a class="authorLink" href="${esc(q.authorEncyclopediaUrl)}" target="_blank" rel="noopener">Author encyclopedia ↗</a></div><p class="bio">${esc(q.authorBio)}</p><div class="verified"><span class="verifiedBadge">✓ Source verified</span><p class="source">${esc(q.verificationNote)}<br><strong>${esc(q.sourceType)}</strong> · <a href="${esc(q.sourceUrl)}" target="_blank" rel="noopener">Read the source: ${esc(q.sourceTitle)} ↗</a></p></div></article><section class="share"><h2>Share this thought</h2><p>The quote, author, and this verified page link will be included.</p><div class="primary"><button class="wa" id="wa">Share on WhatsApp</button><button class="copy" id="copy">Copy</button></div><div class="social"><button data-social="facebook">Facebook</button><button data-social="x">X</button><button data-social="telegram">Telegram</button><button data-social="linkedin">LinkedIn</button><button data-social="email">Email</button><button id="more">More apps</button></div></section><div class="bottom"><a class="archive" href="archive.html">Previous days’ quotes →</a></div>`;wire(q)}
    function wire(q){document.getElementById('wa').onclick=()=>location.href='https://wa.me/?text='+encodeURIComponent(shareText(q));document.getElementById('copy').onclick=async()=>{try{await navigator.clipboard.writeText(shareText(q));showToast('Quote copied')}catch{showToast('Copy unavailable')}};document.getElementById('more').onclick=()=>native(q);document.querySelectorAll('[data-social]').forEach(b=>b.onclick=()=>social(b.dataset.social,q))}
    async function native(q){if(navigator.share){try{await navigator.share({title:`${q.author} quote`,text:`“${q.quote}” — ${q.author}`,url:quoteUrl(q)});return}catch(e){if(e.name==='AbortError')return}}try{await navigator.clipboard.writeText(shareText(q));showToast('Copied — paste into any app')}catch{}}
    function social(n,q){const u=encodeURIComponent(quoteUrl(q)),t=encodeURIComponent(`“${q.quote}” — ${q.author}`),full=encodeURIComponent(shareText(q));if(n==='facebook'){if(navigator.share){native(q);return}window.open(`https://www.facebook.com/sharer/sharer.php?display=popup&u=${u}`,'_blank','noopener,noreferrer,width=720,height=640');return}const urls={x:`https://twitter.com/intent/tweet?text=${t}&url=${u}`,telegram:`https://t.me/share/url?url=${u}&text=${t}`,linkedin:`https://www.linkedin.com/sharing/share-offsite/?url=${u}`};if(n==='email'){location.href=`mailto:?subject=${encodeURIComponent('A quote worth sharing')}&body=${full}`;return}window.open(urls[n],'_blank','noopener,noreferrer,width=720,height=640')}
    load();
  </script>

  <script type='module' src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "0eea133492b342da911e8cc91271e622"}'></script>
  <!-- End Cloudflare Web Analytics -->
  <script src="/site-shell.js" defer></script>
</body>
</html>
