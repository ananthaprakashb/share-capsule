<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#6f4b3e">
  <meta name="description" content="One story every day from Think Five Minutes, with the original source preserved.">
  <meta property="og:title" content="Five-Minute Stories — Share Capsule">
  <meta property="og:description" content="One thoughtful story every day.">
  <meta property="og:url" content="https://sharecapsule.app/story/">
  <title>Five-Minute Stories — Share Capsule</title>
  <style>
    :root{--bg:#f5efe7;--paper:#fffdf9;--ink:#28201c;--muted:#746860;--line:#eadfd4;--accent:#6f4b3e;--soft:#efe2d6;--shadow:0 22px 70px rgba(70,45,32,.12)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 10% 0,#fff 0,transparent 34%),linear-gradient(150deg,#f6eee4,#edf3f0);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.shell{width:min(100%,850px);margin:auto;padding:20px 16px 64px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.brand{font-size:21px;font-weight:950;color:var(--ink);text-decoration:none}.home{color:var(--muted);text-decoration:none;border:1px solid var(--line);padding:10px 13px;border-radius:999px;background:#fff}.hero{padding:42px 2px 25px}.hero h1{margin:0;font-size:clamp(43px,10vw,76px);line-height:.94;letter-spacing:-.065em}.hero p{max-width:650px;color:var(--muted);line-height:1.65}.policy{background:rgba(255,255,255,.78);border:1px solid #fff;border-radius:20px;padding:15px 17px;color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:18px}.card{background:var(--paper);border:1px solid #fff;border-radius:30px;padding:clamp(22px,6vw,42px);box-shadow:var(--shadow)}.date{font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}h2{margin:10px 0 0;font-size:clamp(34px,7vw,54px);line-height:1;letter-spacing:-.055em}.author{margin-top:12px;color:var(--muted);font-weight:750}.story{margin:28px 0 0;white-space:pre-line;font:500 clamp(18px,3vw,22px)/1.85 Georgia,"Times New Roman",serif}.source{margin-top:28px;padding-top:20px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}.source a{color:var(--accent);font-weight:900}.share{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}.share button,.share a{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:15px;min-height:48px;padding:0 15px;font-weight:850;display:inline-flex;align-items:center;text-decoration:none;cursor:pointer}.archive{margin-top:20px;display:grid;gap:12px}.item{display:block;background:rgba(255,255,255,.84);border:1px solid #fff;border-radius:20px;padding:17px;text-decoration:none;color:inherit}.item h3{margin:5px 0 0;font-size:21px}.item p{margin:8px 0 0;color:var(--muted);line-height:1.55}.empty{padding:28px;background:#fff;border-radius:24px;color:var(--muted)}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top"><a class="brand" href="/story/">Five-Minute Stories</a><a class="home" href="/">All releases</a></header>
    <section class="hero"><h1>One story. Every day.</h1><p>A daily reading from Think Five Minutes, republished with its original author, publication date, and source link.</p></section>
    <div id="app"><div class="empty">Loading today’s story…</div></div>
  </main>
  <script>
    const app=document.getElementById('app');
    const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fmt=s=>{const d=new Date(s);return Number.isNaN(d.getTime())?s:d.toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'})};
    const pageUrl=id=>`${location.origin}/story/?id=${encodeURIComponent(id)}`;
    function renderStory(story,site,all){document.title=`${story.title} — Five-Minute Stories`;const url=pageUrl(story.id);const text=`${story.title}\n\n${story.excerpt}\n\nRead: ${url}`;const archive=all.filter(x=>x.id!==story.id).slice(0,20).map(x=>`<a class="item" href="?id=${encodeURIComponent(x.id)}"><div class="date">${esc(fmt(x.publishedOn))}</div><h3>${esc(x.title)}</h3><p>${esc(x.excerpt)}</p></a>`).join('');app.innerHTML=`<section class="policy">${esc(site.contentPolicy||'Original source attribution is preserved.')}</section><article class="card"><div class="date">Published here ${esc(fmt(story.publishedOn))}</div><h2>${esc(story.title)}</h2><div class="author">By ${esc(story.author)} · Originally published ${esc(fmt(story.originalPublishedAt))}</div><div class="story">${esc(story.contentText)}</div><div class="source"><span>Source: ${esc(story.sourceName||site.sourceName)}</span><a href="${esc(story.sourceUrl)}" target="_blank" rel="noopener">Read the original ↗</a></div><div class="share"><button id="native">↗ Share</button><a target="_blank" rel="noopener" href="https://wa.me/?text=${encodeURIComponent(text)}">WhatsApp</a><a target="_blank" rel="noopener" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}">X</a><button id="copy">Copy link</button></div></article>${archive?`<section class="archive"><h2>Earlier stories</h2>${archive}</section>`:''}`;document.getElementById('copy').onclick=async()=>{await navigator.clipboard.writeText(url);document.getElementById('copy').textContent='Copied ✓'};document.getElementById('native').onclick=async()=>{if(navigator.share)await navigator.share({title:story.title,text:story.excerpt,url});else await navigator.clipboard.writeText(url)}}
    async function load(){try{const r=await fetch(`data.json?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);const data=await r.json();const stories=[...(data.stories||[])].sort((a,b)=>b.publishedOn.localeCompare(a.publishedOn));if(!stories.length){app.innerHTML=`<div class="empty">The first story is queued from <a href="${esc(data.site.seedSourceUrl)}">Think Five Minutes</a>. The daily publisher will add it after deployment.</div>`;return}const id=new URLSearchParams(location.search).get('id');const story=stories.find(x=>x.id===id)||stories[0];renderStory(story,data.site||{},stories)}catch(e){app.innerHTML=`<div class="empty">Unable to load stories. ${esc(e.message)}</div>`}}
    load();
  </script>
  <!-- Cloudflare Web Analytics -->
  <script type='module' src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "0eea133492b342da911e8cc91271e622"}'></script>
  <!-- End Cloudflare Web Analytics -->
</body>
</html>
