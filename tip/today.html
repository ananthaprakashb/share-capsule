<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#173b36">
  <meta name="description" content="Validated, source-backed tips selected for today's events.">
  <title>Today’s Validated Tips — Share Capsule</title>
  <style>
    :root{--bg:#eef4f0;--paper:#fffefa;--ink:#18231f;--muted:#65716c;--line:#dce8e1;--accent:#176b5b;--accent2:#dff2ea;--gold:#9b6a22;--shadow:0 22px 70px rgba(27,66,56,.12)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(160deg,#eef6f1,#e5eee9);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.shell{width:min(100%,780px);margin:auto;padding:20px 16px 54px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:28px}.brand,.home{color:var(--ink);text-decoration:none;font-weight:900}.home{font-size:13px;padding:10px 13px;border:1px solid var(--line);border-radius:999px;background:#fff}.date{color:var(--muted);margin-bottom:18px}.kicker{margin:28px 0 8px;font-size:12px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:var(--accent)}.card{background:var(--paper);border-radius:30px;padding:clamp(23px,5.5vw,44px);box-shadow:var(--shadow)}.category{display:inline-flex;background:var(--accent2);color:var(--accent);border-radius:999px;padding:7px 10px;font-size:11px;font-weight:900;text-transform:uppercase}.title{margin:18px 0 0;font-size:clamp(36px,7vw,58px);line-height:.98;letter-spacing:-.055em}.action{font-size:19px;line-height:1.5;font-weight:750}.steps{padding:0;list-style:none;display:grid;gap:11px}.steps li{display:grid;grid-template-columns:28px 1fr;gap:10px;line-height:1.48}.steps span{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:#eef5f1;color:var(--accent);font-size:12px;font-weight:900}.why{margin-top:24px;padding:17px;border-radius:18px;background:#f3f7f4;line-height:1.6}.proof{margin:18px 0 30px;display:grid;gap:14px}.proofBox{background:#fff;border-radius:24px;padding:20px;border:1px solid var(--line)}.proofHead{font-size:12px;font-weight:900;text-transform:uppercase;color:var(--accent)}.proofBox h2{margin:10px 0 0}.proofBox p{color:var(--muted);line-height:1.6;font-size:13px}.proofBox a{color:var(--accent);font-weight:850}.error{background:#fff;padding:28px;border-radius:24px;color:var(--muted)}
  </style>
</head>
<body>
<main class="shell"><header class="top"><a class="brand" href="/tip/">Share Capsule Tips</a><a class="home" href="/">All releases</a></header><div id="app"><div class="error">Loading today’s validated tips…</div></div></main>
<script>
const app=document.getElementById('app');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=d=>new Date(d+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'});
function card(tip,n){const steps=(tip.steps||[]).map((s,i)=>`<li><span>${i+1}</span><div>${esc(s)}</div></li>`).join('');return `<p class="kicker">${n===0?'Today’s validated life hack':'One more useful tip today'}</p><article class="card"><div class="category">${esc(tip.category)}</div><h1 class="title">${esc(tip.title)}</h1><p class="action">${esc(tip.action)}</p><ol class="steps">${steps}</ol><div class="why"><strong>Why it works:</strong> ${esc(tip.whyItWorks)}</div></article><section class="proof"><div class="proofBox"><div class="proofHead">✓ Authoritative source</div><h2>${esc(tip.sourceTitle)}</h2><p><strong>${esc(tip.sourceOrganization)}</strong><br>${esc(tip.validationNote)}</p><a href="${esc(tip.sourceUrl)}" target="_blank" rel="noopener">Read the validating source ↗</a></div><div class="proofBox"><div class="proofHead">Real-world evidence</div><h2>${esc(tip.evidenceTitle)}</h2><p>${esc(tip.evidenceSummary)}</p><a href="${esc(tip.evidenceUrl)}" target="_blank" rel="noopener">Check the evidence ↗</a></div></section>`}
(async()=>{try{const v=Date.now(),[d,m,t]=await Promise.all([fetch(`data.json?v=${v}`),fetch(`money-data.json?v=${v}`),fetch(`today.json?v=${v}`)]);if(!d.ok||!m.ok||!t.ok)throw new Error('Tip data could not be loaded');const base=await d.json(),money=await m.json(),today=await t.json(),all=[...(base.tips||[]),...(money.tips||[])],tips=(today.selections||[]).map(x=>all.find(t=>t.id===x.id)).filter(Boolean);if(!tips.length)throw new Error('No selected tips are available');app.innerHTML=`<p class="date">${esc(fmt(today.date))}</p>${tips.map(card).join('')}`}catch(e){app.innerHTML=`<div class="error"><h2>Tips unavailable</h2><p>${esc(e.message)}</p></div>`}})();
</script>
<script src="/site-shell.js" defer></script>
</body>
</html>
