<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#173b36">
  <meta name="description" content="A validated, source-backed life hack for today from Share Capsule.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Today’s validated life hack — Share Capsule">
  <meta property="og:description" content="One practical action, an authoritative source, and the real-world evidence behind it.">
  <meta property="og:url" content="https://sharecapsule.app/tip/">
  <meta name="twitter:card" content="summary_large_image">
  <title>Today’s Validated Tip — Share Capsule</title>
  <style>
    :root{--bg:#eef4f0;--paper:#fffefa;--ink:#18231f;--muted:#65716c;--line:#dce8e1;--accent:#176b5b;--accent2:#dff2ea;--green:#168b55;--gold:#9b6a22;--shadow:0 22px 70px rgba(27,66,56,.12)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;background:radial-gradient(circle at 12% 0,#fff 0,transparent 34%),linear-gradient(160deg,#eef6f1,#e5eee9);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}button,a{font:inherit}.shell{width:min(100%,780px);margin:auto;padding:max(18px,env(safe-area-inset-top)) 16px calc(46px + env(safe-area-inset-bottom))}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:28px}.brand{font-size:20px;font-weight:900;letter-spacing:-.045em;color:var(--ink);text-decoration:none}.home{color:var(--muted);text-decoration:none;font-size:13px;font-weight:850;padding:10px 13px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.78)}.kicker{margin:0 0 8px;font-size:12px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:var(--accent)}.date{margin:0 0 18px;color:var(--muted);font-size:14px}.card{background:rgba(255,254,250,.97);border:1px solid rgba(255,255,255,.94);border-radius:30px;padding:clamp(23px,5.5vw,44px);box-shadow:var(--shadow);position:relative;overflow:hidden}.card:before{content:"✓";position:absolute;right:18px;top:-25px;font-size:150px;font-weight:950;color:#e7f2ec;line-height:1}.category{position:relative;z-index:1;display:inline-flex;background:var(--accent2);color:var(--accent);border-radius:999px;padding:7px 10px;font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.title{position:relative;z-index:1;margin:18px 0 0;font-size:clamp(38px,8vw,64px);line-height:.96;letter-spacing:-.06em}.action{position:relative;z-index:1;margin:18px 0 0;font-size:19px;line-height:1.5;font-weight:750}.steps{position:relative;z-index:1;margin:22px 0 0;padding:0;list-style:none;display:grid;gap:11px}.steps li{display:grid;grid-template-columns:28px 1fr;gap:10px;line-height:1.48;color:#33413b}.steps span{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:#eef5f1;color:var(--accent);font-size:12px;font-weight:900}.why{position:relative;z-index:1;margin-top:24px;padding:17px;border-radius:18px;background:#f3f7f4;color:#44534c;line-height:1.6;font-size:14px}.why strong{color:var(--ink)}.proof{margin-top:18px;display:grid;gap:14px}.proofBox{background:rgba(255,255,255,.82);border-radius:24px;padding:20px;border:1px solid var(--line)}.proofHead{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}.proof h2{margin:10px 0 0;font-size:21px;letter-spacing:-.035em}.proof p{margin:9px 0 0;color:var(--muted);font-size:13px;line-height:1.6}.proof a{display:inline-flex;margin-top:12px;color:var(--accent);font-weight:850;font-size:13px}.evidence .proofHead{color:var(--gold)}.validated{margin-top:12px;color:var(--muted);font-size:11px}.notice{margin:17px 3px 0;color:var(--muted);font-size:12px;line-height:1.55}.share{margin-top:18px;background:rgba(255,255,255,.82);border-radius:26px;padding:20px;box-shadow:0 14px 45px rgba(27,66,56,.07)}.share h2{margin:0;font-size:22px;letter-spacing:-.035em}.share>p{margin:7px 0 0;color:var(--muted);font-size:13px;line-height:1.5}.primary{display:grid;grid-template-columns:1fr 72px;gap:10px;margin-top:16px}.primary button,.social button{border:0;border-radius:16px;min-height:52px;font-weight:850;cursor:pointer}.wa{background:var(--green);color:#fff}.copy{background:#e6eee9;color:var(--ink)}.social{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}.social button{background:#fff;border:1px solid var(--line);text-align:left;padding:10px 13px;color:var(--ink)}.bottom{margin-top:22px;display:flex;justify-content:center}.archive{display:inline-flex;align-items:center;gap:9px;color:var(--ink);font-weight:900;text-decoration:none;background:#fff;border:1px solid var(--line);padding:14px 18px;border-radius:999px}.error{background:#fff;padding:28px;border-radius:24px;color:var(--muted);text-align:center}.toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,14px);opacity:0;background:#18231f;color:#fff;padding:11px 15px;border-radius:999px;font-size:13px;transition:.2s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translate(-50%,0)}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top"><a class="brand" href="/tip/">Share Capsule Tips</a><a class="home" href="/">All releases</a></header>
    <div id="app"><div class="error">Loading today’s validated tip…</div></div>
  </main>
  <div class="toast" id="toast" role="status"></div>
  <script>
    const app=document.getElementById('app'),toast=document.getElementById('toast');
    const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fmt=d=>new Date(d+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    const localDate=()=>{const d=new Date(),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`};
    const daysBetween=(a,b)=>Math.floor((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000);
    function tipForDate(data,date){const tips=data.tips||[];if(!tips.length)return null;const offset=daysBetween(data.site?.startDate||'2026-07-12',date);const index=((offset%tips.length)+tips.length)%tips.length;return tips[index]}
    const tipUrl=date=>`${location.origin}/tip/?date=${encodeURIComponent(date)}`;
    const shareText=(tip,date)=>`${tip.title}\n\n${tip.action}\n\nValidated source: ${tip.sourceOrganization}\n${tipUrl(date)}`;
    function showToast(t){toast.textContent=t;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),1700)}
    async function load(){try{const v=Date.now(),[baseResponse,moneyResponse]=await Promise.all([fetch(`data.json?v=${v}`,{cache:'no-store'}),fetch(`money-data.json?v=${v}`,{cache:'no-store'})]);if(!baseResponse.ok)throw new Error(`HTTP ${baseResponse.status}`);if(!moneyResponse.ok)throw new Error(`Money tips HTTP ${moneyResponse.status}`);const base=await baseResponse.json(),money=await moneyResponse.json(),data={...base,tips:[...(base.tips||[]),...(money.tips||[])]};const requested=new URLSearchParams(location.search).get('date');const date=/^\d{4}-\d{2}-\d{2}$/.test(requested||'')?requested:localDate();const tip=tipForDate(data,date);if(!tip)throw new Error('No validated tips are available');render(tip,date)}catch(e){app.innerHTML=`<div class="error"><h2>Tip unavailable</h2><p>${esc(e.message)}</p></div>`}}
    function render(tip,date){document.title=`${tip.title} | Share Capsule Tip`;const steps=(tip.steps||[]).map((s,i)=>`<li><span>${i+1}</span><div>${esc(s)}</div></li>`).join('');app.innerHTML=`<p class="kicker">Today’s validated life hack</p><p class="date">${esc(fmt(date))}</p><article class="card"><div class="category">${esc(tip.category)}</div><h1 class="title">${esc(tip.title)}</h1><p class="action">${esc(tip.action)}</p><ol class="steps">${steps}</ol><div class="why"><strong>Why it works:</strong> ${esc(tip.whyItWorks)}</div></article><section class="proof"><div class="proofBox"><div class="proofHead">✓ Authoritative source</div><h2>${esc(tip.sourceTitle)}</h2><p><strong>${esc(tip.sourceOrganization)}</strong><br>${esc(tip.validationNote)}</p><a href="${esc(tip.sourceUrl)}" target="_blank" rel="noopener">Read the validating source ↗</a><div class="validated">Last validated: ${esc(fmt(tip.lastValidated))}</div></div><div class="proofBox evidence"><div class="proofHead">Real-world evidence or story</div><h2>${esc(tip.evidenceTitle)}</h2><p>${esc(tip.evidenceSummary)}</p><a href="${esc(tip.evidenceUrl)}" target="_blank" rel="noopener">Check the evidence or story ↗</a><div class="validated">Evidence type: ${esc(tip.evidenceType)}</div></div></section><p class="notice">General educational information only — not personalized financial, legal, tax, medical or safety advice. Verify current rules and follow qualified professionals or relevant authorities when needed.</p><section class="share"><h2>Share this useful tip</h2><p>The action, validating authority and permanent dated page link will be included.</p><div class="primary"><button class="wa" id="wa">Share on WhatsApp</button><button class="copy" id="copy">Copy</button></div><div class="social"><button data-social="facebook">Facebook</button><button data-social="x">X</button><button data-social="telegram">Telegram</button><button data-social="linkedin">LinkedIn</button><button data-social="email">Email</button><button id="more">More apps</button></div></section><div class="bottom"><a class="archive" href="archive.html">Previous days’ tips →</a></div>`;wire(tip,date)}
    function wire(tip,date){document.getElementById('wa').onclick=()=>location.href='https://wa.me/?text='+encodeURIComponent(shareText(tip,date));document.getElementById('copy').onclick=async()=>{try{await navigator.clipboard.writeText(shareText(tip,date));showToast('Tip copied')}catch{showToast('Copy unavailable')}};document.getElementById('more').onclick=()=>native(tip,date);document.querySelectorAll('[data-social]').forEach(b=>b.onclick=()=>social(b.dataset.social,tip,date))}
    async function native(tip,date){if(navigator.share){try{await navigator.share({title:tip.title,text:tip.action,url:tipUrl(date)});return}catch(e){if(e.name==='AbortError')return}}try{await navigator.clipboard.writeText(shareText(tip,date));showToast('Copied — paste into any app')}catch{}}
    function social(n,tip,date){const u=encodeURIComponent(tipUrl(date)),t=encodeURIComponent(`${tip.title}: ${tip.action}`),full=encodeURIComponent(shareText(tip,date));if(n==='facebook'){if(navigator.share){native(tip,date);return}window.open(`https://www.facebook.com/sharer/sharer.php?display=popup&u=${u}`,'_blank','noopener,noreferrer,width=720,height=640');return}const urls={x:`https://twitter.com/intent/tweet?text=${t}&url=${u}`,telegram:`https://t.me/share/url?url=${u}&text=${t}`,linkedin:`https://www.linkedin.com/sharing/share-offsite/?url=${u}`};if(n==='email'){location.href=`mailto:?subject=${encodeURIComponent(tip.title)}&body=${full}`;return}window.open(urls[n],'_blank','noopener,noreferrer,width=720,height=640')}
    load();
  </script>
</body>
</html>
